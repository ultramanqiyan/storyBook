<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>分享管理 - 乐高故事书</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --gold: #ffd700;
      --gold-dark: #b8860b;
      --gold-light: #ffed4a;
      --silver: #c0c0c0;
      --crimson: #dc2626;
      --purple: #a855f7;
      --green: #22c55e;
      --blue: #3b82f6;
      --orange: #f59e0b;
      --bg-dark: #0d0d14;
      --bg-medium: #1a1a2e;
      --bg-light: #252542;
      --text-primary: #f8fafc;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
      --font-title: 'Cinzel', serif;
      --font-body: 'Noto Sans SC', sans-serif;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: var(--font-body);
      background: var(--bg-dark);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
    }

    .bg-pattern {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: 
        radial-gradient(ellipse at 20% 20%, rgba(255, 215, 0, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 80%, rgba(168, 85, 247, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 50%, rgba(59, 130, 246, 0.05) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    #particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
    }

    .particle {
      position: absolute;
      width: 4px;
      height: 4px;
      background: var(--gold);
      border-radius: 50%;
      opacity: 0.6;
      animation: float 20s infinite ease-in-out;
      box-shadow: 0 0 6px var(--gold);
    }

    @keyframes float {
      0%, 100% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
      10% { opacity: 0.6; }
      90% { opacity: 0.6; }
      100% { transform: translateY(-100px) rotate(720deg); opacity: 0; }
    }

    .page-container {
      position: relative;
      z-index: 10;
      min-height: 100vh;
      padding-bottom: 80px;
    }

    .page-header {
      background: linear-gradient(180deg, var(--bg-medium), transparent);
      padding: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255, 215, 0, 0.1);
    }

    .page-header-left {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .back-btn {
      background: linear-gradient(135deg, var(--blue), var(--purple));
      color: white;
      border: none;
      width: 45px;
      height: 45px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
    }

    .back-btn:hover {
      transform: scale(1.1);
      box-shadow: 0 5px 20px rgba(59, 130, 246, 0.4);
    }

    .page-title {
      font-family: var(--font-title);
      font-size: 1.5rem;
      color: var(--gold);
    }

    .page-subtitle {
      color: var(--text-secondary);
      font-size: 0.85rem;
    }

    .content-wrapper {
      max-width: 800px;
      margin: 0 auto;
      padding: 20px;
    }

    .share-card {
      background: linear-gradient(145deg, var(--bg-medium), var(--bg-light));
      border: 2px solid rgba(255, 215, 0, 0.2);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 16px;
      transition: all 0.3s ease;
    }

    .share-card:hover {
      border-color: var(--gold);
      box-shadow: 0 10px 30px rgba(255, 215, 0, 0.1);
    }

    .share-header {
      display: flex;
      align-items: flex-start;
      gap: 16px;
    }

    .share-icon {
      width: 50px;
      height: 50px;
      background: linear-gradient(135deg, var(--green), var(--blue));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      flex-shrink: 0;
    }

    .share-info {
      flex: 1;
    }

    .share-info h3 {
      color: var(--text-primary);
      font-size: 1.1rem;
      margin-bottom: 4px;
    }

    .share-code {
      color: var(--text-muted);
      font-size: 0.875rem;
      margin-bottom: 8px;
    }

    .share-badges {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .badge {
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 500;
    }

    .badge-blue {
      background: rgba(59, 130, 246, 0.2);
      color: var(--blue);
    }

    .badge-gray {
      background: rgba(100, 116, 139, 0.2);
      color: var(--text-secondary);
    }

    .share-link-area {
      margin-top: 16px;
      padding: 12px;
      background: var(--bg-dark);
      border-radius: 10px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .share-link-input {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--text-secondary);
      font-size: 0.875rem;
      outline: none;
    }

    .copy-btn {
      background: linear-gradient(135deg, var(--blue), var(--purple));
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .copy-btn:hover {
      transform: scale(1.05);
    }

    .share-actions {
      margin-top: 12px;
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }

    .delete-btn {
      background: var(--crimson);
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .delete-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 5px 15px rgba(220, 38, 38, 0.3);
    }

    .empty-state {
      padding: 64px;
      background: linear-gradient(145deg, var(--bg-medium), var(--bg-light));
      border: 2px dashed rgba(255, 215, 0, 0.3);
      border-radius: 20px;
      text-align: center;
    }

    .empty-icon {
      font-size: 4rem;
      margin-bottom: 16px;
    }

    .empty-title {
      font-weight: bold;
      font-size: 1.125rem;
      margin-bottom: 8px;
      color: var(--text-primary);
    }

    .empty-text {
      color: var(--text-muted);
    }

    .confirm-dialog {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.8);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      backdrop-filter: blur(5px);
    }

    .dialog-content {
      background: linear-gradient(145deg, var(--bg-medium), var(--bg-light));
      border: 2px solid var(--gold);
      border-radius: 20px;
      padding: 30px;
      max-width: 400px;
      width: 90%;
      text-align: center;
    }

    .dialog-title {
      font-family: var(--font-title);
      font-size: 1.3rem;
      color: var(--gold);
      margin-bottom: 20px;
    }

    .dialog-message {
      color: var(--text-secondary);
      margin-bottom: 25px;
    }

    .dialog-buttons {
      display: flex;
      gap: 12px;
    }

    .dialog-btn {
      flex: 1;
      padding: 14px;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      font-family: var(--font-body);
    }

    .dialog-btn.cancel {
      background: var(--bg-dark);
      color: var(--text-primary);
      border: 2px solid rgba(255, 215, 0, 0.3);
    }

    .dialog-btn.confirm {
      background: var(--crimson);
      color: white;
      border: none;
    }

    .dialog-btn:hover {
      transform: translateY(-2px);
    }

    .loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(13, 13, 20, 0.95);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 2000;
      flex-direction: column;
      gap: 20px;
    }

    .loading-spinner {
      width: 50px;
      height: 50px;
      border: 3px solid rgba(255, 215, 0, 0.2);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-text {
      color: var(--gold);
      font-family: var(--font-title);
    }

    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      padding: 15px 30px;
      border-radius: 10px;
      font-size: 0.95rem;
      z-index: 1001;
      animation: slideUp 0.3s ease;
    }

    .toast.success {
      background: linear-gradient(135deg, var(--green), #16a34a);
      color: white;
    }

    .toast.error {
      background: linear-gradient(135deg, var(--crimson), #b91c1c);
      color: white;
    }

    @keyframes slideUp {
      from { transform: translateX(-50%) translateY(20px); opacity: 0; }
      to { transform: translateX(-50%) translateY(0); opacity: 1; }
    }

    @media (max-width: 600px) {
      .share-header {
        flex-direction: column;
        align-items: flex-start;
      }

      .share-link-area {
        flex-direction: column;
        align-items: stretch;
      }

      .copy-btn {
        width: 100%;
        text-align: center;
      }

      .dialog-buttons {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="bg-pattern"></div>
  <div id="particles"></div>

  <div class="page-container">
    <header class="page-header">
      <div class="page-header-left">
        <a href="index.html" class="back-btn">←</a>
        <div>
          <h1 class="page-title">分享管理</h1>
          <p class="page-subtitle">管理你的故事分享</p>
        </div>
      </div>
    </header>

    <div class="content-wrapper">
      <div id="shareList">
        <div class="empty-state">
          <span class="empty-icon">📤</span>
          <p class="empty-title">还没有分享</p>
          <p class="empty-text">在书籍详情页点击分享按钮创建分享链接</p>
        </div>
      </div>
    </div>
  </div>

  <div id="confirmDialog" class="confirm-dialog">
    <div class="dialog-content">
      <h2 class="dialog-title">确认删除</h2>
      <p class="dialog-message">确定要删除这个分享链接吗？删除后链接将失效。</p>
      <div class="dialog-buttons">
        <button class="dialog-btn cancel" onclick="closeConfirmDialog()">取消</button>
        <button id="confirmDeleteBtn" class="dialog-btn confirm">删除</button>
      </div>
    </div>
  </div>

  <div id="loadingOverlay" class="loading-overlay">
    <div class="loading-spinner"></div>
    <div class="loading-text">正在加载...</div>
  </div>

  <script src="js/utils.js"></script>
  <script>
    for (var i = 0; i < 15; i++) {
      var p = document.createElement('div');
      p.className = 'particle';
      p.style.left = Math.random() * 100 + '%';
      p.style.animationDelay = Math.random() * 20 + 's';
      document.getElementById('particles').appendChild(p);
    }

    var userId = requireAuth();
    var allShares = [];
    var allBooks = [];
    var pendingShareId = null;

    document.addEventListener('DOMContentLoaded', function() {
      loadShares();
    });

    async function loadShares() {
      showLoading();
      try {
        var booksData = await fetchAPI('/books?userId=' + userId);
        allBooks = booksData.books || [];

        var sharePromises = allBooks.map(function(book) {
          return fetchAPI('/share?bookId=' + book.book_id + '&userId=' + userId)
            .then(function(data) { return data.shares || []; })
            .catch(function() { return []; });
        });

        var shareResults = await Promise.all(sharePromises);
        allShares = [];

        for (var i = 0; i < shareResults.length; i++) {
          var bookShares = shareResults[i];
          for (var j = 0; j < bookShares.length; j++) {
            var share = bookShares[j];
            var book = allBooks.find(function(b) { return b.book_id === share.book_id; });
            share.bookTitle = book ? book.title : '未知书籍';
            allShares.push(share);
          }
        }

        allShares.sort(function(a, b) {
          return new Date(b.created_at) - new Date(a.created_at);
        });

        hideLoading();
        renderShareList();
      } catch (error) {
        hideLoading();
        showToast('加载分享列表失败', 'error');
        console.error(error);
      }
    }

    function renderShareList() {
      var container = document.getElementById('shareList');

      if (allShares.length === 0) {
        container.innerHTML = 
          '<div class="empty-state">' +
            '<span class="empty-icon">📤</span>' +
            '<p class="empty-title">还没有分享</p>' +
            '<p class="empty-text">在书籍详情页点击分享按钮创建分享链接</p>' +
          '</div>';
        return;
      }

      var html = '';
      allShares.forEach(function(share) {
        var shareUrl = window.location.origin + '/share-view.html?code=' + share.share_code;
        var createdDate = new Date(share.created_at).toLocaleDateString('zh-CN');
        var hasPassword = share.password ? '有密码保护' : '公开分享';

        html += 
          '<div class="share-card">' +
            '<div class="share-header">' +
              '<div class="share-icon">📤</div>' +
              '<div class="share-info">' +
                '<h3>' + share.bookTitle + '</h3>' +
                '<p class="share-code">分享码: ' + share.share_code + '</p>' +
                '<div class="share-badges">' +
                  '<span class="badge badge-blue">' + hasPassword + '</span>' +
                  '<span class="badge badge-gray">' + createdDate + '</span>' +
                '</div>' +
              '</div>' +
            '</div>' +
            '<div class="share-link-area">' +
              '<input type="text" value="' + shareUrl + '" readonly class="share-link-input">' +
              '<button class="copy-btn" onclick="copyShareUrl(\'' + shareUrl + '\')">复制</button>' +
            '</div>' +
            '<div class="share-actions">' +
              '<button class="delete-btn" onclick="confirmDeleteShare(\'' + share.share_id + '\')">删除分享</button>' +
            '</div>' +
          '</div>';
      });

      container.innerHTML = html;
    }

    function copyShareUrl(url) {
      navigator.clipboard.writeText(url).then(function() {
        showToast('链接已复制', 'success');
      }).catch(function() {
        showToast('复制失败，请手动复制', 'error');
      });
    }

    function confirmDeleteShare(shareId) {
      pendingShareId = shareId;
      document.getElementById('confirmDialog').style.display = 'flex';
    }

    function closeConfirmDialog() {
      document.getElementById('confirmDialog').style.display = 'none';
      pendingShareId = null;
    }

    document.getElementById('confirmDeleteBtn').addEventListener('click', async function() {
      if (!pendingShareId) return;

      showLoading();

      try {
        await fetchAPI('/share?id=' + pendingShareId, {
          method: 'DELETE'
        });

        hideLoading();
        closeConfirmDialog();
        showToast('分享已删除', 'success');
        loadShares();
      } catch (error) {
        hideLoading();
        showToast('删除失败：' + error.message, 'error');
      }
    });

    function showLoading() {
      document.getElementById('loadingOverlay').style.display = 'flex';
    }

    function hideLoading() {
      document.getElementById('loadingOverlay').style.display = 'none';
    }

    function showToast(message, type) {
      var existing = document.querySelector('.toast');
      if (existing) existing.remove();
      
      var toast = document.createElement('div');
      toast.className = 'toast ' + type;
      toast.textContent = message;
      document.body.appendChild(toast);
      
      setTimeout(function() {
        toast.remove();
      }, 3000);
    }
  </script>
</body>
</html>
