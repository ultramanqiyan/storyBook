<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>章节阅读 - 乐高故事书</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;600&family=Noto+Serif+SC:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --gold: #ffd700;
      --gold-dark: #b8860b;
      --gold-light: #ffed4a;
      --silver: #c0c0c0;
      --crimson: #dc2626;
      --purple: #a855f7;
      --green: #22c55e;
      --blue: #3b82f6;
      --orange: #f59e0b;
      --bg-dark: #0d0d14;
      --bg-medium: #1a1a2e;
      --bg-light: #252542;
      --text-primary: #f8fafc;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
      --font-title: 'Cinzel', serif;
      --font-body: 'Noto Sans SC', sans-serif;
      --font-serif: 'Noto Serif SC', serif;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: var(--font-body);
      background: var(--bg-dark);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
    }

    .bg-pattern {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: 
        radial-gradient(ellipse at 20% 20%, rgba(255, 215, 0, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 80%, rgba(168, 85, 247, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 50%, rgba(59, 130, 246, 0.05) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    #particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
    }

    .particle {
      position: absolute;
      width: 4px;
      height: 4px;
      background: var(--gold);
      border-radius: 50%;
      opacity: 0.6;
      animation: float 20s infinite ease-in-out;
      box-shadow: 0 0 6px var(--gold);
    }

    @keyframes float {
      0%, 100% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
      10% { opacity: 0.6; }
      90% { opacity: 0.6; }
      100% { transform: translateY(-100px) rotate(720deg); opacity: 0; }
    }

    .page-container {
      position: relative;
      z-index: 10;
      min-height: 100vh;
      padding-bottom: 80px;
    }

    .page-header {
      background: linear-gradient(180deg, var(--bg-medium), transparent);
      padding: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255, 215, 0, 0.1);
    }

    .page-header-left {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .back-btn {
      background: linear-gradient(135deg, var(--blue), var(--purple));
      color: white;
      border: none;
      width: 45px;
      height: 45px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
    }

    .back-btn:hover {
      transform: scale(1.1);
      box-shadow: 0 5px 20px rgba(59, 130, 246, 0.4);
    }

    .book-title {
      font-family: var(--font-title);
      font-size: 1.25rem;
      color: var(--gold);
    }

    .chapter-info {
      color: var(--text-secondary);
      font-size: 0.9rem;
    }

    .chapter-nav {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .nav-btn {
      background: var(--bg-light);
      border: 1px solid rgba(255, 215, 0, 0.3);
      color: var(--text-primary);
      width: 40px;
      height: 40px;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.3s ease;
      font-size: 1.1rem;
    }

    .nav-btn:hover:not(:disabled) {
      background: var(--gold);
      color: var(--bg-dark);
      border-color: var(--gold);
    }

    .nav-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    .chapter-count {
      font-family: var(--font-title);
      color: var(--gold);
      font-size: 0.95rem;
    }

    .content-wrapper {
      max-width: 800px;
      margin: 0 auto;
      padding: 20px;
    }

    .prompt-card {
      background: linear-gradient(145deg, var(--bg-medium), var(--bg-light));
      border: 2px solid rgba(59, 130, 246, 0.3);
      border-radius: 16px;
      margin-bottom: 25px;
      overflow: hidden;
    }

    .prompt-toggle {
      width: 100%;
      padding: 18px 20px;
      background: transparent;
      border: none;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      color: var(--text-primary);
    }

    .prompt-toggle-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .prompt-toggle-icon {
      font-size: 1.3rem;
    }

    .prompt-toggle-text {
      font-weight: 600;
      font-family: var(--font-title);
    }

    .prompt-arrow {
      color: var(--gold);
      transition: transform 0.3s ease;
    }

    .prompt-content {
      padding: 0 20px 20px;
      border-top: 1px solid rgba(255, 215, 0, 0.2);
      margin-top: 0;
      padding-top: 20px;
    }

    .prompt-block {
      margin-bottom: 18px;
    }

    .prompt-block:last-child {
      margin-bottom: 0;
    }

    .prompt-block h4 {
      font-size: 0.95rem;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .prompt-block h4.char-title { color: var(--crimson); }
    .prompt-block h4.bg-title { color: var(--blue); }
    .prompt-block h4.summary-title { color: var(--green); }

    .prompt-block-content {
      font-size: 0.9rem;
      color: var(--text-secondary);
      background: var(--bg-dark);
      padding: 12px;
      border-radius: 10px;
    }

    .char-item {
      margin-bottom: 10px;
      padding: 10px;
      background: var(--bg-light);
      border-radius: 8px;
      border-left: 3px solid var(--gold);
    }

    .char-item:last-child {
      margin-bottom: 0;
    }

    .char-name {
      color: var(--gold);
      font-weight: 600;
    }

    .char-detail {
      color: var(--text-muted);
      font-size: 0.85rem;
      margin-top: 4px;
    }

    .story-card {
      background: linear-gradient(145deg, var(--bg-medium), var(--bg-light));
      border: 2px solid rgba(255, 215, 0, 0.2);
      border-radius: 20px;
      padding: 30px;
      margin-bottom: 25px;
    }

    .chapter-title {
      font-family: var(--font-title);
      font-size: 1.8rem;
      text-align: center;
      color: var(--gold);
      margin-bottom: 25px;
      text-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
    }

    .story-content {
      font-family: var(--font-serif);
      font-size: 1.15rem;
      line-height: 2;
      color: var(--text-primary);
    }

    .story-content p {
      margin-bottom: 18px;
      text-indent: 2em;
    }

    .character-name { color: var(--gold); font-weight: 600; }
    .action { color: var(--purple); font-weight: 500; }
    .emotion { color: var(--green); font-weight: 500; }
    .location { color: var(--blue); font-weight: 500; }

    .puzzle-card {
      background: linear-gradient(145deg, rgba(255, 215, 0, 0.1), var(--bg-light));
      border: 2px solid var(--gold);
      border-radius: 20px;
      padding: 25px;
      margin-bottom: 25px;
    }

    .puzzle-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }

    .puzzle-icon {
      font-size: 2rem;
    }

    .puzzle-title {
      font-family: var(--font-title);
      font-size: 1.3rem;
      color: var(--gold);
    }

    .puzzle-question {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 20px;
      color: var(--text-primary);
    }

    .hint-area {
      background: var(--bg-dark);
      border: 1px solid var(--blue);
      border-radius: 12px;
      padding: 15px;
      margin-bottom: 20px;
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }

    .hint-icon {
      font-size: 1.3rem;
    }

    .hint-text {
      font-size: 0.9rem;
      color: var(--text-secondary);
    }

    .puzzle-options {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    .puzzle-option {
      background: var(--bg-medium);
      border: 2px solid rgba(255, 215, 0, 0.3);
      border-radius: 12px;
      padding: 15px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: all 0.3s ease;
      color: var(--text-primary);
      font-size: 1rem;
    }

    .puzzle-option:hover {
      border-color: var(--gold);
      background: var(--bg-light);
      transform: translateY(-3px);
    }

    .puzzle-option.correct {
      border-color: var(--green);
      background: rgba(34, 197, 94, 0.2);
    }

    .puzzle-option.wrong {
      border-color: var(--crimson);
      background: rgba(220, 38, 38, 0.2);
      animation: shake 0.5s ease;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      75% { transform: translateX(5px); }
    }

    .option-letter {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--gold), var(--gold-dark));
      color: var(--bg-dark);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      flex-shrink: 0;
    }

    .attempts-info {
      text-align: center;
      margin-top: 18px;
      color: var(--text-secondary);
      font-size: 0.9rem;
    }

    .attempts-count {
      color: var(--gold);
      font-weight: 600;
    }

    .puzzle-complete-card {
      background: linear-gradient(145deg, rgba(34, 197, 94, 0.2), var(--bg-light));
      border: 2px solid var(--green);
      border-radius: 20px;
      padding: 40px;
      text-align: center;
      margin-bottom: 25px;
    }

    .complete-icon {
      font-size: 4rem;
      margin-bottom: 15px;
    }

    .complete-title {
      font-family: var(--font-title);
      font-size: 1.5rem;
      color: var(--green);
      margin-bottom: 10px;
    }

    .complete-text {
      color: var(--text-secondary);
    }

    .continue-area {
      text-align: center;
      margin-top: 30px;
    }

    .continue-btn {
      background: linear-gradient(135deg, var(--gold), var(--gold-dark));
      color: var(--bg-dark);
      border: none;
      padding: 18px 40px;
      border-radius: 12px;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      font-family: var(--font-body);
    }

    .continue-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 30px rgba(255, 215, 0, 0.3);
    }

    .plot-modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.8);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      backdrop-filter: blur(5px);
    }

    .plot-modal-content {
      background: linear-gradient(145deg, var(--bg-medium), var(--bg-light));
      border: 2px solid var(--gold);
      border-radius: 20px;
      width: 90%;
      max-width: 600px;
      max-height: 85vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
    }

    .plot-modal-header {
      background: linear-gradient(135deg, var(--crimson), var(--orange));
      padding: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .plot-modal-header h3 {
      font-family: var(--font-title);
      font-size: 1.3rem;
      color: white;
    }

    .plot-modal-close {
      background: rgba(255, 255, 255, 0.2);
      border: none;
      color: white;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      font-size: 1.3rem;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .plot-modal-close:hover {
      background: rgba(255, 255, 255, 0.3);
    }

    .plot-modal-body {
      padding: 25px;
      overflow-y: auto;
      flex: 1;
    }

    .plot-section {
      margin-bottom: 25px;
    }

    .plot-section:last-child {
      margin-bottom: 0;
    }

    .plot-section h4 {
      font-size: 1rem;
      color: var(--gold);
      margin-bottom: 12px;
      font-family: var(--font-title);
    }

    .plot-options {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    .plot-option-btn {
      background: var(--bg-dark);
      border: 2px solid rgba(255, 215, 0, 0.2);
      border-radius: 10px;
      padding: 12px 8px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      transition: all 0.3s ease;
    }

    .plot-option-btn:hover {
      border-color: var(--gold);
      background: var(--bg-light);
    }

    .plot-option-btn.selected {
      border-color: var(--gold);
      background: rgba(255, 215, 0, 0.15);
    }

    .plot-option-icon {
      font-size: 1.5rem;
    }

    .plot-option-name {
      font-size: 0.75rem;
      color: var(--text-secondary);
      text-align: center;
    }

    .plot-option-btn.selected .plot-option-name {
      color: var(--gold);
    }

    .plot-modal-footer {
      padding: 20px;
      border-top: 1px solid rgba(255, 215, 0, 0.2);
      display: flex;
      justify-content: space-between;
      gap: 15px;
    }

    .modal-btn {
      flex: 1;
      padding: 14px;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      font-family: var(--font-body);
    }

    .modal-btn.random {
      background: var(--bg-dark);
      color: var(--text-primary);
      border: 2px solid rgba(255, 215, 0, 0.3);
    }

    .modal-btn.random:hover {
      border-color: var(--gold);
    }

    .modal-btn.confirm {
      background: linear-gradient(135deg, var(--gold), var(--gold-dark));
      color: var(--bg-dark);
    }

    .modal-btn.confirm:hover {
      box-shadow: 0 5px 20px rgba(255, 215, 0, 0.3);
    }

    .loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(13, 13, 20, 0.95);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 2000;
      flex-direction: column;
      gap: 20px;
    }

    .loading-spinner {
      width: 60px;
      height: 60px;
      border: 4px solid rgba(255, 215, 0, 0.2);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-text {
      color: var(--gold);
      font-family: var(--font-title);
      font-size: 1.2rem;
    }

    .loading-subtext {
      color: var(--text-secondary);
      font-size: 0.9rem;
    }

    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      padding: 15px 30px;
      border-radius: 10px;
      font-size: 0.95rem;
      z-index: 1001;
      animation: slideUp 0.3s ease;
    }

    .toast.success {
      background: linear-gradient(135deg, var(--green), #16a34a);
      color: white;
    }

    .toast.error {
      background: linear-gradient(135deg, var(--crimson), #b91c1c);
      color: white;
    }

    @keyframes slideUp {
      from { transform: translateX(-50%) translateY(20px); opacity: 0; }
      to { transform: translateX(-50%) translateY(0); opacity: 1; }
    }

    @media (max-width: 600px) {
      .page-header {
        flex-direction: column;
        gap: 15px;
        padding: 15px;
      }

      .page-header-left {
        width: 100%;
      }

      .chapter-nav {
        width: 100%;
        justify-content: center;
      }

      .story-card {
        padding: 20px;
      }

      .chapter-title {
        font-size: 1.4rem;
      }

      .story-content {
        font-size: 1rem;
      }

      .puzzle-options {
        grid-template-columns: 1fr;
      }

      .plot-options {
        grid-template-columns: repeat(2, 1fr);
      }

      .plot-modal-footer {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="bg-pattern"></div>
  <div id="particles"></div>

  <div class="page-container">
    <header class="page-header">
      <div class="page-header-left">
        <a href="#" id="backBtn" class="back-btn">←</a>
        <div>
          <h1 class="book-title" id="bookTitle">加载中...</h1>
          <p class="chapter-info" id="chapterInfo">第 1 章</p>
        </div>
      </div>

      <div class="chapter-nav">
        <button id="prevChapterBtn" class="nav-btn" disabled>←</button>
        <span id="chapterNav" class="chapter-count">1 / 1</span>
        <button id="nextChapterBtn" class="nav-btn" disabled>→</button>
      </div>
    </header>

    <div class="content-wrapper">
      <div id="promptSection" class="prompt-card">
        <button id="promptToggle" class="prompt-toggle" onclick="togglePrompt()">
          <div class="prompt-toggle-left">
            <span class="prompt-toggle-icon">📝</span>
            <span class="prompt-toggle-text">故事创作提示</span>
          </div>
          <span id="promptArrow" class="prompt-arrow">▼</span>
        </button>
        <div id="promptContent" class="prompt-content" style="display: none;">
          <div class="prompt-block">
            <h4 class="char-title">🎭 角色信息</h4>
            <div id="promptCharacters" class="prompt-block-content"></div>
          </div>
          <div class="prompt-block">
            <h4 class="bg-title">📖 故事背景</h4>
            <div id="promptBackground" class="prompt-block-content"></div>
          </div>
          <div class="prompt-block">
            <h4 class="summary-title">📚 前情提要</h4>
            <div id="promptSummary" class="prompt-block-content"></div>
          </div>
        </div>
      </div>

      <div class="story-card">
        <h2 id="chapterTitle" class="chapter-title">加载中...</h2>
        <div id="storyContent" class="story-content">
          <p style="text-align: center; color: var(--text-muted);">正在加载故事内容...</p>
        </div>
      </div>

      <div id="puzzleArea" class="puzzle-card" style="display: none;">
        <div class="puzzle-header">
          <span class="puzzle-icon">❓</span>
          <h3 class="puzzle-title">互动谜题</h3>
        </div>

        <p id="puzzleQuestion" class="puzzle-question"></p>

        <div id="hintArea" class="hint-area" style="display: none;">
          <span class="hint-icon">💡</span>
          <p id="hintText" class="hint-text"></p>
        </div>

        <div id="puzzleOptions" class="puzzle-options"></div>

        <p id="attemptsInfo" class="attempts-info">
          尝试次数: <span id="attemptsCount" class="attempts-count">0</span> / 3
        </p>
      </div>

      <div id="puzzleComplete" class="puzzle-complete-card" style="display: none;">
        <span class="complete-icon">✅</span>
        <h3 class="complete-title">太棒了！</h3>
        <p class="complete-text">你成功解开了谜题，可以继续冒险了！</p>
      </div>

      <div id="continueArea" class="continue-area" style="display: none;">
        <button id="continueBtn" class="continue-btn">✨ 继续生成故事</button>
      </div>
    </div>
  </div>

  <div id="plotModal" class="plot-modal">
    <div class="plot-modal-content">
      <div class="plot-modal-header">
        <h3>🎭 选择故事情节</h3>
        <button class="plot-modal-close" onclick="closePlotModal()">×</button>
      </div>
      <div class="plot-modal-body">
        <div class="plot-section">
          <h4>☀️ 天气</h4>
          <div class="plot-options" id="weatherOptions"></div>
        </div>
        <div class="plot-section">
          <h4>🗺️ 冒险类型</h4>
          <div class="plot-options" id="adventureTypeOptions"></div>
        </div>
        <div class="plot-section">
          <h4>🌲 地形</h4>
          <div class="plot-options" id="terrainOptions"></div>
        </div>
        <div class="plot-section">
          <h4>🪄 装备与道具</h4>
          <div class="plot-options" id="equipmentOptions"></div>
        </div>
      </div>
      <div class="plot-modal-footer">
        <button class="modal-btn random" onclick="randomPlotSelection()">🎲 随机选择</button>
        <button class="modal-btn confirm" onclick="confirmPlotSelection()">✨ 确认生成</button>
      </div>
    </div>
  </div>

  <div id="loadingOverlay" class="loading-overlay">
    <div class="loading-spinner"></div>
    <div class="loading-text">AI正在创作新章节...</div>
    <div class="loading-subtext">发挥想象力，编织精彩故事</div>
  </div>

  <script src="js/utils.js"></script>
  <script>
    for (var i = 0; i < 15; i++) {
      var p = document.createElement('div');
      p.className = 'particle';
      p.style.left = Math.random() * 100 + '%';
      p.style.animationDelay = Math.random() * 20 + 's';
      document.getElementById('particles').appendChild(p);
    }

    var userId = requireAuth();
    var bookId = getQueryParam('bookId');
    var chapterId = getQueryParam('chapterId');
    var book = null;
    var currentChapter = null;
    var currentChapterIndex = 0;
    var selectedAnswer = null;
    var attempts = 0;
    var puzzleSolved = false;
    var promptExpanded = false;
    var plotOptions = null;
    var selectedPlot = {
      weather: null,
      adventureType: null,
      terrain: null,
      equipment: null
    };

    document.addEventListener('DOMContentLoaded', function() {
      if (!bookId) {
        window.location.href = 'index.html';
        return;
      }

      loadBook();

      document.getElementById('backBtn').href = 'book.html?id=' + bookId;
      
      document.getElementById('prevChapterBtn').addEventListener('click', function() {
        if (currentChapterIndex > 0) {
          navigateChapter(currentChapterIndex - 1);
        }
      });

      document.getElementById('nextChapterBtn').addEventListener('click', function() {
        if (currentChapterIndex < book.chapters.length - 1) {
          navigateChapter(currentChapterIndex + 1);
        }
      });

      document.getElementById('continueBtn').addEventListener('click', handleContinue);
    });

    function togglePrompt() {
      promptExpanded = !promptExpanded;
      var content = document.getElementById('promptContent');
      var arrow = document.getElementById('promptArrow');
      
      if (promptExpanded) {
        content.style.display = 'block';
        arrow.textContent = '▲';
      } else {
        content.style.display = 'none';
        arrow.textContent = '▼';
      }
    }

    async function loadBook() {
      try {
        var data = await fetchAPI('/books/' + bookId + '?userId=' + userId);
        book = data.book;
        
        if (chapterId) {
          currentChapterIndex = book.chapters.findIndex(function(c) { return c.id === chapterId; });
          if (currentChapterIndex === -1) currentChapterIndex = 0;
        } else {
          currentChapterIndex = book.chapters.length - 1;
        }
        
        renderChapter();
        renderPromptInfo();
      } catch (error) {
        showToast('加载书籍失败', 'error');
        console.error(error);
      }
    }

    function renderPromptInfo() {
      var charactersHtml = '';
      if (book.characters && book.characters.length > 0) {
        charactersHtml = book.characters.map(function(char) {
          var roleLabel = getRoleLabel(char.role);
          return '<div class="char-item">' +
            '<span class="char-name">' + char.customName + '</span> (' + roleLabel + ')' +
            (char.personality ? '<div class="char-detail">性格: ' + char.personality + '</div>' : '') +
            (char.speechStyle ? '<div class="char-detail">说话风格: ' + char.speechStyle + '</div>' : '') +
          '</div>';
        }).join('');
      } else {
        charactersHtml = '<p style="color: var(--text-muted);">暂无角色信息</p>';
      }
      document.getElementById('promptCharacters').innerHTML = charactersHtml;

      var backgroundHtml = '';
      if (book.plotSelection || book.plotType || book.theme || book.setting) {
        backgroundHtml = '<div style="padding: 10px; background: var(--bg-light); border-radius: 8px;">';
        if (book.plotSelection) {
          backgroundHtml += '<p style="margin-bottom: 8px; color: var(--gold);">🎭 情节设定</p>';
          if (book.plotSelection.weather) {
            backgroundHtml += '<p style="font-size: 0.85rem;">☀️ 天气: ' + getPlotNameDisplay('weather', book.plotSelection.weather) + '</p>';
          }
          if (book.plotSelection.adventureType) {
            backgroundHtml += '<p style="font-size: 0.85rem;">🗺️ 冒险: ' + getPlotNameDisplay('adventureType', book.plotSelection.adventureType) + '</p>';
          }
          if (book.plotSelection.terrain) {
            backgroundHtml += '<p style="font-size: 0.85rem;">🌲 地形: ' + getPlotNameDisplay('terrain', book.plotSelection.terrain) + '</p>';
          }
          if (book.plotSelection.equipment) {
            backgroundHtml += '<p style="font-size: 0.85rem;">🪄 装备: ' + getPlotNameDisplay('equipment', book.plotSelection.equipment) + '</p>';
          }
        }
        if (book.plotType) backgroundHtml += '<p><strong>情节类型:</strong> ' + book.plotType + '</p>';
        if (book.theme) backgroundHtml += '<p><strong>主题:</strong> ' + book.theme + '</p>';
        if (book.setting) backgroundHtml += '<p><strong>场景:</strong> ' + book.setting + '</p>';
        backgroundHtml += '</div>';
      } else {
        backgroundHtml = '<p style="color: var(--text-muted);">暂无背景信息</p>';
      }
      document.getElementById('promptBackground').innerHTML = backgroundHtml;

      var summaryHtml = '';
      if (currentChapterIndex > 0) {
        var prevChapter = book.chapters[currentChapterIndex - 1];
        summaryHtml = '<div style="padding: 10px; background: var(--bg-light); border-radius: 8px;">' +
          '<p style="color: var(--gold); margin-bottom: 8px;">上一章: ' + prevChapter.title + '</p>' +
          '<p style="font-size: 0.85rem; color: var(--text-secondary);">' + getShortSummary(prevChapter.content) + '</p>' +
        '</div>';
      } else {
        summaryHtml = '<p style="color: var(--text-muted);">这是第一章，故事刚刚开始...</p>';
      }
      document.getElementById('promptSummary').innerHTML = summaryHtml;
    }

    function getRoleLabel(role) {
      var labels = {
        'protagonist': '主人公',
        'supporting': '配角',
        'villain': '反派',
        'npc': '路人'
      };
      return labels[role] || role;
    }

    function getShortSummary(content) {
      if (!content) return '暂无内容';
      var text = content.replace(/<[^>]*>/g, '');
      if (text.length > 200) {
        return text.substring(0, 200) + '...';
      }
      return text;
    }

    function getPlotNameDisplay(category, id) {
      var plotNames = {
        weather: {
          sunny: '晴天', rainy: '下雨', thunder: '打雷', snow: '下雪',
          fog: '大雾', wind: '狂风', rainbow: '彩虹', starry: '星夜'
        },
        adventureType: {
          friendship: '友谊考验', adventure: '冒险之旅', wisdom: '智慧挑战', courage: '勇气试炼',
          treasure: '寻宝探险', rescue: '救援任务', mystery: '神秘探索', competition: '竞技比赛'
        },
        terrain: {
          forest: '森林', castle: '城堡', ocean: '海洋', desert: '沙漠',
          mountain: '山峰', glacier: '冰川', volcano: '火山', city: '城市'
        },
        equipment: {
          wand: '魔法杖', shield: '盾牌', map: '地图', telescope: '望远镜',
          sword: '宝剑', potion: '药水', flyer: '飞行器', cloak: '隐身斗篷'
        }
      };
      
      return (plotNames[category] && plotNames[category][id]) || id;
    }

    function renderChapter() {
      if (!book || book.chapters.length === 0) {
        window.location.href = 'book.html?id=' + bookId;
        return;
      }

      currentChapter = book.chapters[currentChapterIndex];
      
      document.getElementById('bookTitle').textContent = book.title;
      document.getElementById('chapterInfo').textContent = '第 ' + currentChapter.number + ' 章';
      document.getElementById('chapterNav').textContent = (currentChapterIndex + 1) + ' / ' + book.chapters.length;
      document.getElementById('chapterTitle').textContent = currentChapter.title;

      document.getElementById('prevChapterBtn').disabled = currentChapterIndex === 0;
      document.getElementById('nextChapterBtn').disabled = currentChapterIndex === book.chapters.length - 1;

      var content = highlightContent(currentChapter.content);
      document.getElementById('storyContent').innerHTML = content;

      var puzzleArea = document.getElementById('puzzleArea');
      var puzzleComplete = document.getElementById('puzzleComplete');
      var continueArea = document.getElementById('continueArea');

      if (currentChapter.puzzle && !currentChapter.isCompleted) {
        puzzleArea.style.display = 'block';
        puzzleComplete.style.display = 'none';
        continueArea.style.display = 'none';
        renderPuzzle();
      } else if (currentChapter.isCompleted) {
        puzzleArea.style.display = 'none';
        puzzleComplete.style.display = 'block';
        continueArea.style.display = 'block';
      } else {
        puzzleArea.style.display = 'none';
        puzzleComplete.style.display = 'none';
        continueArea.style.display = 'block';
      }

      puzzleSolved = false;
      selectedAnswer = null;
      attempts = 0;
    }

    function highlightContent(content) {
      if (!content) return '';
      
      var highlighted = content
        .replace(/(\S+?)说/g, '<span class="character-name">$1</span>说')
        .replace(/(\S+?)走/g, '<span class="action">$1</span>走')
        .replace(/(\S+?)跑/g, '<span class="action">$1</span>跑')
        .replace(/开心/g, '<span class="emotion">开心</span>')
        .replace(/害怕/g, '<span class="emotion">害怕</span>')
        .replace(/森林/g, '<span class="location">森林</span>')
        .replace(/城堡/g, '<span class="location">城堡</span>')
        .replace(/\n/g, '</p><p>');

      return '<p>' + highlighted + '</p>';
    }

    function renderPuzzle() {
      var puzzle = currentChapter.puzzle;
      if (!puzzle) return;

      document.getElementById('puzzleQuestion').textContent = puzzle.question;
      document.getElementById('hintText').textContent = puzzle.hint || '仔细想想故事的情节...';
      document.getElementById('attemptsCount').textContent = attempts;

      var optionsHtml = puzzle.options.map(function(option, index) {
        var letter = String.fromCharCode(65 + index);
        return '<button class="puzzle-option" onclick="selectAnswer(' + index + ')" data-index="' + index + '">' +
          '<span class="option-letter">' + letter + '</span>' +
          '<span>' + option + '</span>' +
        '</button>';
      }).join('');

      document.getElementById('puzzleOptions').innerHTML = optionsHtml;
    }

    function selectAnswer(index) {
      if (selectedAnswer !== null || puzzleSolved) return;

      selectedAnswer = index;
      var puzzle = currentChapter.puzzle;
      var buttons = document.querySelectorAll('.puzzle-option');
      
      var userAnswer = String.fromCharCode(65 + index);
      
      verifyAnswer(puzzle.id, userAnswer, index, buttons);
    }

    async function verifyAnswer(puzzleId, userAnswer, index, buttons) {
      try {
        var result = await fetchAPI('/puzzle', {
          method: 'POST',
          body: JSON.stringify({
            puzzleId: puzzleId,
            userId: userId,
            userAnswer: userAnswer
          })
        });
        
        attempts = result.attempts;
        document.getElementById('attemptsCount').textContent = attempts;
        
        var isCorrect = result.isCorrect;
        buttons[index].classList.add(isCorrect ? 'correct' : 'wrong');

        setTimeout(function() {
          if (isCorrect) {
            puzzleSolved = true;
            showToast('答对了！真棒！', 'success');
            completeChapter();
            
            document.getElementById('puzzleArea').style.display = 'none';
            document.getElementById('puzzleComplete').style.display = 'block';
            document.getElementById('continueArea').style.display = 'block';
          } else {
            showToast('再想想看！', 'error');
            
            if (result.hint) {
              document.getElementById('hintText').textContent = result.hint;
              document.getElementById('hintArea').style.display = 'block';
            } else if (attempts >= 2) {
              document.getElementById('hintArea').style.display = 'block';
            }
            
            setTimeout(function() {
              buttons[index].classList.remove('wrong');
              selectedAnswer = null;
            }, 1000);
          }
        }, 500);
      } catch (error) {
        showToast('验证答案失败', 'error');
        selectedAnswer = null;
      }
    }

    async function completeChapter() {
      try {
        await fetchAPI('/chapters-complete/books/' + bookId + '/chapters/' + currentChapter.id, {
          method: 'POST',
          body: JSON.stringify({ userId: userId })
        });
        
        currentChapter.isCompleted = true;
      } catch (error) {
        console.error('标记章节完成失败:', error);
      }
    }

    async function handleContinue() {
      if (book.chapters.length >= 100) {
        showToast('本书籍已达章节上限，请创建新书籍', 'error');
        return;
      }

      showPlotModal();
    }

    function showPlotModal() {
      if (!plotOptions) {
        loadPlotOptions();
        return;
      }
      
      document.getElementById('plotModal').style.display = 'flex';
      renderPlotOptions();
    }

    async function loadPlotOptions() {
      try {
        var data = await fetchAPI('/plot-options');
        plotOptions = data.plotOptions;
        showPlotModal();
      } catch (error) {
        console.error('加载情节选项失败:', error);
        generateChapterWithRandomPlot();
      }
    }

    function renderPlotOptions() {
      renderPlotCategory('weatherOptions', plotOptions.weather, 'weather');
      renderPlotCategory('adventureTypeOptions', plotOptions.adventureType, 'adventureType');
      renderPlotCategory('terrainOptions', plotOptions.terrain, 'terrain');
      renderPlotCategory('equipmentOptions', plotOptions.equipment, 'equipment');
    }

    function renderPlotCategory(containerId, options, category) {
      var container = document.getElementById(containerId);
      var html = '';
      
      for (var i = 0; i < options.length; i++) {
        var option = options[i];
        var selected = selectedPlot[category] === option.id ? 'selected' : '';
        html += '<button class="plot-option-btn ' + selected + '" onclick="selectPlotOption(\'' + category + '\', \'' + option.id + '\')">' +
          '<span class="plot-option-icon">' + option.icon + '</span>' +
          '<span class="plot-option-name">' + option.name + '</span>' +
          '</button>';
      }
      
      container.innerHTML = html;
    }

    function selectPlotOption(category, id) {
      selectedPlot[category] = id;
      renderPlotOptions();
    }

    function randomPlotSelection() {
      if (!plotOptions) return;
      
      selectedPlot.weather = plotOptions.weather[Math.floor(Math.random() * plotOptions.weather.length)].id;
      selectedPlot.adventureType = plotOptions.adventureType[Math.floor(Math.random() * plotOptions.adventureType.length)].id;
      selectedPlot.terrain = plotOptions.terrain[Math.floor(Math.random() * plotOptions.terrain.length)].id;
      selectedPlot.equipment = plotOptions.equipment[Math.floor(Math.random() * plotOptions.equipment.length)].id;
      
      renderPlotOptions();
    }

    function closePlotModal() {
      document.getElementById('plotModal').style.display = 'none';
    }

    async function confirmPlotSelection() {
      if (!selectedPlot.weather || !selectedPlot.adventureType || !selectedPlot.terrain || !selectedPlot.equipment) {
        showToast('请选择所有情节选项，或点击随机选择', 'error');
        return;
      }
      
      closePlotModal();
      await generateChapterWithPlot(selectedPlot);
    }

    async function generateChapterWithRandomPlot() {
      closePlotModal();
      await generateChapterWithPlot(null);
    }

    function showLoading(message, subtext) {
      document.querySelector('.loading-text').textContent = message || '加载中...';
      document.querySelector('.loading-subtext').textContent = subtext || '';
      document.getElementById('loadingOverlay').style.display = 'flex';
    }

    function hideLoading() {
      document.getElementById('loadingOverlay').style.display = 'none';
    }

    async function generateChapterWithPlot(plotSelection) {
      showLoading('AI正在创作新章节...', '发挥想象力，编织精彩故事');

      try {
        var body = { userId: userId };
        if (plotSelection) {
          body.plotSelection = plotSelection;
        }
        
        await fetchAPI('/chapters-generate/books/' + bookId, {
          method: 'POST',
          body: JSON.stringify(body)
        });

        hideLoading();
        showToast('新章节生成成功！', 'success');
        loadBook();
      } catch (error) {
        hideLoading();
        showToast('生成失败：' + error.message, 'error');
      }
    }

    function navigateChapter(index) {
      currentChapterIndex = index;
      renderChapter();
      renderPromptInfo();
    }

    function showToast(message, type) {
      var existing = document.querySelector('.toast');
      if (existing) existing.remove();
      
      var toast = document.createElement('div');
      toast.className = 'toast ' + type;
      toast.textContent = message;
      document.body.appendChild(toast);
      
      setTimeout(function() {
        toast.remove();
      }, 3000);
    }
  </script>
</body>
</html>
