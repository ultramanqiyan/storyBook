<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>选择主题风格 - 乐高故事书</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --gold: #ffd700;
      --gold-dark: #b8860b;
      --gold-light: #ffed4a;
      --silver: #c0c0c0;
      --crimson: #dc2626;
      --purple: #a855f7;
      --green: #22c55e;
      --blue: #3b82f6;
      --orange: #f59e0b;
      --bg-dark: #0d0d14;
      --bg-medium: #1a1a2e;
      --bg-light: #252542;
      --text-primary: #f8fafc;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
      --font-title: 'Cinzel', serif;
      --font-body: 'Noto Sans SC', sans-serif;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: var(--font-body);
      background: var(--bg-dark);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .bg-pattern {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: 
        radial-gradient(ellipse at 20% 20%, rgba(255, 215, 0, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 80%, rgba(168, 85, 247, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 50%, rgba(59, 130, 246, 0.05) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    #particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
    }

    .particle {
      position: absolute;
      width: 4px;
      height: 4px;
      background: var(--gold);
      border-radius: 50%;
      opacity: 0.6;
      animation: float 20s infinite ease-in-out;
      box-shadow: 0 0 6px var(--gold);
    }

    @keyframes float {
      0%, 100% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
      10% { opacity: 0.6; }
      90% { opacity: 0.6; }
      100% { transform: translateY(-100px) rotate(720deg); opacity: 0; }
    }

    .theme-selector-container {
      position: relative;
      z-index: 10;
      max-width: 900px;
      width: 100%;
    }

    .page-title {
      text-align: center;
      margin-bottom: 40px;
    }

    .page-title h1 {
      font-family: var(--font-title);
      font-size: 2.5rem;
      background: linear-gradient(135deg, var(--gold), var(--gold-light), var(--gold));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 10px;
      letter-spacing: 2px;
    }

    .page-title p {
      color: var(--text-secondary);
      font-size: 1.1rem;
    }

    .themes-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 25px;
      margin-bottom: 40px;
    }

    .theme-card {
      background: linear-gradient(145deg, var(--bg-medium), var(--bg-light));
      border: 2px solid rgba(255, 215, 0, 0.2);
      border-radius: 20px;
      overflow: hidden;
      transition: all 0.4s ease;
      cursor: pointer;
      position: relative;
    }

    .theme-card::before {
      content: '';
      display: block;
      height: 8px;
    }

    .theme-card.default::before {
      background: linear-gradient(90deg, var(--crimson), var(--gold), var(--blue), var(--green));
    }

    .theme-card.immersive::before {
      background: linear-gradient(90deg, #6366F1, #8B5CF6, var(--gold));
    }

    .theme-card.gamified::before {
      background: linear-gradient(90deg, var(--green), var(--orange), var(--crimson));
    }

    .theme-card:hover {
      transform: translateY(-10px);
      border-color: var(--gold);
      box-shadow: 0 20px 40px rgba(255, 215, 0, 0.15);
    }

    .theme-card.selected {
      border-color: var(--gold);
      box-shadow: 0 0 30px rgba(255, 215, 0, 0.3);
    }

    .theme-card.selected::after {
      content: '✓';
      position: absolute;
      top: 20px;
      right: 20px;
      width: 40px;
      height: 40px;
      background: var(--green);
      color: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      font-weight: bold;
      box-shadow: 0 4px 15px rgba(34, 197, 94, 0.4);
    }

    .theme-preview {
      height: 180px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .theme-card.default .theme-preview {
      background: linear-gradient(135deg, #FFFBF0, #FFF8E7);
    }

    .theme-card.immersive .theme-preview {
      background: linear-gradient(135deg, #1E1B4B, #312E81);
    }

    .theme-card.gamified .theme-preview {
      background: linear-gradient(135deg, #064E3B, #065F46);
    }

    .theme-icon {
      font-size: 5rem;
      position: relative;
      z-index: 1;
    }

    .theme-card.immersive .theme-icon,
    .theme-card.gamified .theme-icon {
      filter: drop-shadow(0 0 20px rgba(255, 255, 255, 0.3));
    }

    .theme-info {
      padding: 25px;
    }

    .theme-info h3 {
      font-family: var(--font-title);
      font-size: 1.4rem;
      color: var(--gold);
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .theme-info p {
      color: var(--text-secondary);
      font-size: 0.95rem;
      margin-bottom: 15px;
    }

    .theme-features {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .feature-tag {
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 500;
    }

    .theme-card.default .feature-tag {
      background: rgba(255, 215, 0, 0.15);
      color: var(--gold);
    }

    .theme-card.immersive .feature-tag {
      background: rgba(139, 92, 246, 0.2);
      color: var(--purple);
    }

    .theme-card.gamified .feature-tag {
      background: rgba(34, 197, 94, 0.2);
      color: var(--green);
    }

    .action-buttons {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .btn {
      padding: 15px 40px;
      border-radius: 12px;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      border: none;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-family: var(--font-body);
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--gold), var(--gold-dark));
      color: var(--bg-dark);
    }

    .btn-primary:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 30px rgba(255, 215, 0, 0.3);
    }

    .btn-secondary {
      background: var(--bg-medium);
      color: var(--text-primary);
      border: 2px solid rgba(255, 215, 0, 0.3);
    }

    .btn-secondary:hover {
      border-color: var(--gold);
      background: var(--bg-light);
    }

    .preview-section {
      margin-top: 60px;
      text-align: center;
    }

    .preview-section h2 {
      font-family: var(--font-title);
      font-size: 1.8rem;
      color: var(--gold);
      margin-bottom: 20px;
    }

    .preview-frame {
      background: linear-gradient(145deg, var(--bg-medium), var(--bg-light));
      border: 2px solid rgba(255, 215, 0, 0.2);
      border-radius: 20px;
      padding: 30px;
      max-width: 800px;
      margin: 0 auto;
    }

    .preview-frame h4 {
      font-family: var(--font-title);
      color: var(--gold);
      margin-bottom: 20px;
    }

    .preview-components {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
    }

    .preview-btn {
      padding: 12px 24px;
      border-radius: 10px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      border: none;
      font-family: var(--font-body);
    }

    .preview-btn.primary {
      background: linear-gradient(135deg, var(--gold), var(--gold-dark));
      color: var(--bg-dark);
    }

    .preview-btn.secondary {
      background: var(--bg-dark);
      color: var(--text-primary);
      border: 2px solid rgba(255, 215, 0, 0.3);
    }

    .preview-card {
      padding: 20px;
      background: var(--bg-dark);
      border-radius: 12px;
      text-align: center;
      border: 1px solid rgba(255, 215, 0, 0.2);
    }

    .preview-card p {
      color: var(--text-secondary);
    }

    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      padding: 15px 30px;
      border-radius: 10px;
      font-size: 0.95rem;
      z-index: 1000;
      animation: slideUp 0.3s ease;
    }

    .toast.success {
      background: linear-gradient(135deg, var(--green), #16a34a);
      color: white;
    }

    @keyframes slideUp {
      from { transform: translateX(-50%) translateY(20px); opacity: 0; }
      to { transform: translateX(-50%) translateY(0); opacity: 1; }
    }

    @media (max-width: 600px) {
      .page-title h1 {
        font-size: 2rem;
      }

      .themes-grid {
        grid-template-columns: 1fr;
      }

      .action-buttons {
        flex-direction: column;
        align-items: center;
      }

      .btn {
        width: 100%;
        justify-content: center;
      }
    }
  </style>
</head>
<body>
  <div class="bg-pattern"></div>
  <div id="particles"></div>

  <div class="theme-selector-container">
    <div class="page-title">
      <h1>🎨 选择主题风格</h1>
      <p>为你的故事书选择一个独特的视觉风格</p>
    </div>
    
    <div class="themes-grid">
      <div class="theme-card default" data-theme="default">
        <div class="theme-preview">
          <span class="theme-icon">🧱</span>
        </div>
        <div class="theme-info">
          <h3>经典乐高</h3>
          <p>经典乐高风格，活力童趣，适合所有年龄段</p>
          <div class="theme-features">
            <span class="feature-tag">品牌经典</span>
            <span class="feature-tag">活力童趣</span>
            <span class="feature-tag">丰富动画</span>
          </div>
        </div>
      </div>
      
      <div class="theme-card immersive" data-theme="immersive">
        <div class="theme-preview">
          <span class="theme-icon">📖</span>
        </div>
        <div class="theme-info">
          <h3>沉浸故事</h3>
          <p>古典故事书风格，羊皮纸质感，沉浸式阅读体验</p>
          <div class="theme-features">
            <span class="feature-tag">古典优雅</span>
            <span class="feature-tag">故事感</span>
            <span class="feature-tag">沉浸体验</span>
          </div>
        </div>
      </div>
      
      <div class="theme-card gamified" data-theme="gamified">
        <div class="theme-preview">
          <span class="theme-icon">🎮</span>
        </div>
        <div class="theme-info">
          <h3>游戏冒险</h3>
          <p>游戏化界面风格，等级成就系统，增强用户粘性</p>
          <div class="theme-features">
            <span class="feature-tag">游戏化</span>
            <span class="feature-tag">成就系统</span>
            <span class="feature-tag">用户粘性</span>
          </div>
        </div>
      </div>
    </div>
    
    <div class="action-buttons">
      <a href="index.html" class="btn btn-secondary">← 返回首页</a>
      <button class="btn btn-primary" id="applyThemeBtn">应用选中主题</button>
    </div>
    
    <div class="preview-section">
      <h2>👁️ 实时预览</h2>
      <div class="preview-frame">
        <h4>当前主题效果预览</h4>
        <div class="preview-components">
          <button class="preview-btn primary">主要按钮</button>
          <button class="preview-btn secondary">次要按钮</button>
          <div class="preview-card">
            <p>卡片样式预览</p>
          </div>
        </div>
      </div>
    </div>
  </div>
  
  <script src="js/theme-manager.js"></script>
  <script>
    for (var i = 0; i < 15; i++) {
      var p = document.createElement('div');
      p.className = 'particle';
      p.style.left = Math.random() * 100 + '%';
      p.style.animationDelay = Math.random() * 20 + 's';
      document.getElementById('particles').appendChild(p);
    }

    document.addEventListener('DOMContentLoaded', function() {
      var themeCards = document.querySelectorAll('.theme-card');
      var applyBtn = document.getElementById('applyThemeBtn');
      var selectedTheme = localStorage.getItem('lego-story-theme') || 'default';
      
      function updateSelectedCard(theme) {
        themeCards.forEach(function(card) {
          if (card.dataset.theme === theme) {
            card.classList.add('selected');
          } else {
            card.classList.remove('selected');
          }
        });
      }
      
      updateSelectedCard(selectedTheme);
      
      themeCards.forEach(function(card) {
        card.addEventListener('click', function() {
          var theme = this.dataset.theme;
          selectedTheme = theme;
          updateSelectedCard(theme);
          if (typeof ThemeManager !== 'undefined') {
            ThemeManager.applyTheme(theme);
          }
        });
      });
      
      applyBtn.addEventListener('click', function() {
        if (typeof ThemeManager !== 'undefined') {
          ThemeManager.applyTheme(selectedTheme);
          var themeData = ThemeManager.getThemeData ? ThemeManager.getThemeData(selectedTheme) : { name: selectedTheme };
          showToast('主题已应用：' + themeData.name);
        } else {
          localStorage.setItem('lego-story-theme', selectedTheme);
          showToast('主题已保存');
        }
        setTimeout(function() {
          window.location.href = 'index.html';
        }, 1000);
      });
      
      document.addEventListener('themeChanged', function(e) {
        if (e.detail) {
          updateSelectedCard(e.detail.theme);
        }
      });
    });

    function showToast(message) {
      var existing = document.querySelector('.toast');
      if (existing) existing.remove();
      
      var toast = document.createElement('div');
      toast.className = 'toast success';
      toast.textContent = message;
      document.body.appendChild(toast);
      
      setTimeout(function() {
        toast.remove();
      }, 3000);
    }
  </script>
</body>
</html>
