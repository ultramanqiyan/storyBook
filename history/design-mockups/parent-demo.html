<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>家长控制 - 乐高故事书桌游风格</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #ffd700;
            --gold-dark: #b8860b;
            --silver: #c0c0c0;
            --crimson: #dc2626;
            --purple: #a855f7;
            --green: #22c55e;
            --blue: #3b82f6;
            --orange: #f59e0b;
            --bg-dark: #0d0d14;
            --bg-medium: #1a1a2e;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --font-title: 'Cinzel', serif;
            --font-body: 'Noto Sans SC', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-body);
            background: linear-gradient(180deg, #1a1a2e 0%, #0d0d14 100%);
            min-height: 100vh;
            color: var(--text-primary);
            overflow-x: hidden;
        }

        .particles {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: var(--gold);
            border-radius: 50%;
            opacity: 0.3;
            animation: float 20s linear infinite;
        }

        @keyframes float {
            0% { transform: translateY(100vh); opacity: 0; }
            10% { opacity: 0.3; }
            90% { opacity: 0.3; }
            100% { transform: translateY(-100vh); opacity: 0; }
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-bottom: 1px solid rgba(255,215,0,0.2);
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .header-title {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-icon {
            font-size: 2rem;
        }

        .header-text {
            font-family: var(--font-title);
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--gold), #ff9800);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-tabs {
            display: flex;
            gap: 10px;
        }

        .nav-tab {
            padding: 10px 18px;
            border-radius: 10px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: var(--text-secondary);
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .nav-tab:hover {
            background: rgba(255,215,0,0.1);
            border-color: rgba(255,215,0,0.3);
            color: var(--text-primary);
        }

        .time-panel {
            background: linear-gradient(180deg, #2d2d44, #1a1a2e);
            border-radius: 20px;
            border: 3px solid var(--gold);
            padding: 30px;
            margin-bottom: 30px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .time-panel::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--gold), var(--orange), var(--gold));
        }

        .time-icon {
            font-size: 3rem;
            margin-bottom: 15px;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .time-label {
            color: var(--text-secondary);
            font-size: 1rem;
            margin-bottom: 10px;
        }

        .time-display {
            font-family: var(--font-title);
            font-size: 3.5rem;
            font-weight: 700;
            color: var(--gold);
            margin-bottom: 20px;
        }

        .time-progress {
            max-width: 300px;
            margin: 0 auto 15px;
        }

        .progress-bar {
            height: 12px;
            background: rgba(0,0,0,0.4);
            border-radius: 6px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--green), var(--gold));
            border-radius: 6px;
            width: 35%;
            transition: width 0.5s ease;
        }

        .progress-labels {
            display: flex;
            justify-content: space-between;
            margin-top: 8px;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(180deg, #2d2d44, #1a1a2e);
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            border: 2px solid rgba(255,255,255,0.1);
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            border-color: var(--gold);
            transform: translateY(-5px);
        }

        .stat-icon {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .stat-value {
            font-family: var(--font-title);
            font-size: 2rem;
            font-weight: 700;
            color: var(--gold);
            margin-bottom: 5px;
        }

        .stat-label {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .settings-card {
            background: linear-gradient(180deg, #2d2d44, #1a1a2e);
            border-radius: 20px;
            border: 2px solid rgba(255,215,0,0.3);
            padding: 30px;
            margin-bottom: 30px;
        }

        .settings-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .settings-icon {
            font-size: 1.8rem;
        }

        .settings-title {
            font-family: var(--font-title);
            font-size: 1.3rem;
            font-weight: 600;
            color: var(--gold);
        }

        .setting-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .setting-item:last-child {
            border-bottom: none;
        }

        .setting-info {
            flex: 1;
        }

        .setting-label {
            font-weight: 600;
            margin-bottom: 5px;
        }

        .setting-desc {
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        .toggle-switch {
            width: 50px;
            height: 26px;
            background: rgba(255,255,255,0.1);
            border-radius: 13px;
            cursor: pointer;
            position: relative;
            transition: all 0.3s ease;
        }

        .toggle-switch.active {
            background: var(--green);
        }

        .toggle-switch::after {
            content: '';
            position: absolute;
            top: 3px;
            left: 3px;
            width: 20px;
            height: 20px;
            background: white;
            border-radius: 50%;
            transition: all 0.3s ease;
        }

        .toggle-switch.active::after {
            left: 27px;
        }

        .time-input {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .time-input input {
            width: 80px;
            padding: 10px;
            background: rgba(0,0,0,0.4);
            border: 2px solid rgba(255,215,0,0.3);
            border-radius: 10px;
            color: var(--text-primary);
            font-size: 1rem;
            text-align: center;
            font-family: var(--font-body);
        }

        .time-input input:focus {
            outline: none;
            border-color: var(--gold);
        }

        .time-input span {
            color: var(--text-secondary);
        }

        .account-section {
            background: linear-gradient(180deg, #2d2d44, #1a1a2e);
            border-radius: 20px;
            border: 2px solid rgba(255,255,255,0.1);
            padding: 30px;
        }

        .account-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .account-avatar {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, var(--gold), #ff9800);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
        }

        .account-name {
            font-size: 1.3rem;
            font-weight: 600;
        }

        .account-email {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .logout-btn {
            width: 100%;
            padding: 15px;
            font-size: 1rem;
            font-weight: 600;
            border: 2px solid var(--crimson);
            border-radius: 12px;
            background: transparent;
            color: var(--crimson);
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: var(--font-body);
            margin-top: 20px;
        }

        .logout-btn:hover {
            background: var(--crimson);
            color: white;
        }

        .footer {
            text-align: center;
            padding: 30px;
            color: var(--text-secondary);
            font-size: 0.9rem;
            border-top: 1px solid rgba(255,255,255,0.1);
            margin-top: 40px;
        }

        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-10px);
            background: rgba(0,0,0,0.95);
            padding: 12px 25px;
            border-radius: 10px;
            border: 1px solid var(--gold);
            font-size: 0.9rem;
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 1002;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .toast.success { border-color: var(--green); color: var(--green); }

        @media (max-width: 600px) {
            .time-display {
                font-size: 2.5rem;
            }
            
            .stats-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>

    <div class="container">
        <header class="header">
            <div class="header-title">
                <span class="header-icon">👨‍👩‍👧</span>
                <h1 class="header-text">家长控制</h1>
            </div>
            <nav class="nav-tabs">
                <a href="index-demo.html" class="nav-tab">🏠 首页</a>
                <a href="bookshelf-demo.html" class="nav-tab">📚 我的书架</a>
            </nav>
        </header>

        <div class="time-panel">
            <div class="time-icon">⏰</div>
            <p class="time-label">今日阅读时间</p>
            <div class="time-display">42 分钟</div>
            <div class="time-progress">
                <div class="progress-bar">
                    <div class="progress-fill"></div>
                </div>
                <div class="progress-labels">
                    <span>已用 42分钟</span>
                    <span>限额 120分钟</span>
                </div>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon">📚</div>
                <div class="stat-value">5</div>
                <div class="stat-label">阅读故事数</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">📖</div>
                <div class="stat-value">23</div>
                <div class="stat-label">完成章节数</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">⭐</div>
                <div class="stat-value">89%</div>
                <div class="stat-label">答题正确率</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">🔥</div>
                <div class="stat-value">7天</div>
                <div class="stat-label">连续阅读</div>
            </div>
        </div>

        <div class="settings-card">
            <div class="settings-header">
                <span class="settings-icon">⚙️</span>
                <h2 class="settings-title">时间管理</h2>
            </div>

            <div class="setting-item">
                <div class="setting-info">
                    <div class="setting-label">每日阅读限额</div>
                    <div class="setting-desc">限制每天的阅读时间</div>
                </div>
                <div class="time-input">
                    <input type="number" value="120" min="30" max="300">
                    <span>分钟</span>
                </div>
            </div>

            <div class="setting-item">
                <div class="setting-info">
                    <div class="setting-label">休息提醒</div>
                    <div class="setting-desc">每30分钟提醒休息</div>
                </div>
                <div class="toggle-switch active" onclick="toggleSwitch(this)"></div>
            </div>

            <div class="setting-item">
                <div class="setting-info">
                    <div class="setting-label">睡前模式</div>
                    <div class="setting-desc">晚上9点后自动停止阅读</div>
                </div>
                <div class="toggle-switch active" onclick="toggleSwitch(this)"></div>
            </div>

            <div class="setting-item">
                <div class="setting-info">
                    <div class="setting-label">周末延长时间</div>
                    <div class="setting-desc">周末阅读时间延长50%</div>
                </div>
                <div class="toggle-switch" onclick="toggleSwitch(this)"></div>
            </div>
        </div>

        <div class="settings-card">
            <div class="settings-header">
                <span class="settings-icon">🔒</span>
                <h2 class="settings-title">内容控制</h2>
            </div>

            <div class="setting-item">
                <div class="setting-info">
                    <div class="setting-label">年龄适宜模式</div>
                    <div class="setting-desc">只显示适合年龄的内容</div>
                </div>
                <div class="toggle-switch active" onclick="toggleSwitch(this)"></div>
            </div>

            <div class="setting-item">
                <div class="setting-info">
                    <div class="setting-label">评论审核</div>
                    <div class="setting-desc">评论需要家长审核后显示</div>
                </div>
                <div class="toggle-switch" onclick="toggleSwitch(this)"></div>
            </div>

            <div class="setting-item">
                <div class="setting-info">
                    <div class="setting-label">分享限制</div>
                    <div class="setting-desc">禁止分享故事给他人</div>
                </div>
                <div class="toggle-switch" onclick="toggleSwitch(this)"></div>
            </div>
        </div>

        <div class="account-section">
            <div class="account-header">
                <div class="account-avatar">🎮</div>
                <div>
                    <div class="account-name">小明</div>
                    <div class="account-email">parent@example.com</div>
                </div>
            </div>
            <button class="logout-btn" onclick="logout()">🚪 退出登录</button>
        </div>

        <footer class="footer">
            <p>乐高故事书 &copy; 2024 - 让想象力飞翔</p>
        </footer>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        for (var i = 0; i < 15; i++) {
            var p = document.createElement('div');
            p.className = 'particle';
            p.style.left = Math.random() * 100 + '%';
            p.style.animationDelay = Math.random() * 20 + 's';
            document.getElementById('particles').appendChild(p);
        }

        function toggleSwitch(el) {
            el.classList.toggle('active');
            showToast('设置已保存 ✓', 'success');
        }

        function logout() {
            showToast('正在退出登录...', 'success');
            setTimeout(function() {
                window.location.href = 'login-demo.html';
            }, 1500);
        }

        function showToast(msg, type) {
            var toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.className = 'toast show ' + (type || '');
            setTimeout(function() {
                toast.classList.remove('show');
            }, 2000);
        }
    </script>
</body>
</html>
