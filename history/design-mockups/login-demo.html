<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 乐高故事书桌游风格</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #ffd700;
            --gold-dark: #b8860b;
            --silver: #c0c0c0;
            --crimson: #dc2626;
            --purple: #a855f7;
            --green: #22c55e;
            --blue: #3b82f6;
            --orange: #f59e0b;
            --bg-dark: #0d0d14;
            --bg-medium: #1a1a2e;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --font-title: 'Cinzel', serif;
            --font-body: 'Noto Sans SC', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-body);
            background: linear-gradient(180deg, #1a1a2e 0%, #0d0d14 100%);
            min-height: 100vh;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        .particles {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: var(--gold);
            border-radius: 50%;
            opacity: 0.3;
            animation: float 20s linear infinite;
        }

        @keyframes float {
            0% { transform: translateY(100vh); opacity: 0; }
            10% { opacity: 0.3; }
            90% { opacity: 0.3; }
            100% { transform: translateY(-100vh); opacity: 0; }
        }

        .login-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        .login-card {
            background: linear-gradient(180deg, #2d2d44, #1a1a2e);
            border-radius: 20px;
            border: 3px solid var(--gold);
            padding: 40px;
            box-shadow: 
                0 20px 60px rgba(0,0,0,0.5),
                0 0 30px rgba(255,215,0,0.2);
            position: relative;
            overflow: hidden;
        }

        .login-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--gold), var(--purple), var(--gold));
        }

        .login-card::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(ellipse at center, rgba(255,215,0,0.05), transparent 50%);
            pointer-events: none;
        }

        .logo-section {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-icon {
            font-size: 4rem;
            margin-bottom: 15px;
            animation: float-icon 3s ease-in-out infinite;
        }

        @keyframes float-icon {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .logo-title {
            font-family: var(--font-title);
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--gold), #ff9800);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        .logo-subtitle {
            color: var(--text-secondary);
            font-size: 1rem;
        }

        .lego-loader {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin: 25px 0;
        }

        .lego-block {
            width: 20px;
            height: 20px;
            background: linear-gradient(180deg, var(--gold), var(--gold-dark));
            border-radius: 4px;
            animation: lego-bounce 1.2s ease-in-out infinite;
        }

        .lego-block:nth-child(2) {
            animation-delay: 0.2s;
            background: linear-gradient(180deg, var(--crimson), #991b1b);
        }

        .lego-block:nth-child(3) {
            animation-delay: 0.4s;
            background: linear-gradient(180deg, var(--blue), #1d4ed8);
        }

        @keyframes lego-bounce {
            0%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-15px); }
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .form-input {
            width: 100%;
            padding: 15px 18px;
            background: rgba(0,0,0,0.4);
            border: 2px solid rgba(255,215,0,0.3);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 1rem;
            font-family: var(--font-body);
            transition: all 0.3s ease;
        }

        .form-input::placeholder {
            color: var(--text-secondary);
            opacity: 0.6;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--gold);
            box-shadow: 0 0 20px rgba(255,215,0,0.3);
            background: rgba(0,0,0,0.6);
        }

        .submit-btn {
            width: 100%;
            padding: 16px;
            font-size: 1.1rem;
            font-weight: 700;
            border: none;
            border-radius: 25px;
            background: linear-gradient(135deg, var(--gold), #ff9800);
            color: #000;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: var(--font-body);
            box-shadow: 0 0 25px rgba(255,215,0,0.5);
            animation: btn-pulse 2s ease-in-out infinite;
            margin-top: 10px;
        }

        @keyframes btn-pulse {
            0%, 100% { box-shadow: 0 0 25px rgba(255,215,0,0.5); }
            50% { box-shadow: 0 0 40px rgba(255,215,0,0.8); }
        }

        .submit-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 0 35px rgba(255,215,0,0.7);
        }

        .submit-btn:active {
            transform: scale(0.98);
        }

        .hint-text {
            text-align: center;
            margin-top: 25px;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .hint-text span {
            color: var(--gold);
        }

        .back-link {
            position: absolute;
            top: 20px;
            left: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s;
            z-index: 10;
        }

        .back-link:hover {
            color: var(--gold);
        }

        .decorative-corner {
            position: absolute;
            width: 30px;
            height: 30px;
            border: 2px solid var(--gold);
            opacity: 0.5;
        }

        .decorative-corner.top-left {
            top: 15px;
            left: 15px;
            border-right: none;
            border-bottom: none;
        }

        .decorative-corner.top-right {
            top: 15px;
            right: 15px;
            border-left: none;
            border-bottom: none;
        }

        .decorative-corner.bottom-left {
            bottom: 15px;
            left: 15px;
            border-right: none;
            border-top: none;
        }

        .decorative-corner.bottom-right {
            bottom: 15px;
            right: 15px;
            border-left: none;
            border-top: none;
        }

        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-10px);
            background: rgba(0,0,0,0.95);
            padding: 12px 25px;
            border-radius: 10px;
            border: 1px solid var(--gold);
            font-size: 0.9rem;
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 1002;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .toast.success {
            border-color: var(--green);
            color: var(--green);
        }

        .toast.error {
            border-color: var(--crimson);
            color: #f87171;
        }

        @media (max-width: 480px) {
            .login-card {
                padding: 30px 25px;
            }
            
            .logo-title {
                font-size: 1.6rem;
            }
        }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>
    
    <a href="index-demo.html" class="back-link">← 返回首页</a>

    <div class="login-container">
        <div class="login-card">
            <div class="decorative-corner top-left"></div>
            <div class="decorative-corner top-right"></div>
            <div class="decorative-corner bottom-left"></div>
            <div class="decorative-corner bottom-right"></div>

            <div class="logo-section">
                <div class="logo-icon">🎮</div>
                <h1 class="logo-title">乐高故事书</h1>
                <p class="logo-subtitle">登录开始你的冒险！</p>
            </div>

            <div class="lego-loader">
                <div class="lego-block"></div>
                <div class="lego-block"></div>
                <div class="lego-block"></div>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label">👤 你的名字</label>
                    <input type="text" id="username" class="form-input" placeholder="输入你的冒险者名字" required maxlength="20">
                </div>

                <div class="form-group">
                    <label class="form-label">📧 邮箱（可选）</label>
                    <input type="email" id="email" class="form-input" placeholder="输入邮箱地址">
                </div>

                <button type="submit" class="submit-btn">🚀 开始冒险</button>
            </form>

            <p class="hint-text">💡 首次登录将<span>自动创建账号</span></p>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        for (var i = 0; i < 15; i++) {
            var p = document.createElement('div');
            p.className = 'particle';
            p.style.left = Math.random() * 100 + '%';
            p.style.animationDelay = Math.random() * 20 + 's';
            document.getElementById('particles').appendChild(p);
        }

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            var username = document.getElementById('username').value.trim();
            
            if (!username) {
                showToast('请输入你的名字', 'error');
                return;
            }
            
            showToast('欢迎，' + username + '！🎉', 'success');
            
            setTimeout(function() {
                window.location.href = 'bookshelf-demo.html';
            }, 1500);
        });

        function showToast(msg, type) {
            var toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.className = 'toast show ' + type;
            setTimeout(function() {
                toast.classList.remove('show');
            }, 2000);
        }
    </script>
</body>
</html>
