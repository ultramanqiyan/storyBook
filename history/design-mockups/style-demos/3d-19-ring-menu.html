<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D环形菜单 - 乐高故事书</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --ring-1: #ff006e;
            --ring-2: #8338ec;
            --ring-3: #3a86ff;
            --ring-4: #06ffa5;
            --ring-5: #ffbe0b;
            --ring-6: #fb5607;
            --bg-dark: #0a0a0f;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: radial-gradient(ellipse at center, #1a1a2e 0%, var(--bg-dark) 100%);
            min-height: 100vh;
            color: #f8fafc;
            overflow-x: hidden;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 60px;
        }

        .main-title {
            font-family: 'Cinzel', serif;
            font-size: 2.8rem;
            background: linear-gradient(135deg, var(--ring-1), var(--ring-3), var(--ring-4));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #94a3b8;
            font-size: 1.1rem;
        }

        .ring-scene {
            position: relative;
            height: 600px;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1000px;
        }

        .ring-menu {
            position: relative;
            width: 500px;
            height: 500px;
            transform-style: preserve-3d;
            animation: ring-rotate 20s linear infinite;
        }

        @keyframes ring-rotate {
            0% { transform: rotateY(0deg) rotateX(10deg); }
            100% { transform: rotateY(360deg) rotateX(10deg); }
        }

        .ring-menu:hover {
            animation-play-state: paused;
        }

        .ring-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) translateZ(50px);
            width: 120px;
            height: 120px;
            background: linear-gradient(145deg, #fff, #e0e0e0);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            box-shadow: 
                0 10px 30px rgba(0,0,0,0.3),
                inset 0 -5px 10px rgba(0,0,0,0.1);
            z-index: 10;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .ring-center:hover {
            transform: translate(-50%, -50%) translateZ(80px) scale(1.1);
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
        }

        .ring-item {
            position: absolute;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }

        .ring-item:hover {
            transform: scale(1.3) translateZ(30px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.4);
        }

        .ring-item:nth-child(2) {
            background: linear-gradient(145deg, var(--ring-1), #cc0058);
            top: 10%;
            left: 50%;
            transform: translateX(-50%) translateZ(20px);
        }

        .ring-item:nth-child(3) {
            background: linear-gradient(145deg, var(--ring-2), #6629b8);
            top: 30%;
            right: 5%;
            transform: translateZ(20px);
        }

        .ring-item:nth-child(4) {
            background: linear-gradient(145deg, var(--ring-3), #2a6bcc);
            bottom: 30%;
            right: 5%;
            transform: translateZ(20px);
        }

        .ring-item:nth-child(5) {
            background: linear-gradient(145deg, var(--ring-4), #05cc84);
            bottom: 10%;
            left: 50%;
            transform: translateX(-50%) translateZ(20px);
        }

        .ring-item:nth-child(6) {
            background: linear-gradient(145deg, var(--ring-5), #cc9909);
            bottom: 30%;
            left: 5%;
            transform: translateZ(20px);
        }

        .ring-item:nth-child(7) {
            background: linear-gradient(145deg, var(--ring-6), #c94506);
            top: 30%;
            left: 5%;
            transform: translateZ(20px);
        }

        .orbit-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border: 2px dashed rgba(255,255,255,0.2);
            border-radius: 50%;
        }

        .orbit-ring:nth-of-type(1) {
            width: 400px;
            height: 400px;
            animation: orbit-spin 15s linear infinite reverse;
        }

        .orbit-ring:nth-of-type(2) {
            width: 300px;
            height: 300px;
            border-color: rgba(255,255,255,0.1);
            animation: orbit-spin 10s linear infinite;
        }

        @keyframes orbit-spin {
            0% { transform: translate(-50%, -50%) rotate(0deg); }
            100% { transform: translate(-50%, -50%) rotate(360deg); }
        }

        .particle-trail {
            position: absolute;
            width: 6px;
            height: 6px;
            background: #fff;
            border-radius: 50%;
            opacity: 0.6;
            animation: trail-float 3s ease-in-out infinite;
        }

        @keyframes trail-float {
            0%, 100% { transform: translateY(0) scale(1); opacity: 0.6; }
            50% { transform: translateY(-20px) scale(0.5); opacity: 0.2; }
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 40px;
            flex-wrap: wrap;
        }

        .control-btn {
            padding: 12px 24px;
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 25px;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Cinzel', serif;
        }

        .control-btn:hover, .control-btn.active {
            background: rgba(255,255,255,0.2);
            border-color: var(--ring-3);
            color: var(--ring-3);
            transform: translateY(-2px);
        }

        .nav-bar {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 60px;
        }

        .nav-btn {
            padding: 15px 40px;
            background: linear-gradient(145deg, rgba(255,255,255,0.1), rgba(255,255,255,0.05));
            border: 2px solid var(--ring-3);
            border-radius: 30px;
            color: var(--ring-3);
            font-family: 'Cinzel', serif;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }

        .nav-btn:hover {
            background: var(--ring-3);
            color: var(--bg-dark);
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(58, 134, 255, 0.3);
        }

        @media (max-width: 768px) {
            .main-title { font-size: 2rem; }
            .ring-scene { height: 400px; }
            .ring-menu { transform: scale(0.7); }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1 class="main-title">3D环形菜单</h1>
            <p class="subtitle">圆形轨道菜单 - 图标环绕中心辐射</p>
        </header>

        <div class="ring-scene">
            <div class="ring-menu" id="ringMenu">
                <div class="orbit-ring"></div>
                <div class="orbit-ring"></div>
                <div class="ring-center">🎯</div>
                <div class="ring-item" title="首页">🏠</div>
                <div class="ring-item" title="搜索">🔍</div>
                <div class="ring-item" title="消息">💬</div>
                <div class="ring-item" title="设置">⚙️</div>
                <div class="ring-item" title="收藏">⭐</div>
                <div class="ring-item" title="用户">👤</div>
            </div>
        </div>

        <div class="controls">
            <button class="control-btn active" onclick="setSpeed('slow')">慢速</button>
            <button class="control-btn" onclick="setSpeed('normal')">正常</button>
            <button class="control-btn" onclick="setSpeed('fast')">快速</button>
            <button class="control-btn" onclick="toggleRotation()">暂停/播放</button>
        </div>

        <nav class="nav-bar">
            <a href="3d-18-waterfall.html" class="nav-btn">上一个效果</a>
            <a href="index.html" class="nav-btn">返回首页</a>
            <a href="3d-20-fractal-tree.html" class="nav-btn">下一个效果</a>
        </nav>
    </div>

    <script>
        const ringMenu = document.getElementById('ringMenu');
        let isRotating = true;

        function setSpeed(speed) {
            document.querySelectorAll('.control-btn').forEach(btn => {
                if (btn.textContent.includes('速')) btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            const durations = { slow: '30s', normal: '20s', fast: '10s' };
            ringMenu.style.animationDuration = durations[speed];
        }

        function toggleRotation() {
            isRotating = !isRotating;
            ringMenu.style.animationPlayState = isRotating ? 'running' : 'paused';
        }

        // 点击菜单项效果
        document.querySelectorAll('.ring-item').forEach(item => {
            item.addEventListener('click', function() {
                this.style.transform = 'scale(1.5) translateZ(50px)';
                setTimeout(() => {
                    this.style.transform = '';
                }, 300);
            });
        });
    </script>
</body>
</html>
