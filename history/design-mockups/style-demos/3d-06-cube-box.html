<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D立方体盒子 - 乐高故事书</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --cube-size: 200px;
            --face-1: #ff006e;
            --face-2: #8338ec;
            --face-3: #3a86ff;
            --face-4: #06ffa5;
            --face-5: #ffbe0b;
            --face-6: #fb5607;
            --bg-dark: #0a0a0f;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: radial-gradient(ellipse at center, #1a1a2e 0%, var(--bg-dark) 100%);
            min-height: 100vh;
            color: #f8fafc;
            overflow-x: hidden;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 60px;
        }

        .main-title {
            font-family: 'Cinzel', serif;
            font-size: 2.8rem;
            background: linear-gradient(135deg, var(--face-1), var(--face-3), var(--face-4));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #94a3b8;
            font-size: 1.1rem;
        }

        .scene {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 500px;
            perspective: 1000px;
        }

        .cube {
            width: var(--cube-size);
            height: var(--cube-size);
            position: relative;
            transform-style: preserve-3d;
            animation: rotate-cube 12s linear infinite;
        }

        @keyframes rotate-cube {
            0% { transform: rotateX(0deg) rotateY(0deg); }
            100% { transform: rotateX(360deg) rotateY(360deg); }
        }

        .cube:hover {
            animation-play-state: paused;
        }

        .face {
            position: absolute;
            width: var(--cube-size);
            height: var(--cube-size);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            border: 3px solid rgba(255,255,255,0.3);
            backface-visibility: visible;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .face:hover {
            transform: scale(1.1);
            border-color: #fff;
            box-shadow: 0 0 30px rgba(255,255,255,0.5);
        }

        .face-1 { 
            background: linear-gradient(135deg, var(--face-1), #cc0058);
            transform: translateZ(calc(var(--cube-size) / 2));
        }
        .face-2 { 
            background: linear-gradient(135deg, var(--face-2), #6629b8);
            transform: rotateY(180deg) translateZ(calc(var(--cube-size) / 2));
        }
        .face-3 { 
            background: linear-gradient(135deg, var(--face-3), #2a6bcc);
            transform: rotateY(90deg) translateZ(calc(var(--cube-size) / 2));
        }
        .face-4 { 
            background: linear-gradient(135deg, var(--face-4), #05cc84);
            transform: rotateY(-90deg) translateZ(calc(var(--cube-size) / 2));
        }
        .face-5 { 
            background: linear-gradient(135deg, var(--face-5), #cc9909);
            transform: rotateX(90deg) translateZ(calc(var(--cube-size) / 2));
        }
        .face-6 { 
            background: linear-gradient(135deg, var(--face-6), #c94506);
            transform: rotateX(-90deg) translateZ(calc(var(--cube-size) / 2));
        }

        .face-content {
            text-align: center;
        }

        .face-icon {
            font-size: 4rem;
            margin-bottom: 10px;
        }

        .face-label {
            font-family: 'Cinzel', serif;
            font-size: 1rem;
            color: #fff;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 40px;
            flex-wrap: wrap;
        }

        .control-btn {
            padding: 12px 24px;
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 25px;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Cinzel', serif;
        }

        .control-btn:hover, .control-btn.active {
            background: rgba(255,255,255,0.2);
            border-color: #fff;
            transform: translateY(-2px);
        }

        .nav-bar {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 60px;
        }

        .nav-btn {
            padding: 15px 40px;
            background: linear-gradient(145deg, rgba(255,255,255,0.1), rgba(255,255,255,0.05));
            border: 2px solid var(--face-3);
            border-radius: 30px;
            color: var(--face-3);
            font-family: 'Cinzel', serif;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }

        .nav-btn:hover {
            background: var(--face-3);
            color: var(--bg-dark);
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(58, 134, 255, 0.3);
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1 class="main-title">3D立方体盒子</h1>
            <p class="subtitle">六面旋转展示 - 点击面查看详情</p>
        </header>

        <div class="scene">
            <div class="cube" id="cube">
                <div class="face face-1">
                    <div class="face-content">
                        <div class="face-icon">🔥</div>
                        <div class="face-label">火焰</div>
                    </div>
                </div>
                <div class="face face-2">
                    <div class="face-content">
                        <div class="face-icon">💧</div>
                        <div class="face-label">水流</div>
                    </div>
                </div>
                <div class="face face-3">
                    <div class="face-content">
                        <div class="face-icon">🌪️</div>
                        <div class="face-label">风暴</div>
                    </div>
                </div>
                <div class="face face-4">
                    <div class="face-content">
                        <div class="face-icon">🌍</div>
                        <div class="face-label">大地</div>
                    </div>
                </div>
                <div class="face face-5">
                    <div class="face-content">
                        <div class="face-icon">⚡</div>
                        <div class="face-label">雷电</div>
                    </div>
                </div>
                <div class="face face-6">
                    <div class="face-content">
                        <div class="face-icon">❄️</div>
                        <div class="face-label">冰霜</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="controls">
            <button class="control-btn active" onclick="setSpeed('slow')">慢速</button>
            <button class="control-btn" onclick="setSpeed('normal')">正常</button>
            <button class="control-btn" onclick="setSpeed('fast')">快速</button>
            <button class="control-btn" onclick="toggleDirection()">切换方向</button>
        </div>

        <nav class="nav-bar">
            <a href="index.html" class="nav-btn">返回首页</a>
            <a href="3d-07-spiral-galaxy.html" class="nav-btn">下一个效果</a>
        </nav>
    </div>

    <script>
        const cube = document.getElementById('cube');
        let currentSpeed = '12s';
        let direction = 1;

        function setSpeed(speed) {
            document.querySelectorAll('.control-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            const speeds = { slow: '20s', normal: '12s', fast: '5s' };
            currentSpeed = speeds[speed];
            cube.style.animationDuration = currentSpeed;
        }

        function toggleDirection() {
            direction *= -1;
            cube.style.animationDirection = direction === 1 ? 'normal' : 'reverse';
        }
    </script>
</body>
</html>
