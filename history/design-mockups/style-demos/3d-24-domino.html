<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D多米诺骨牌 - 乐高故事书</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --domino-1: #ff006e;
            --domino-2: #8338ec;
            --domino-3: #3a86ff;
            --domino-4: #06ffa5;
            --domino-5: #ffbe0b;
            --bg-dark: #0a0a0f;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: linear-gradient(145deg, #1a1a2e 0%, var(--bg-dark) 100%);
            min-height: 100vh;
            color: #f8fafc;
            overflow-x: hidden;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .main-title {
            font-family: 'Cinzel', serif;
            font-size: 2.8rem;
            background: linear-gradient(135deg, var(--domino-1), var(--domino-3), var(--domino-4));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #94a3b8;
            font-size: 1.1rem;
        }

        .domino-scene {
            position: relative;
            height: 500px;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1000px;
            overflow: hidden;
        }

        .domino-track {
            position: relative;
            width: 800px;
            height: 200px;
            transform-style: preserve-3d;
            transform: rotateX(30deg);
        }

        .domino {
            position: absolute;
            width: 30px;
            height: 60px;
            background: linear-gradient(145deg, rgba(255,255,255,0.2), rgba(255,255,255,0.1));
            border: 2px solid;
            border-radius: 5px;
            transform-origin: bottom center;
            transition: transform 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            font-weight: bold;
        }

        .domino:nth-child(5n+1) { border-color: var(--domino-1); color: var(--domino-1); }
        .domino:nth-child(5n+2) { border-color: var(--domino-2); color: var(--domino-2); }
        .domino:nth-child(5n+3) { border-color: var(--domino-3); color: var(--domino-3); }
        .domino:nth-child(5n+4) { border-color: var(--domino-4); color: var(--domino-4); }
        .domino:nth-child(5n) { border-color: var(--domino-5); color: var(--domino-5); }

        .domino.fallen {
            transform: rotateZ(75deg);
        }

        .start-btn {
            position: absolute;
            top: -80px;
            left: 10px;
            padding: 15px 30px;
            background: linear-gradient(145deg, var(--domino-1), var(--domino-2));
            border: none;
            border-radius: 30px;
            color: #fff;
            font-family: 'Cinzel', serif;
            font-size: 1.2rem;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(255, 0, 110, 0.4);
            transition: all 0.3s ease;
        }

        .start-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(255, 0, 110, 0.6);
        }

        .pattern-selector {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        .pattern-btn {
            padding: 10px 20px;
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 20px;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Cinzel', serif;
        }

        .pattern-btn:hover, .pattern-btn.active {
            background: rgba(255,255,255,0.2);
            border-color: var(--domino-3);
            color: var(--domino-3);
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 40px;
            flex-wrap: wrap;
        }

        .control-btn {
            padding: 12px 24px;
            background: rgba(255,255,255,0.1);
            border: 2px solid var(--domino-3);
            border-radius: 25px;
            color: var(--domino-3);
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Cinzel', serif;
        }

        .control-btn:hover, .control-btn.active {
            background: var(--domino-3);
            color: var(--bg-dark);
            transform: translateY(-2px);
        }

        .nav-bar {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 60px;
        }

        .nav-btn {
            padding: 15px 40px;
            background: linear-gradient(145deg, rgba(255,255,255,0.1), rgba(255,255,255,0.05));
            border: 2px solid var(--domino-3);
            border-radius: 30px;
            color: var(--domino-3);
            font-family: 'Cinzel', serif;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }

        .nav-btn:hover {
            background: var(--domino-3);
            color: var(--bg-dark);
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(58, 134, 255, 0.3);
        }

        @media (max-width: 768px) {
            .main-title { font-size: 2rem; }
            .domino-scene { height: 350px; }
            .domino-track { transform: rotateX(30deg) scale(0.6); }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1 class="main-title">3D多米诺骨牌</h1>
            <p class="subtitle">连锁反应 - 依次倒下波浪效果</p>
        </header>

        <div class="domino-scene">
            <div class="domino-track" id="dominoTrack">
                <button class="start-btn" onclick="startDomino()">开始推倒</button>
            </div>
        </div>

        <div class="pattern-selector">
            <button class="pattern-btn active" onclick="setPattern('straight')">直线</button>
            <button class="pattern-btn" onclick="setPattern('curve')">曲线</button>
            <button class="pattern-btn" onclick="setPattern('zigzag')">锯齿</button>
            <button class="pattern-btn" onclick="setPattern('spiral')">螺旋</button>
        </div>

        <div class="controls">
            <button class="control-btn active" onclick="setSpeed('slow')">慢速</button>
            <button class="control-btn" onclick="setSpeed('normal')">正常</button>
            <button class="control-btn" onclick="setSpeed('fast')">快速</button>
            <button class="control-btn" onclick="resetDomino()">重置</button>
        </div>

        <nav class="nav-bar">
            <a href="3d-23-tornado.html" class="nav-btn">上一个效果</a>
            <a href="index.html" class="nav-btn">返回首页</a>
            <a href="3d-25-spring.html" class="nav-btn">下一个效果</a>
        </nav>
    </div>

    <script>
        let currentPattern = 'straight';
        let currentSpeed = 200;
        let isRunning = false;

        function createDominoes() {
            const track = document.getElementById('dominoTrack');
            track.innerHTML = '<button class="start-btn" onclick="startDomino()">开始推倒</button>';
            
            const count = 20;
            for (let i = 0; i < count; i++) {
                const domino = document.createElement('div');
                domino.className = 'domino';
                domino.textContent = i + 1;
                
                let x, y, rotation;
                switch(currentPattern) {
                    case 'straight':
                        x = 50 + i * 35;
                        y = 70;
                        rotation = 0;
                        break;
                    case 'curve':
                        x = 50 + i * 35;
                        y = 70 + Math.sin(i * 0.3) * 30;
                        rotation = Math.cos(i * 0.3) * 15;
                        break;
                    case 'zigzag':
                        x = 50 + i * 35;
                        y = 70 + (i % 2 === 0 ? -20 : 20);
                        rotation = i % 2 === 0 ? -10 : 10;
                        break;
                    case 'spiral':
                        const angle = i * 0.5;
                        const radius = 20 + i * 8;
                        x = 400 + Math.cos(angle) * radius;
                        y = 100 + Math.sin(angle) * radius * 0.3;
                        rotation = angle * 57.3;
                        break;
                }
                
                domino.style.left = x + 'px';
                domino.style.top = y + 'px';
                domino.style.transform = `rotateZ(${rotation}deg)`;
                domino.dataset.index = i;
                track.appendChild(domino);
            }
        }

        async function startDomino() {
            if (isRunning) return;
            isRunning = true;
            
            const dominoes = document.querySelectorAll('.domino');
            for (let i = 0; i < dominoes.length; i++) {
                dominoes[i].classList.add('fallen');
                await sleep(currentSpeed);
            }
            
            isRunning = false;
        }

        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        function setPattern(pattern) {
            currentPattern = pattern;
            document.querySelectorAll('.pattern-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            resetDomino();
        }

        function setSpeed(speed) {
            document.querySelectorAll('.control-btn').forEach(btn => {
                if (btn.textContent.includes('速')) btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            const speeds = { slow: 400, normal: 200, fast: 100 };
            currentSpeed = speeds[speed];
        }

        function resetDomino() {
            isRunning = false;
            createDominoes();
        }

        // 初始化
        createDominoes();
    </script>
</body>
</html>
