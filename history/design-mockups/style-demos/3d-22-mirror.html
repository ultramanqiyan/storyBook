<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D镜面反射 - 乐高故事书</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --mirror-1: #e0e0e0;
            --mirror-2: #c0c0c0;
            --mirror-3: #a0a0a0;
            --water: #4a90e2;
            --bg-mirror: #0a0a0f;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: linear-gradient(180deg, #1a1a2e 0%, var(--bg-mirror) 100%);
            min-height: 100vh;
            color: #f8fafc;
            overflow-x: hidden;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .main-title {
            font-family: 'Cinzel', serif;
            font-size: 2.8rem;
            background: linear-gradient(135deg, var(--mirror-1), var(--water));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #94a3b8;
            font-size: 1.1rem;
        }

        .mirror-scene {
            position: relative;
            height: 600px;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1000px;
            overflow: hidden;
        }

        .mirror-container {
            position: relative;
            width: 600px;
            height: 500px;
            transform-style: preserve-3d;
        }

        .mirror-surface {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 400px;
            height: 400px;
            background: linear-gradient(145deg, rgba(255,255,255,0.1), rgba(255,255,255,0.05));
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 
                0 0 50px rgba(255,255,255,0.1),
                inset 0 0 50px rgba(255,255,255,0.05);
        }

        .original-object {
            position: absolute;
            top: 20%;
            left: 50%;
            transform: translateX(-50%);
            font-size: 5rem;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5));
            animation: float-object 4s ease-in-out infinite;
            z-index: 10;
        }

        .reflected-object {
            position: absolute;
            bottom: 20%;
            left: 50%;
            transform: translateX(-50%) scaleY(-1);
            font-size: 5rem;
            opacity: 0.5;
            filter: blur(2px) drop-shadow(0 -10px 20px rgba(0,0,0,0.3));
            animation: float-reflection 4s ease-in-out infinite;
        }

        @keyframes float-object {
            0%, 100% { transform: translateX(-50%) translateY(0) rotate(0deg); }
            50% { transform: translateX(-50%) translateY(-20px) rotate(5deg); }
        }

        @keyframes float-reflection {
            0%, 100% { transform: translateX(-50%) scaleY(-1) translateY(0) rotate(0deg); }
            50% { transform: translateX(-50%) scaleY(-1) translateY(20px) rotate(-5deg); }
        }

        .water-ripple {
            position: absolute;
            bottom: 15%;
            left: 50%;
            transform: translateX(-50%);
            width: 300px;
            height: 100px;
            background: radial-gradient(ellipse at center, rgba(74, 144, 226, 0.3) 0%, transparent 70%);
            border-radius: 50%;
            animation: ripple 3s ease-in-out infinite;
        }

        @keyframes ripple {
            0%, 100% { transform: translateX(-50%) scale(1); opacity: 0.5; }
            50% { transform: translateX(-50%) scale(1.2); opacity: 0.8; }
        }

        .mirror-frame {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 420px;
            height: 420px;
            border: 5px solid linear-gradient(45deg, var(--mirror-1), var(--mirror-3));
            border-radius: 25px;
            pointer-events: none;
        }

        .light-ray {
            position: absolute;
            width: 2px;
            height: 200px;
            background: linear-gradient(180deg, transparent, rgba(255,255,255,0.5), transparent);
            animation: ray-rotate 8s linear infinite;
        }

        .light-ray:nth-child(1) { top: 10%; left: 30%; animation-delay: 0s; }
        .light-ray:nth-child(2) { top: 10%; right: 30%; animation-delay: 2s; }
        .light-ray:nth-child(3) { bottom: 10%; left: 40%; animation-delay: 4s; }

        @keyframes ray-rotate {
            0% { transform: rotate(0deg); opacity: 0.3; }
            50% { opacity: 0.8; }
            100% { transform: rotate(360deg); opacity: 0.3; }
        }

        .object-selector {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
        }

        .object-btn {
            font-size: 2rem;
            padding: 10px 20px;
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .object-btn:hover, .object-btn.active {
            background: rgba(255,255,255,0.2);
            border-color: var(--water);
            transform: scale(1.1);
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 40px;
            flex-wrap: wrap;
        }

        .control-btn {
            padding: 12px 24px;
            background: rgba(255,255,255,0.1);
            border: 2px solid var(--water);
            border-radius: 25px;
            color: var(--water);
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Cinzel', serif;
        }

        .control-btn:hover, .control-btn.active {
            background: var(--water);
            color: var(--bg-mirror);
            transform: translateY(-2px);
        }

        .nav-bar {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 60px;
        }

        .nav-btn {
            padding: 15px 40px;
            background: linear-gradient(145deg, rgba(255,255,255,0.1), rgba(255,255,255,0.05));
            border: 2px solid var(--water);
            border-radius: 30px;
            color: var(--water);
            font-family: 'Cinzel', serif;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }

        .nav-btn:hover {
            background: var(--water);
            color: var(--bg-mirror);
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(74, 144, 226, 0.3);
        }

        @media (max-width: 768px) {
            .main-title { font-size: 2rem; }
            .mirror-scene { height: 400px; }
            .mirror-container { transform: scale(0.7); }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1 class="main-title">3D镜面反射</h1>
            <p class="subtitle">镜像对称 - 倒影效果与水面波纹</p>
        </header>

        <div class="mirror-scene">
            <div class="mirror-container">
                <div class="light-ray"></div>
                <div class="light-ray"></div>
                <div class="light-ray"></div>
                <div class="mirror-frame"></div>
                <div class="mirror-surface"></div>
                <div class="original-object" id="original">🦋</div>
                <div class="reflected-object" id="reflection">🦋</div>
                <div class="water-ripple"></div>
            </div>
        </div>

        <div class="object-selector">
            <button class="object-btn active" onclick="setObject('🦋')">🦋</button>
            <button class="object-btn" onclick="setObject('🌸')">🌸</button>
            <button class="object-btn" onclick="setObject('🦢')">🦢</button>
            <button class="object-btn" onclick="setObject('🌙')">🌙</button>
            <button class="object-btn" onclick="setObject('⭐')">⭐</button>
        </div>

        <div class="controls">
            <button class="control-btn active" onclick="setEffect('water')">水面</button>
            <button class="control-btn" onclick="setEffect('mirror')">镜面</button>
            <button class="control-btn" onclick="setEffect('glass')">玻璃</button>
            <button class="control-btn" onclick="toggleAnimation()">暂停/播放</button>
        </div>

        <nav class="nav-bar">
            <a href="3d-21-particle-explosion.html" class="nav-btn">上一个效果</a>
            <a href="index.html" class="nav-btn">返回首页</a>
            <a href="3d-23-tornado.html" class="nav-btn">下一个效果</a>
        </nav>
    </div>

    <script>
        let isAnimating = true;

        function setObject(emoji) {
            document.getElementById('original').textContent = emoji;
            document.getElementById('reflection').textContent = emoji;
            document.querySelectorAll('.object-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
        }

        function setEffect(effect) {
            const reflection = document.getElementById('reflection');
            const ripple = document.querySelector('.water-ripple');
            
            document.querySelectorAll('.control-btn').forEach(btn => {
                if (btn.textContent !== '暂停/播放') btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            switch(effect) {
                case 'water':
                    reflection.style.filter = 'blur(2px) drop-shadow(0 -10px 20px rgba(0,0,0,0.3))';
                    reflection.style.opacity = '0.5';
                    ripple.style.display = 'block';
                    break;
                case 'mirror':
                    reflection.style.filter = 'drop-shadow(0 -10px 20px rgba(0,0,0,0.3))';
                    reflection.style.opacity = '0.8';
                    ripple.style.display = 'none';
                    break;
                case 'glass':
                    reflection.style.filter = 'blur(1px) drop-shadow(0 -5px 10px rgba(0,0,0,0.2))';
                    reflection.style.opacity = '0.3';
                    ripple.style.display = 'none';
                    break;
            }
        }

        function toggleAnimation() {
            isAnimating = !isAnimating;
            const elements = document.querySelectorAll('.original-object, .reflected-object, .water-ripple');
            elements.forEach(el => {
                el.style.animationPlayState = isAnimating ? 'running' : 'paused';
            });
        }
    </script>
</body>
</html>
