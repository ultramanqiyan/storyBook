<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>瘟疫危机风格 - 乐高故事书</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --disease-blue: #0066cc;
            --disease-yellow: #ffd700;
            --disease-black: #1a1a1a;
            --disease-red: #dc2626;
            --cure-green: #22c55e;
            --bg-dark: #1a2a3a;
            --bg-medium: #2a3a4a;
            --text-primary: #f8fafc;
            --text-secondary: #a0b0c0;
            --font-title: 'Cinzel', serif;
            --font-body: 'Noto Sans SC', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-body);
            background: linear-gradient(180deg, var(--bg-medium) 0%, var(--bg-dark) 100%);
            min-height: 100vh;
            color: var(--text-primary);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            padding: 40px 20px;
        }

        .main-title {
            font-family: var(--font-title);
            font-size: 3rem;
            font-weight: 700;
            color: var(--cure-green);
            text-shadow: 0 0 20px rgba(34, 197, 94, 0.3);
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 1.1rem;
            color: var(--text-secondary);
        }

        .disease-bar {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 30px 0;
        }

        .disease-item {
            text-align: center;
        }

        .disease-cube {
            width: 30px;
            height: 30px;
            border-radius: 5px;
            margin: 0 auto 8px;
            position: relative;
        }

        .disease-cube::before {
            content: '';
            position: absolute;
            top: 20%;
            left: 20%;
            width: 30%;
            height: 30%;
            background: rgba(255,255,255,0.4);
        }

        .disease-cube.blue { background: linear-gradient(135deg, #60a5fa, var(--disease-blue)); }
        .disease-cube.yellow { background: linear-gradient(135deg, #fde047, var(--disease-yellow)); }
        .disease-cube.black { background: linear-gradient(135deg, #525252, var(--disease-black)); }
        .disease-cube.red { background: linear-gradient(135deg, #f87171, var(--disease-red)); }

        .disease-count {
            font-family: var(--font-title);
            font-weight: 700;
        }

        .disease-name {
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        .section {
            margin: 40px 0;
        }

        .section-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--cure-green);
        }

        .section-title {
            font-family: var(--font-title);
            font-size: 1.5rem;
            color: var(--cure-green);
        }

        .world-map {
            background: linear-gradient(180deg, #1e3a5f, #0f1c2e);
            border-radius: 20px;
            padding: 30px;
            margin: 30px 0;
            position: relative;
            border: 3px solid var(--cure-green);
        }

        .map-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 15px;
        }

        .city-node {
            aspect-ratio: 1;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid rgba(255,255,255,0.2);
            position: relative;
        }

        .city-node:hover {
            transform: scale(1.1);
            border-color: var(--cure-green);
        }

        .city-node.infected-blue { border-color: var(--disease-blue); box-shadow: 0 0 15px rgba(0, 102, 204, 0.5); }
        .city-node.infected-yellow { border-color: var(--disease-yellow); box-shadow: 0 0 15px rgba(255, 215, 0, 0.5); }
        .city-node.infected-red { border-color: var(--disease-red); box-shadow: 0 0 15px rgba(220, 38, 38, 0.5); }
        .city-node.infected-black { border-color: var(--disease-black); box-shadow: 0 0 15px rgba(26, 26, 26, 0.5); }
        .city-node.research { border-color: var(--cure-green); background: rgba(34, 197, 94, 0.2); }

        .city-icon {
            font-size: 1.2rem;
        }

        .city-name {
            font-size: 0.5rem;
            color: var(--text-secondary);
            margin-top: 2px;
            text-align: center;
        }

        .city-cubes {
            position: absolute;
            top: -5px;
            right: -5px;
            display: flex;
            gap: 2px;
        }

        .mini-cube {
            width: 8px;
            height: 8px;
            border-radius: 2px;
        }

        .mini-cube.blue { background: var(--disease-blue); }
        .mini-cube.yellow { background: var(--disease-yellow); }
        .mini-cube.red { background: var(--disease-red); }
        .mini-cube.black { background: #555; }

        .role-cards {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
        }

        .role-card {
            background: linear-gradient(180deg, var(--bg-medium), var(--bg-dark));
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 3px solid;
        }

        .role-card:hover {
            transform: translateY(-10px);
        }

        .role-card.medic { border-color: var(--disease-red); }
        .role-card.scientist { border-color: var(--disease-blue); }
        .role-card.dispatcher { border-color: var(--disease-yellow); }
        .role-card.operations { border-color: #888; }

        .role-icon {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .role-name {
            font-family: var(--font-title);
            font-size: 1rem;
            font-weight: 600;
        }

        .role-ability {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-top: 5px;
        }

        .cure-status {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 20px 0;
        }

        .cure-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 20px;
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
            border: 2px solid;
        }

        .cure-item.cured { border-color: var(--cure-green); }
        .cure-item.cured .cure-check { display: block; }
        .cure-item:not(.cured) .cure-check { display: none; }

        .cure-check {
            color: var(--cure-green);
            font-size: 1.2rem;
        }

        .cta-section {
            text-align: center;
            margin: 50px 0;
        }

        .cta-btn {
            display: inline-block;
            padding: 15px 50px;
            font-size: 1.2rem;
            font-weight: 700;
            border: none;
            border-radius: 25px;
            background: linear-gradient(135deg, var(--cure-green), #16a34a);
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .cta-btn:hover {
            transform: scale(1.05);
        }

        .footer {
            text-align: center;
            padding: 30px;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        @media (max-width: 600px) {
            .map-grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1 class="main-title">🌍 瘟疫危机风格</h1>
            <p class="subtitle">全球合作 · 疾病控制 · 拯救世界</p>
        </header>

        <div class="disease-bar">
            <div class="disease-item">
                <div class="disease-cube blue"></div>
                <div class="disease-count">18</div>
                <div class="disease-name">蓝色病毒</div>
            </div>
            <div class="disease-item">
                <div class="disease-cube yellow"></div>
                <div class="disease-count">15</div>
                <div class="disease-name">黄色病毒</div>
            </div>
            <div class="disease-item">
                <div class="disease-cube black"></div>
                <div class="disease-count">12</div>
                <div class="disease-name">黑色病毒</div>
            </div>
            <div class="disease-item">
                <div class="disease-cube red"></div>
                <div class="disease-count">20</div>
                <div class="disease-name">红色病毒</div>
            </div>
        </div>

        <section class="section">
            <div class="section-header">
                <span>🗺️</span>
                <h2 class="section-title">全球地图</h2>
            </div>
            <div class="world-map">
                <div class="map-grid">
                    <div class="city-node infected-blue">
                        <div class="city-cubes"><div class="mini-cube blue"></div></div>
                        <div class="city-icon">🏙️</div>
                        <div class="city-name">亚特兰大</div>
                    </div>
                    <div class="city-node infected-yellow">
                        <div class="city-cubes"><div class="mini-cube yellow"></div><div class="mini-cube yellow"></div></div>
                        <div class="city-icon">🌴</div>
                        <div class="city-name">迈阿密</div>
                    </div>
                    <div class="city-node">
                        <div class="city-icon">🗽</div>
                        <div class="city-name">纽约</div>
                    </div>
                    <div class="city-node research">
                        <div class="city-icon">🏥</div>
                        <div class="city-name">华盛顿</div>
                    </div>
                    <div class="city-node infected-red">
                        <div class="city-cubes"><div class="mini-cube red"></div></div>
                        <div class="city-icon">🗼</div>
                        <div class="city-name">东京</div>
                    </div>
                    <div class="city-node">
                        <div class="city-icon">🏛️</div>
                        <div class="city-name">巴黎</div>
                    </div>
                    <div class="city-node infected-black">
                        <div class="city-cubes"><div class="mini-cube black"></div><div class="mini-cube black"></div></div>
                        <div class="city-icon">🕌</div>
                        <div class="city-name">开罗</div>
                    </div>
                    <div class="city-node">
                        <div class="city-icon">🏰</div>
                        <div class="city-name">伦敦</div>
                    </div>
                    <div class="city-node">
                        <div class="city-icon">🏯</div>
                        <div class="city-name">北京</div>
                    </div>
                    <div class="city-node infected-blue">
                        <div class="city-cubes"><div class="mini-cube blue"></div></div>
                        <div class="city-icon">🎪</div>
                        <div class="city-name">悉尼</div>
                    </div>
                    <div class="city-node">
                        <div class="city-icon">🗿</div>
                        <div class="city-name">里约</div>
                    </div>
                    <div class="city-node">
                        <div class="city-icon">🕌</div>
                        <div class="city-name">迪拜</div>
                    </div>
                </div>
            </div>
        </section>

        <section class="section">
            <div class="section-header">
                <span>💊</span>
                <h2 class="section-title">解药状态</h2>
            </div>
            <div class="cure-status">
                <div class="cure-item cured">
                    <div class="disease-cube blue" style="width:20px;height:20px;"></div>
                    <span class="cure-check">✓</span>
                </div>
                <div class="cure-item">
                    <div class="disease-cube yellow" style="width:20px;height:20px;"></div>
                    <span class="cure-check">✓</span>
                </div>
                <div class="cure-item">
                    <div class="disease-cube black" style="width:20px;height:20px;"></div>
                    <span class="cure-check">✓</span>
                </div>
                <div class="cure-item">
                    <div class="disease-cube red" style="width:20px;height:20px;"></div>
                    <span class="cure-check">✓</span>
                </div>
            </div>
        </section>

        <section class="section">
            <div class="section-header">
                <span>👥</span>
                <h2 class="section-title">角色卡牌</h2>
            </div>
            <div class="role-cards">
                <div class="role-card medic">
                    <div class="role-icon">👨‍⚕️</div>
                    <div class="role-name">医疗兵</div>
                    <div class="role-ability">移除所有同色疾病方块</div>
                </div>
                <div class="role-card scientist">
                    <div class="role-icon">🔬</div>
                    <div class="role-name">科学家</div>
                    <div class="role-ability">只需4张卡发现解药</div>
                </div>
                <div class="role-card dispatcher">
                    <div class="role-icon">✈️</div>
                    <div class="role-name">调度员</div>
                    <div class="role-ability">移动其他玩家</div>
                </div>
                <div class="role-card operations">
                    <div class="role-icon">🏭</div>
                    <div class="role-name">运营专家</div>
                    <div class="role-ability">建立研究站</div>
                </div>
            </div>
        </section>

        <section class="cta-section">
            <a href="index.html" class="cta-btn">🌍 返回风格选择</a>
        </section>

        <footer class="footer">
            <p>瘟疫危机风格 Demo - 乐高故事书</p>
        </footer>
    </div>
</body>
</html>
