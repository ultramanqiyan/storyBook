<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D旋转舞台 - 乐高故事书</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --stage-bg: #1a0a2e;
            --stage-floor: #2d1b4e;
            --spotlight: #ffd700;
            --accent: #ff6b6b;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --font-title: 'Cinzel', serif;
            --font-body: 'Noto Sans SC', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-body);
            background: radial-gradient(ellipse at center, var(--stage-floor) 0%, var(--stage-bg) 70%);
            min-height: 100vh;
            color: var(--text-primary);
            overflow-x: hidden;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .main-title {
            font-family: var(--font-title);
            font-size: 2.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--spotlight), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 1.1rem;
            color: var(--text-secondary);
        }

        /* 3D Stage */
        .stage-container {
            position: relative;
            height: 500px;
            perspective: 1200px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .stage {
            position: relative;
            width: 400px;
            height: 400px;
            transform-style: preserve-3d;
            animation: stage-rotate 15s linear infinite;
        }

        @keyframes stage-rotate {
            0% { transform: rotateY(0deg); }
            100% { transform: rotateY(360deg); }
        }

        .stage:hover {
            animation-play-state: paused;
        }

        /* Stage Platform */
        .platform {
            position: absolute;
            width: 100%;
            height: 100%;
            transform: rotateX(90deg) translateZ(-100px);
            background: 
                radial-gradient(circle at center, rgba(255,215,0,0.2) 0%, transparent 70%),
                repeating-conic-gradient(from 0deg, rgba(255,215,0,0.1) 0deg 30deg, transparent 30deg 60deg);
            border-radius: 50%;
            box-shadow: 
                0 0 100px rgba(255,215,0,0.3),
                inset 0 0 50px rgba(0,0,0,0.5);
        }

        /* Character Cards */
        .character-card {
            position: absolute;
            width: 140px;
            height: 200px;
            background: linear-gradient(145deg, #3d2566, #1a0f2e);
            border: 2px solid var(--spotlight);
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            backface-visibility: visible;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .character-card:hover {
            transform: scale(1.2) translateZ(50px) !important;
            box-shadow: 0 20px 60px rgba(255,215,0,0.4);
            border-color: var(--accent);
        }

        /* Position cards in a circle */
        .character-card:nth-child(1) {
            transform: rotateY(0deg) translateZ(250px);
        }

        .character-card:nth-child(2) {
            transform: rotateY(72deg) translateZ(250px);
        }

        .character-card:nth-child(3) {
            transform: rotateY(144deg) translateZ(250px);
        }

        .character-card:nth-child(4) {
            transform: rotateY(216deg) translateZ(250px);
        }

        .character-card:nth-child(5) {
            transform: rotateY(288deg) translateZ(250px);
        }

        .character-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(145deg, var(--accent), #ff8e8e);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            margin-bottom: 15px;
            box-shadow: 0 5px 20px rgba(255,107,107,0.4);
        }

        .character-name {
            font-family: var(--font-title);
            font-size: 1rem;
            color: var(--spotlight);
            text-align: center;
            font-weight: 600;
        }

        .character-role {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-top: 5px;
        }

        /* Spotlight Effects */
        .spotlight {
            position: absolute;
            top: -100px;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            height: 600px;
            background: linear-gradient(180deg, rgba(255,215,0,0.3) 0%, transparent 100%);
            filter: blur(30px);
            animation: spotlight-sweep 4s ease-in-out infinite;
        }

        @keyframes spotlight-sweep {
            0%, 100% { opacity: 0.5; transform: translateX(-50%) rotate(-15deg); }
            50% { opacity: 0.8; transform: translateX(-50%) rotate(15deg); }
        }

        /* Curtains */
        .curtain {
            position: fixed;
            top: 0;
            width: 150px;
            height: 100%;
            background: linear-gradient(90deg, #4a0e4e, #8b0000);
            z-index: -1;
        }

        .curtain-left {
            left: 0;
            background: linear-gradient(90deg, #4a0e4e 0%, #2d1b4e 100%);
        }

        .curtain-right {
            right: 0;
            background: linear-gradient(-90deg, #4a0e4e 0%, #2d1b4e 100%);
        }

        .curtain::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: repeating-linear-gradient(
                90deg,
                transparent,
                transparent 20px,
                rgba(0,0,0,0.2) 20px,
                rgba(0,0,0,0.2) 40px
            );
        }

        /* Story Section */
        .story-section {
            margin-top: 60px;
            padding: 40px;
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            border: 1px solid rgba(255,215,0,0.2);
            backdrop-filter: blur(10px);
        }

        .section-title {
            font-family: var(--font-title);
            font-size: 2rem;
            color: var(--spotlight);
            margin-bottom: 30px;
            text-align: center;
        }

        .acts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .act-card {
            background: linear-gradient(145deg, rgba(255,255,255,0.1), rgba(255,255,255,0.05));
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            border: 1px solid rgba(255,215,0,0.2);
            transition: all 0.4s ease;
            cursor: pointer;
        }

        .act-card:hover {
            transform: translateY(-10px) scale(1.05);
            box-shadow: 0 20px 40px rgba(255,215,0,0.2);
            border-color: var(--spotlight);
        }

        .act-number {
            font-family: var(--font-title);
            font-size: 2rem;
            color: var(--accent);
            margin-bottom: 10px;
        }

        .act-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .act-desc {
            font-size: 0.85rem;
            color: var(--text-secondary);
            line-height: 1.5;
        }

        /* Navigation */
        .nav-bar {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 60px;
        }

        .nav-btn {
            padding: 15px 40px;
            background: linear-gradient(145deg, rgba(255,255,255,0.1), rgba(255,255,255,0.05));
            border: 2px solid var(--spotlight);
            border-radius: 30px;
            color: var(--spotlight);
            font-family: var(--font-title);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }

        .nav-btn:hover {
            background: var(--spotlight);
            color: var(--stage-bg);
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(255,215,0,0.3);
        }

        /* Floating particles */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 6px;
            height: 6px;
            background: var(--spotlight);
            border-radius: 50%;
            opacity: 0.4;
            animation: particle-rise 8s linear infinite;
        }

        @keyframes particle-rise {
            0% {
                transform: translateY(100vh) scale(0);
                opacity: 0;
            }
            10% {
                opacity: 0.4;
            }
            90% {
                opacity: 0.4;
            }
            100% {
                transform: translateY(-100vh) scale(1);
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <div class="curtain curtain-left"></div>
    <div class="curtain curtain-right"></div>
    <div class="particles" id="particles"></div>
    
    <div class="container">
        <header class="header">
            <h1 class="main-title">3D旋转舞台</h1>
            <p class="subtitle">聚光灯下的角色展示 - 圆形旋转舞台</p>
        </header>

        <div class="stage-container">
            <div class="spotlight"></div>
            <div class="stage">
                <div class="platform"></div>
                
                <div class="character-card">
                    <div class="character-avatar">🎭</div>
                    <div class="character-name">主角</div>
                    <div class="character-role">Hero</div>
                </div>
                
                <div class="character-card">
                    <div class="character-avatar">👑</div>
                    <div class="character-name">国王</div>
                    <div class="character-role">King</div>
                </div>
                
                <div class="character-card">
                    <div class="character-avatar">🧙</div>
                    <div class="character-name">巫师</div>
                    <div class="character-role">Wizard</div>
                </div>
                
                <div class="character-card">
                    <div class="character-avatar">⚔️</div>
                    <div class="character-name">骑士</div>
                    <div class="character-role">Knight</div>
                </div>
                
                <div class="character-card">
                    <div class="character-avatar">🧚</div>
                    <div class="character-name">精灵</div>
                    <div class="character-role">Fairy</div>
                </div>
            </div>
        </div>

        <section class="story-section">
            <h2 class="section-title">剧情章节</h2>
            <div class="acts-grid">
                <div class="act-card">
                    <div class="act-number">I</div>
                    <div class="act-title">第一幕：启程</div>
                    <div class="act-desc">主角在平凡的世界中接到冒险的召唤</div>
                </div>
                <div class="act-card">
                    <div class="act-number">II</div>
                    <div class="act-title">第二幕：考验</div>
                    <div class="act-desc">跨越边界，面对未知的挑战和敌人</div>
                </div>
                <div class="act-card">
                    <div class="act-number">III</div>
                    <div class="act-title">第三幕：深渊</div>
                    <div class="act-desc">最黑暗的时刻，面对内心的恐惧</div>
                </div>
                <div class="act-card">
                    <div class="act-number">IV</div>
                    <div class="act-title">第四幕：转变</div>
                    <div class="act-desc">获得新的力量，准备最终决战</div>
                </div>
                <div class="act-card">
                    <div class="act-number">V</div>
                    <div class="act-title">第五幕：归来</div>
                    <div class="act-desc">带着宝藏和智慧回到故乡</div>
                </div>
            </div>
        </section>

        <nav class="nav-bar">
            <a href="3d-03-perspective-hall.html" class="nav-btn">上一个效果</a>
            <a href="index.html" class="nav-btn">返回首页</a>
            <a href="3d-05-tilt-interaction.html" class="nav-btn">下一个效果</a>
        </nav>
    </div>

    <script>
        // Create floating particles
        const particlesContainer = document.getElementById('particles');
        for (let i = 0; i < 20; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.animationDelay = Math.random() * 8 + 's';
            particle.style.animationDuration = (6 + Math.random() * 4) + 's';
            particlesContainer.appendChild(particle);
        }
    </script>
</body>
</html>
