<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D透视走廊 - 乐高故事书</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --hall-dark: #0a0a0f;
            --hall-mid: #1a1a2e;
            --hall-light: #2d2d44;
            --accent: #00d4ff;
            --accent-glow: rgba(0, 212, 255, 0.5);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --font-title: 'Cinzel', serif;
            --font-body: 'Noto Sans SC', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-body);
            background: var(--hall-dark);
            min-height: 100vh;
            color: var(--text-primary);
            overflow-x: hidden;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .main-title {
            font-family: var(--font-title);
            font-size: 2.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent), #0099cc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 1.1rem;
            color: var(--text-secondary);
        }

        /* 3D Perspective Hall */
        .hall-container {
            position: relative;
            height: 500px;
            perspective: 800px;
            overflow: hidden;
            border-radius: 20px;
            background: linear-gradient(180deg, var(--hall-dark) 0%, var(--hall-mid) 100%);
        }

        .hall {
            position: absolute;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            transform: rotateX(20deg);
            transform-origin: center bottom;
        }

        .hall-floor {
            position: absolute;
            bottom: 0;
            left: 50%;
            width: 200%;
            height: 100%;
            transform: translateX(-50%) rotateX(90deg);
            transform-origin: bottom center;
            background: 
                linear-gradient(90deg, transparent 49%, var(--accent) 49%, var(--accent) 51%, transparent 51%),
                linear-gradient(0deg, var(--hall-dark) 0%, var(--hall-mid) 100%);
            background-size: 100px 100%, 100% 100%;
            animation: floor-move 3s linear infinite;
        }

        @keyframes floor-move {
            0% { background-position: 0 0, 0 0; }
            100% { background-position: 100px 0, 0 0; }
        }

        .hall-ceiling {
            position: absolute;
            top: 0;
            left: 50%;
            width: 200%;
            height: 100%;
            transform: translateX(-50%) rotateX(-90deg);
            transform-origin: top center;
            background: linear-gradient(180deg, var(--hall-dark) 0%, transparent 100%);
        }

        .hall-wall-left {
            position: absolute;
            left: 0;
            top: 0;
            width: 50%;
            height: 100%;
            transform: rotateY(45deg);
            transform-origin: left center;
            background: linear-gradient(90deg, var(--hall-dark) 0%, transparent 100%);
        }

        .hall-wall-right {
            position: absolute;
            right: 0;
            top: 0;
            width: 50%;
            height: 100%;
            transform: rotateY(-45deg);
            transform-origin: right center;
            background: linear-gradient(-90deg, var(--hall-dark) 0%, transparent 100%);
        }

        /* Floating Cards in Hall */
        .hall-cards {
            position: absolute;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
        }

        .hall-card {
            position: absolute;
            width: 180px;
            height: 240px;
            background: linear-gradient(145deg, var(--hall-light), var(--hall-mid));
            border: 2px solid var(--accent);
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.5s ease;
            box-shadow: 0 0 30px var(--accent-glow);
        }

        .hall-card:hover {
            transform: scale(1.2) translateZ(50px) !important;
            box-shadow: 0 0 60px var(--accent-glow);
        }

        .hall-card:nth-child(1) {
            left: 20%;
            top: 40%;
            transform: translateZ(-100px) rotateY(15deg);
            animation: card-float-1 4s ease-in-out infinite;
        }

        .hall-card:nth-child(2) {
            left: 50%;
            top: 30%;
            transform: translateX(-50%) translateZ(-200px);
            animation: card-float-2 5s ease-in-out infinite;
        }

        .hall-card:nth-child(3) {
            right: 20%;
            top: 40%;
            transform: translateZ(-100px) rotateY(-15deg);
            animation: card-float-3 4.5s ease-in-out infinite;
        }

        .hall-card:nth-child(4) {
            left: 35%;
            top: 60%;
            transform: translateZ(-300px) rotateY(10deg);
            animation: card-float-4 6s ease-in-out infinite;
        }

        .hall-card:nth-child(5) {
            right: 35%;
            top: 60%;
            transform: translateZ(-300px) rotateY(-10deg);
            animation: card-float-5 5.5s ease-in-out infinite;
        }

        @keyframes card-float-1 {
            0%, 100% { transform: translateZ(-100px) rotateY(15deg) translateY(0); }
            50% { transform: translateZ(-100px) rotateY(15deg) translateY(-20px); }
        }

        @keyframes card-float-2 {
            0%, 100% { transform: translateX(-50%) translateZ(-200px) translateY(0); }
            50% { transform: translateX(-50%) translateZ(-200px) translateY(-25px); }
        }

        @keyframes card-float-3 {
            0%, 100% { transform: translateZ(-100px) rotateY(-15deg) translateY(0); }
            50% { transform: translateZ(-100px) rotateY(-15deg) translateY(-20px); }
        }

        @keyframes card-float-4 {
            0%, 100% { transform: translateZ(-300px) rotateY(10deg) translateY(0); }
            50% { transform: translateZ(-300px) rotateY(10deg) translateY(-15px); }
        }

        @keyframes card-float-5 {
            0%, 100% { transform: translateZ(-300px) rotateY(-10deg) translateY(0); }
            50% { transform: translateZ(-300px) rotateY(-10deg) translateY(-15px); }
        }

        .hall-card-icon {
            font-size: 3rem;
            margin-bottom: 15px;
        }

        .hall-card-title {
            font-family: var(--font-title);
            font-size: 1rem;
            color: var(--accent);
            text-align: center;
        }

        /* Light Beams */
        .light-beam {
            position: absolute;
            top: 0;
            width: 100px;
            height: 100%;
            background: linear-gradient(180deg, var(--accent-glow) 0%, transparent 70%);
            opacity: 0.3;
            animation: beam-sweep 8s ease-in-out infinite;
        }

        .light-beam:nth-child(1) { left: 20%; animation-delay: 0s; }
        .light-beam:nth-child(2) { left: 50%; animation-delay: -2s; }
        .light-beam:nth-child(3) { left: 80%; animation-delay: -4s; }

        @keyframes beam-sweep {
            0%, 100% { opacity: 0.1; transform: translateX(-20px); }
            50% { opacity: 0.4; transform: translateX(20px); }
        }

        /* Story Section */
        .story-section {
            margin-top: 60px;
            padding: 40px;
            background: rgba(255,255,255,0.03);
            border-radius: 20px;
            border: 1px solid rgba(0,212,255,0.2);
        }

        .section-title {
            font-family: var(--font-title);
            font-size: 2rem;
            color: var(--accent);
            margin-bottom: 30px;
            text-align: center;
        }

        .story-timeline {
            display: flex;
            justify-content: space-between;
            position: relative;
            padding: 20px 0;
        }

        .story-timeline::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
        }

        .timeline-item {
            position: relative;
            text-align: center;
            flex: 1;
        }

        .timeline-dot {
            width: 20px;
            height: 20px;
            background: var(--accent);
            border-radius: 50%;
            margin: 0 auto 15px;
            box-shadow: 0 0 20px var(--accent-glow);
            animation: dot-pulse 2s ease-in-out infinite;
        }

        @keyframes dot-pulse {
            0%, 100% { transform: scale(1); box-shadow: 0 0 20px var(--accent-glow); }
            50% { transform: scale(1.2); box-shadow: 0 0 40px var(--accent-glow); }
        }

        .timeline-title {
            font-size: 0.9rem;
            color: var(--text-primary);
            font-weight: 600;
        }

        /* Navigation */
        .nav-bar {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 60px;
        }

        .nav-btn {
            padding: 15px 40px;
            background: transparent;
            border: 2px solid var(--accent);
            border-radius: 30px;
            color: var(--accent);
            font-family: var(--font-title);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }

        .nav-btn:hover {
            background: var(--accent);
            color: var(--hall-dark);
            transform: translateY(-3px);
            box-shadow: 0 10px 30px var(--accent-glow);
        }

        /* Grid Overlay */
        .grid-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
            z-index: -1;
        }
    </style>
</head>
<body>
    <div class="grid-overlay"></div>
    
    <div class="container">
        <header class="header">
            <h1 class="main-title">3D透视走廊</h1>
            <p class="subtitle">科幻风格的无限走廊 - 卡片在空间中漂浮</p>
        </header>

        <div class="hall-container">
            <div class="hall">
                <div class="hall-floor"></div>
                <div class="hall-ceiling"></div>
                <div class="hall-wall-left"></div>
                <div class="hall-wall-right"></div>
                
                <div class="light-beam"></div>
                <div class="light-beam"></div>
                <div class="light-beam"></div>
                
                <div class="hall-cards">
                    <div class="hall-card">
                        <div class="hall-card-icon">🚀</div>
                        <div class="hall-card-title">太空探索</div>
                    </div>
                    <div class="hall-card">
                        <div class="hall-card-icon">🤖</div>
                        <div class="hall-card-title">人工智能</div>
                    </div>
                    <div class="hall-card">
                        <div class="hall-card-icon">🌌</div>
                        <div class="hall-card-title">星际旅行</div>
                    </div>
                    <div class="hall-card">
                        <div class="hall-card-icon">⚡</div>
                        <div class="hall-card-title">能量核心</div>
                    </div>
                    <div class="hall-card">
                        <div class="hall-card-icon">🔬</div>
                        <div class="hall-card-title">未来科技</div>
                    </div>
                </div>
            </div>
        </div>

        <section class="story-section">
            <h2 class="section-title">时间线</h2>
            <div class="story-timeline">
                <div class="timeline-item">
                    <div class="timeline-dot"></div>
                    <div class="timeline-title">2024</div>
                </div>
                <div class="timeline-item">
                    <div class="timeline-dot"></div>
                    <div class="timeline-title">2030</div>
                </div>
                <div class="timeline-item">
                    <div class="timeline-dot"></div>
                    <div class="timeline-title">2045</div>
                </div>
                <div class="timeline-item">
                    <div class="timeline-dot"></div>
                    <div class="timeline-title">2060</div>
                </div>
                <div class="timeline-item">
                    <div class="timeline-dot"></div>
                    <div class="timeline-title">2100</div>
                </div>
            </div>
        </section>

        <nav class="nav-bar">
            <a href="3d-02-floating-island.html" class="nav-btn">上一个效果</a>
            <a href="index.html" class="nav-btn">返回首页</a>
            <a href="3d-04-rotating-stage.html" class="nav-btn">下一个效果</a>
        </nav>
    </div>
</body>
</html>
