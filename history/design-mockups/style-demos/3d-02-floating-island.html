<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D悬浮岛屿 - 乐高故事书</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --sky-top: #1a1a3e;
            --sky-bottom: #4a4a8a;
            --island-base: #5d4e37;
            --island-top: #7cb342;
            --accent: #ffd700;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --font-title: 'Cinzel', serif;
            --font-body: 'Noto Sans SC', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-body);
            background: linear-gradient(180deg, var(--sky-top) 0%, var(--sky-bottom) 100%);
            min-height: 100vh;
            color: var(--text-primary);
            overflow-x: hidden;
            perspective: 1500px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 60px;
        }

        .main-title {
            font-family: var(--font-title);
            font-size: 2.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #87ceeb, #ffd700);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 1.1rem;
            color: var(--text-secondary);
        }

        /* 3D Scene Container */
        .scene {
            position: relative;
            height: 600px;
            perspective: 1500px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .island-container {
            position: relative;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            animation: scene-rotate 20s linear infinite;
        }

        @keyframes scene-rotate {
            0% { transform: rotateY(0deg); }
            100% { transform: rotateY(360deg); }
        }

        /* Floating Islands */
        .island {
            position: absolute;
            transform-style: preserve-3d;
            cursor: pointer;
            transition: transform 0.5s ease;
        }

        .island:hover {
            animation-play-state: paused;
        }

        .island-main {
            width: 300px;
            height: 200px;
            left: 50%;
            top: 50%;
            margin-left: -150px;
            margin-top: -100px;
            animation: float-main 4s ease-in-out infinite;
        }

        .island-left {
            width: 180px;
            height: 140px;
            left: 15%;
            top: 40%;
            animation: float-left 5s ease-in-out infinite;
        }

        .island-right {
            width: 200px;
            height: 150px;
            right: 15%;
            top: 35%;
            animation: float-right 4.5s ease-in-out infinite;
        }

        .island-top {
            width: 150px;
            height: 100px;
            left: 60%;
            top: 15%;
            animation: float-top 6s ease-in-out infinite;
        }

        @keyframes float-main {
            0%, 100% { transform: translateY(0) rotateX(10deg); }
            50% { transform: translateY(-20px) rotateX(10deg); }
        }

        @keyframes float-left {
            0%, 100% { transform: translateY(0) rotateY(-20deg) rotateX(5deg); }
            50% { transform: translateY(-15px) rotateY(-20deg) rotateX(5deg); }
        }

        @keyframes float-right {
            0%, 100% { transform: translateY(0) rotateY(20deg) rotateX(5deg); }
            50% { transform: translateY(-25px) rotateY(20deg) rotateX(5deg); }
        }

        @keyframes float-top {
            0%, 100% { transform: translateY(0) rotateY(10deg) rotateX(15deg); }
            50% { transform: translateY(-30px) rotateY(10deg) rotateX(15deg); }
        }

        /* Island Structure */
        .island-base {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            height: 60%;
            background: linear-gradient(180deg, var(--island-base) 0%, #3d3225 100%);
            clip-path: polygon(20% 0%, 80% 0%, 100% 100%, 0% 100%);
            box-shadow: inset 0 -20px 40px rgba(0,0,0,0.5);
        }

        .island-top-surface {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 60%;
            height: 50%;
            background: linear-gradient(180deg, var(--island-top) 0%, #558b2f 100%);
            border-radius: 50% 50% 0 0;
            box-shadow: inset 0 10px 30px rgba(255,255,255,0.2);
        }

        .island-content {
            position: absolute;
            top: 20%;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            z-index: 10;
        }

        .island-icon {
            font-size: 3rem;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3));
            animation: icon-bounce 2s ease-in-out infinite;
        }

        @keyframes icon-bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .island-title {
            font-family: var(--font-title);
            font-size: 1rem;
            color: var(--text-primary);
            margin-top: 10px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        /* Clouds */
        .cloud {
            position: absolute;
            background: rgba(255,255,255,0.1);
            border-radius: 100px;
            filter: blur(20px);
            animation: cloud-float 15s linear infinite;
        }

        .cloud-1 {
            width: 200px;
            height: 60px;
            top: 20%;
            left: -10%;
        }

        .cloud-2 {
            width: 150px;
            height: 40px;
            top: 60%;
            right: -5%;
            animation-delay: -5s;
        }

        .cloud-3 {
            width: 180px;
            height: 50px;
            top: 80%;
            left: 20%;
            animation-delay: -10s;
        }

        @keyframes cloud-float {
            0% { transform: translateX(0); }
            100% { transform: translateX(calc(100vw + 200px)); }
        }

        /* Story Cards Section */
        .story-section {
            margin-top: 60px;
            padding: 40px;
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .section-title {
            font-family: var(--font-title);
            font-size: 2rem;
            color: var(--accent);
            margin-bottom: 30px;
            text-align: center;
        }

        .story-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
        }

        .story-card {
            background: linear-gradient(145deg, rgba(255,255,255,0.1), rgba(255,255,255,0.05));
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform-style: preserve-3d;
        }

        .story-card:hover {
            transform: translateY(-15px) rotateX(10deg);
            box-shadow: 0 30px 60px rgba(0,0,0,0.3);
            border-color: var(--accent);
        }

        .story-icon {
            font-size: 3rem;
            margin-bottom: 15px;
        }

        .story-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .story-desc {
            font-size: 0.9rem;
            color: var(--text-secondary);
            line-height: 1.6;
        }

        /* Navigation */
        .nav-bar {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 60px;
        }

        .nav-btn {
            padding: 15px 40px;
            background: linear-gradient(145deg, rgba(255,255,255,0.1), rgba(255,255,255,0.05));
            border: 2px solid var(--accent);
            border-radius: 30px;
            color: var(--accent);
            font-family: var(--font-title);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }

        .nav-btn:hover {
            background: var(--accent);
            color: var(--sky-top);
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(255,215,0,0.3);
        }

        /* Stars */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }

        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            animation: twinkle 3s ease-in-out infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="stars" id="stars"></div>
    <div class="cloud cloud-1"></div>
    <div class="cloud cloud-2"></div>
    <div class="cloud cloud-3"></div>
    
    <div class="container">
        <header class="header">
            <h1 class="main-title">3D悬浮岛屿</h1>
            <p class="subtitle">漂浮在云端的神秘岛屿 - 自动旋转场景</p>
        </header>

        <div class="scene">
            <div class="island-container">
                <div class="island island-left">
                    <div class="island-base"></div>
                    <div class="island-top-surface"></div>
                    <div class="island-content">
                        <div class="island-icon">🏔️</div>
                        <div class="island-title">雪山岛</div>
                    </div>
                </div>

                <div class="island island-main">
                    <div class="island-base"></div>
                    <div class="island-top-surface"></div>
                    <div class="island-content">
                        <div class="island-icon">🏰</div>
                        <div class="island-title">主城岛</div>
                    </div>
                </div>

                <div class="island island-right">
                    <div class="island-base"></div>
                    <div class="island-top-surface"></div>
                    <div class="island-content">
                        <div class="island-icon">🌋</div>
                        <div class="island-title">火山岛</div>
                    </div>
                </div>

                <div class="island island-top">
                    <div class="island-base"></div>
                    <div class="island-top-surface"></div>
                    <div class="island-content">
                        <div class="island-icon">⭐</div>
                        <div class="island-title">天空岛</div>
                    </div>
                </div>
            </div>
        </div>

        <section class="story-section">
            <h2 class="section-title">岛屿传说</h2>
            <div class="story-grid">
                <div class="story-card">
                    <div class="story-icon">📜</div>
                    <div class="story-title">古老传说</div>
                    <div class="story-desc">千年之前，四位元素守护者创造了这些漂浮岛屿，每个岛屿都蕴含着不同的魔法力量。</div>
                </div>
                <div class="story-card">
                    <div class="story-icon">🔮</div>
                    <div class="story-title">魔法源泉</div>
                    <div class="story-desc">岛屿核心深处流淌着纯净的魔法能量，维持着岛屿的漂浮状态和生态平衡。</div>
                </div>
                <div class="story-card">
                    <div class="story-icon">🌉</div>
                    <div class="story-title">天空之桥</div>
                    <div class="story-desc">勇敢的冒险者可以通过魔法桥梁在岛屿间穿梭，探索未知的领域和宝藏。</div>
                </div>
                <div class="story-card">
                    <div class="story-icon">👑</div>
                    <div class="story-title">守护者</div>
                    <div class="story-desc">每个岛屿都有强大的守护者，只有获得他们的认可才能进入岛屿的核心区域。</div>
                </div>
            </div>
        </section>

        <nav class="nav-bar">
            <a href="3d-01-flip-cards.html" class="nav-btn">上一个效果</a>
            <a href="index.html" class="nav-btn">返回首页</a>
            <a href="3d-03-perspective-hall.html" class="nav-btn">下一个效果</a>
        </nav>
    </div>

    <script>
        // Create stars
        const starsContainer = document.getElementById('stars');
        for (let i = 0; i < 100; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.animationDelay = Math.random() * 3 + 's';
            starsContainer.appendChild(star);
        }

        // Pause rotation on hover
        const islands = document.querySelectorAll('.island');
        const container = document.querySelector('.island-container');
        
        islands.forEach(island => {
            island.addEventListener('mouseenter', () => {
                container.style.animationPlayState = 'paused';
            });
            island.addEventListener('mouseleave', () => {
                container.style.animationPlayState = 'running';
            });
        });
    </script>
</body>
</html>
