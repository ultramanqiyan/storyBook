<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>谁是卧底风格 - 乐高故事书</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1e3a5f;
            --accent: #ffd700;
            --suspicious: #ff6b6b;
            --bg-dark: #0f1c2e;
            --bg-medium: #1a2d45;
            --bg-light: #253a55;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --font-title: 'Cinzel', serif;
            --font-body: 'Noto Sans SC', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-body);
            background: linear-gradient(180deg, var(--bg-medium) 0%, var(--bg-dark) 100%);
            min-height: 100vh;
            color: var(--text-primary);
            overflow-x: hidden;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            padding: 40px 20px;
        }

        .main-title {
            font-family: var(--font-title);
            font-size: 3rem;
            font-weight: 700;
            color: var(--accent);
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.3);
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 1.1rem;
            color: var(--text-secondary);
        }

        .timer-ring {
            width: 150px;
            height: 150px;
            margin: 30px auto;
            position: relative;
        }

        .timer-circle {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 4px solid var(--bg-light);
            position: relative;
        }

        .timer-circle::before {
            content: '';
            position: absolute;
            inset: -4px;
            border-radius: 50%;
            border: 4px solid transparent;
            border-top-color: var(--accent);
            animation: timer-rotate 8s linear infinite;
        }

        @keyframes timer-rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .timer-text {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-title);
            font-size: 2rem;
            color: var(--accent);
        }

        .location-section {
            margin: 40px 0;
            text-align: center;
        }

        .section-title {
            font-family: var(--font-title);
            font-size: 1.5rem;
            color: var(--accent);
            margin-bottom: 20px;
        }

        .location-wheel {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            margin: 20px 0;
        }

        .location-card {
            width: 100px;
            height: 100px;
            background: var(--bg-light);
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }

        .location-card:hover {
            transform: scale(1.1);
            border-color: var(--accent);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
        }

        .location-card.active {
            background: linear-gradient(135deg, var(--primary), var(--bg-light));
            border-color: var(--accent);
        }

        .location-icon {
            font-size: 2rem;
            margin-bottom: 5px;
        }

        .location-name {
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        .players-ring {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 20px;
            margin: 40px 0;
            position: relative;
        }

        .player-card {
            width: 120px;
            text-align: center;
            position: relative;
        }

        .player-avatar {
            width: 80px;
            height: 80px;
            margin: 0 auto 10px;
            background: var(--bg-light);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            border: 3px solid var(--accent);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .player-avatar:hover {
            transform: scale(1.1);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.4);
        }

        .player-avatar.spy {
            border-color: var(--suspicious);
            animation: spy-pulse 2s ease-in-out infinite;
        }

        @keyframes spy-pulse {
            0%, 100% { box-shadow: 0 0 10px rgba(255, 107, 107, 0.3); }
            50% { box-shadow: 0 0 25px rgba(255, 107, 107, 0.6); }
        }

        .player-name {
            font-size: 0.9rem;
            margin-bottom: 5px;
        }

        .suspicion-bar {
            width: 80px;
            height: 6px;
            background: var(--bg-dark);
            border-radius: 3px;
            margin: 0 auto;
            overflow: hidden;
        }

        .suspicion-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), var(--suspicious));
            border-radius: 3px;
            transition: width 0.3s ease;
        }

        .question-mark {
            position: fixed;
            font-size: 15rem;
            color: rgba(255, 215, 0, 0.05);
            pointer-events: none;
            z-index: 0;
        }

        .question-mark.q1 { top: 10%; left: 5%; transform: rotate(-15deg); }
        .question-mark.q2 { top: 60%; right: 5%; transform: rotate(15deg); }

        .mask-decoration {
            position: fixed;
            bottom: 20px;
            right: 20px;
            font-size: 4rem;
            opacity: 0.1;
            animation: mask-float 5s ease-in-out infinite;
        }

        @keyframes mask-float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(5deg); }
        }

        .vote-section {
            background: var(--bg-light);
            border-radius: 20px;
            padding: 30px;
            margin: 40px 0;
            text-align: center;
        }

        .vote-title {
            font-family: var(--font-title);
            font-size: 1.3rem;
            color: var(--accent);
            margin-bottom: 20px;
        }

        .vote-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .vote-btn {
            padding: 12px 30px;
            border: 2px solid;
            border-radius: 25px;
            background: transparent;
            cursor: pointer;
            font-size: 1rem;
            font-family: var(--font-body);
            transition: all 0.3s ease;
        }

        .vote-btn.yes {
            border-color: var(--suspicious);
            color: var(--suspicious);
        }

        .vote-btn.yes:hover {
            background: var(--suspicious);
            color: white;
        }

        .vote-btn.no {
            border-color: var(--accent);
            color: var(--accent);
        }

        .vote-btn.no:hover {
            background: var(--accent);
            color: var(--bg-dark);
        }

        .cta-section {
            text-align: center;
            margin: 50px 0;
        }

        .cta-btn {
            display: inline-block;
            padding: 15px 50px;
            font-size: 1.2rem;
            font-weight: 700;
            border: none;
            border-radius: 25px;
            background: linear-gradient(135deg, var(--primary), var(--bg-light));
            color: var(--accent);
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            border: 2px solid var(--accent);
        }

        .cta-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.3);
        }

        .footer {
            text-align: center;
            padding: 30px;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        @media (max-width: 768px) {
            .location-card {
                width: 80px;
                height: 80px;
            }
            .location-icon {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="question-mark q1">?</div>
    <div class="question-mark q2">?</div>

    <div class="container">
        <header class="header">
            <h1 class="main-title">🎭 谁是卧底风格</h1>
            <p class="subtitle">地点隐藏 · 身份推理 · 悬疑计时</p>
        </header>

        <div class="timer-ring">
            <div class="timer-circle"></div>
            <div class="timer-text">8:00</div>
        </div>

        <section class="location-section">
            <h2 class="section-title">📍 可能的地点</h2>
            <div class="location-wheel">
                <div class="location-card">
                    <div class="location-icon">🏰</div>
                    <div class="location-name">城堡</div>
                </div>
                <div class="location-card active">
                    <div class="location-icon">🌲</div>
                    <div class="location-name">森林</div>
                </div>
                <div class="location-card">
                    <div class="location-icon">🏔️</div>
                    <div class="location-name">山脉</div>
                </div>
                <div class="location-card">
                    <div class="location-icon">🏝️</div>
                    <div class="location-name">岛屿</div>
                </div>
                <div class="location-card">
                    <div class="location-icon">🌊</div>
                    <div class="location-name">海洋</div>
                </div>
                <div class="location-card">
                    <div class="location-icon">🏜️</div>
                    <div class="location-name">沙漠</div>
                </div>
                <div class="location-card">
                    <div class="location-icon">🏯</div>
                    <div class="location-name">神殿</div>
                </div>
                <div class="location-card">
                    <div class="location-icon">❄️</div>
                    <div class="location-name">冰原</div>
                </div>
            </div>
        </section>

        <section class="players-ring">
            <div class="player-card">
                <div class="player-avatar">🧙‍♂️</div>
                <div class="player-name">法师</div>
                <div class="suspicion-bar"><div class="suspicion-fill" style="width: 30%"></div></div>
            </div>
            <div class="player-card">
                <div class="player-avatar">⚔️</div>
                <div class="player-name">骑士</div>
                <div class="suspicion-bar"><div class="suspicion-fill" style="width: 50%"></div></div>
            </div>
            <div class="player-card">
                <div class="player-avatar spy">🥷</div>
                <div class="player-name">刺客</div>
                <div class="suspicion-bar"><div class="suspicion-fill" style="width: 80%"></div></div>
            </div>
            <div class="player-card">
                <div class="player-avatar">🧝‍♀️</div>
                <div class="player-name">精灵</div>
                <div class="suspicion-bar"><div class="suspicion-fill" style="width: 20%"></div></div>
            </div>
            <div class="player-card">
                <div class="player-avatar">🛡️</div>
                <div class="player-name">守护者</div>
                <div class="suspicion-bar"><div class="suspicion-fill" style="width: 40%"></div></div>
            </div>
        </section>

        <section class="vote-section">
            <h3 class="vote-title">🗳️ 投票：谁是卧底？</h3>
            <div class="vote-buttons">
                <button class="vote-btn yes">认为是刺客</button>
                <button class="vote-btn no">不是刺客</button>
            </div>
        </section>

        <section class="cta-section">
            <a href="index.html" class="cta-btn">🎭 返回风格选择</a>
        </section>

        <footer class="footer">
            <p>谁是卧底风格 Demo - 乐高故事书</p>
        </footer>
    </div>

    <div class="mask-decoration">🎭</div>

    <script>
        document.querySelectorAll('.location-card').forEach(function(card) {
            card.addEventListener('click', function() {
                document.querySelectorAll('.location-card').forEach(function(c) {
                    c.classList.remove('active');
                });
                this.classList.add('active');
            });
        });
    </script>
</body>
</html>
