<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D弹簧动画 - 乐高故事书</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --spring-1: #ff006e;
            --spring-2: #8338ec;
            --spring-3: #3a86ff;
            --spring-4: #06ffa5;
            --bg-dark: #0a0a0f;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: radial-gradient(ellipse at center, #1a1a2e 0%, var(--bg-dark) 100%);
            min-height: 100vh;
            color: #f8fafc;
            overflow-x: hidden;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .main-title {
            font-family: 'Cinzel', serif;
            font-size: 2.8rem;
            background: linear-gradient(135deg, var(--spring-1), var(--spring-3), var(--spring-4));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #94a3b8;
            font-size: 1.1rem;
        }

        .spring-scene {
            position: relative;
            height: 600px;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1000px;
        }

        .spring-container {
            position: relative;
            width: 300px;
            height: 500px;
            transform-style: preserve-3d;
        }

        .spring {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 100px;
            height: 300px;
        }

        .spring-coil {
            position: absolute;
            width: 100%;
            height: 20px;
            border: 4px solid;
            border-radius: 50%;
            animation: spring-bounce 2s ease-in-out infinite;
        }

        .spring-coil:nth-child(1) { top: 0; border-color: var(--spring-1); animation-delay: 0s; }
        .spring-coil:nth-child(2) { top: 30px; border-color: var(--spring-2); animation-delay: 0.1s; }
        .spring-coil:nth-child(3) { top: 60px; border-color: var(--spring-3); animation-delay: 0.2s; }
        .spring-coil:nth-child(4) { top: 90px; border-color: var(--spring-4); animation-delay: 0.3s; }
        .spring-coil:nth-child(5) { top: 120px; border-color: var(--spring-1); animation-delay: 0.4s; }
        .spring-coil:nth-child(6) { top: 150px; border-color: var(--spring-2); animation-delay: 0.5s; }
        .spring-coil:nth-child(7) { top: 180px; border-color: var(--spring-3); animation-delay: 0.6s; }
        .spring-coil:nth-child(8) { top: 210px; border-color: var(--spring-4); animation-delay: 0.7s; }
        .spring-coil:nth-child(9) { top: 240px; border-color: var(--spring-1); animation-delay: 0.8s; }
        .spring-coil:nth-child(10) { top: 270px; border-color: var(--spring-2); animation-delay: 0.9s; }

        @keyframes spring-bounce {
            0%, 100% { transform: scale(1) translateY(0); }
            50% { transform: scale(0.8) translateY(-20px); }
        }

        .spring-top, .spring-bottom {
            position: absolute;
            width: 120px;
            height: 20px;
            background: linear-gradient(90deg, var(--spring-3), var(--spring-4));
            border-radius: 10px;
            left: 50%;
            transform: translateX(-50%);
        }

        .spring-top {
            top: -10px;
            animation: top-bounce 2s ease-in-out infinite;
        }

        .spring-bottom {
            bottom: -10px;
        }

        @keyframes top-bounce {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(-40px); }
        }

        .ball {
            position: absolute;
            width: 60px;
            height: 60px;
            background: radial-gradient(circle at 30% 30%, #fff, var(--spring-1));
            border-radius: 50%;
            top: -70px;
            left: 50%;
            transform: translateX(-50%);
            box-shadow: 0 10px 30px rgba(255, 0, 110, 0.4);
            animation: ball-bounce 2s ease-in-out infinite;
        }

        @keyframes ball-bounce {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(-60px); }
        }

        .physics-info {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 15px;
            font-family: 'Cinzel', serif;
        }

        .info-item {
            margin: 10px 0;
            display: flex;
            justify-content: space-between;
            gap: 20px;
        }

        .info-label {
            color: #94a3b8;
        }

        .info-value {
            color: var(--spring-4);
            font-weight: bold;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 40px;
            flex-wrap: wrap;
        }

        .control-btn {
            padding: 12px 24px;
            background: rgba(255,255,255,0.1);
            border: 2px solid var(--spring-3);
            border-radius: 25px;
            color: var(--spring-3);
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Cinzel', serif;
        }

        .control-btn:hover, .control-btn.active {
            background: var(--spring-3);
            color: var(--bg-dark);
            transform: translateY(-2px);
        }

        .nav-bar {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 60px;
        }

        .nav-btn {
            padding: 15px 40px;
            background: linear-gradient(145deg, rgba(255,255,255,0.1), rgba(255,255,255,0.05));
            border: 2px solid var(--spring-3);
            border-radius: 30px;
            color: var(--spring-3);
            font-family: 'Cinzel', serif;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }

        .nav-btn:hover {
            background: var(--spring-3);
            color: var(--bg-dark);
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(58, 134, 255, 0.3);
        }

        @media (max-width: 768px) {
            .main-title { font-size: 2rem; }
            .spring-scene { height: 400px; }
            .spring-container { transform: scale(0.7); }
            .physics-info { display: none; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1 class="main-title">3D弹簧动画</h1>
            <p class="subtitle">弹性物理 - 压缩回弹螺旋弹簧</p>
        </header>

        <div class="spring-scene">
            <div class="spring-container">
                <div class="spring">
                    <div class="ball"></div>
                    <div class="spring-top"></div>
                    <div class="spring-coil"></div>
                    <div class="spring-coil"></div>
                    <div class="spring-coil"></div>
                    <div class="spring-coil"></div>
                    <div class="spring-coil"></div>
                    <div class="spring-coil"></div>
                    <div class="spring-coil"></div>
                    <div class="spring-coil"></div>
                    <div class="spring-coil"></div>
                    <div class="spring-coil"></div>
                    <div class="spring-bottom"></div>
                </div>
            </div>
            <div class="physics-info">
                <div class="info-item">
                    <span class="info-label">弹性系数:</span>
                    <span class="info-value">k = 50 N/m</span>
                </div>
                <div class="info-item">
                    <span class="info-label">振幅:</span>
                    <span class="info-value">A = 60px</span>
                </div>
                <div class="info-item">
                    <span class="info-label">周期:</span>
                    <span class="info-value">T = 2s</span>
                </div>
                <div class="info-item">
                    <span class="info-label">频率:</span>
                    <span class="info-value">f = 0.5Hz</span>
                </div>
            </div>
        </div>

        <div class="controls">
            <button class="control-btn active" onclick="setBounce('slow')">慢速</button>
            <button class="control-btn" onclick="setBounce('normal')">正常</button>
            <button class="control-btn" onclick="setBounce('fast')">快速</button>
            <button class="control-btn" onclick="toggleBounce()">暂停/播放</button>
        </div>

        <nav class="nav-bar">
            <a href="3d-24-domino.html" class="nav-btn">上一个效果</a>
            <a href="index.html" class="nav-btn">返回首页</a>
            <a href="3d-06-cube-box.html" class="nav-btn">第一个效果</a>
        </nav>
    </div>

    <script>
        const springElements = document.querySelectorAll('.spring-coil, .spring-top, .ball');
        let isBouncing = true;

        function setBounce(speed) {
            document.querySelectorAll('.control-btn').forEach(btn => {
                if (btn.textContent.includes('速')) btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            const durations = { slow: '3s', normal: '2s', fast: '1s' };
            springElements.forEach(el => {
                el.style.animationDuration = durations[speed];
            });
        }

        function toggleBounce() {
            isBouncing = !isBouncing;
            springElements.forEach(el => {
                el.style.animationPlayState = isBouncing ? 'running' : 'paused';
            });
        }
    </script>
</body>
</html>
