<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>农场主风格 - 乐高故事书</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --wood-light: #deb887;
            --wood-dark: #8b4513;
            --soil: #654321;
            --grass: #228b22;
            --stone: #708090;
            --bg-dark: #2d2418;
            --bg-medium: #3d3428;
            --bg-light: #4d4438;
            --text-primary: #f8f0e0;
            --text-secondary: #a09080;
            --font-title: 'Cinzel', serif;
            --font-body: 'Noto Sans SC', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-body);
            background: linear-gradient(180deg, var(--bg-medium) 0%, var(--bg-dark) 100%);
            min-height: 100vh;
            color: var(--text-primary);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            padding: 40px 20px;
        }

        .main-title {
            font-family: var(--font-title);
            font-size: 3rem;
            font-weight: 700;
            color: var(--wood-light);
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 1.1rem;
            color: var(--text-secondary);
        }

        .resource-discs {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 30px 0;
            flex-wrap: wrap;
        }

        .resource-disc {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 3px solid rgba(255,255,255,0.2);
        }

        .resource-disc:hover {
            transform: scale(1.15);
        }

        .resource-disc.wood { background: var(--wood-dark); }
        .resource-disc.clay { background: #cd5c5c; }
        .resource-disc.stone { background: var(--stone); }
        .resource-disc.grain { background: var(--grass); }
        .resource-disc.vegetable { background: #ff6347; }
        .resource-disc.sheep { background: #f5f5dc; border-color: #ccc; }
        .resource-disc.boar { background: #8b4513; }
        .resource-disc.cattle { background: #d2691e; }

        .section {
            margin: 40px 0;
        }

        .section-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--wood-dark);
        }

        .section-title {
            font-family: var(--font-title);
            font-size: 1.5rem;
            color: var(--wood-light);
        }

        .farm-board {
            background: linear-gradient(180deg, var(--soil), #4a3520);
            border-radius: 20px;
            padding: 25px;
            border: 5px solid var(--wood-dark);
            margin: 30px 0;
        }

        .farm-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 5px;
        }

        .farm-cell {
            aspect-ratio: 1;
            background: var(--bg-medium);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid var(--wood-dark);
            min-height: 60px;
        }

        .farm-cell:hover {
            border-color: var(--wood-light);
        }

        .farm-cell.field {
            background: linear-gradient(180deg, var(--grass), #1a6b1a);
        }

        .farm-cell.pasture {
            background: linear-gradient(180deg, #90ee90, #228b22);
            border-color: var(--wood-light);
        }

        .farm-cell.room {
            background: var(--wood-dark);
            border-color: var(--wood-light);
        }

        .farm-cell .cell-icon {
            font-size: 1.5rem;
        }

        .farm-cell .cell-count {
            font-size: 0.7rem;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        .action-cards {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 15px;
        }

        .action-card {
            background: linear-gradient(180deg, var(--wood-light), var(--wood-dark));
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 3px solid var(--soil);
            color: white;
        }

        .action-card:hover {
            transform: translateY(-5px);
            border-color: var(--grass);
        }

        .action-card.used {
            opacity: 0.5;
            pointer-events: none;
        }

        .action-icon {
            font-size: 2rem;
            margin-bottom: 8px;
        }

        .action-name {
            font-family: var(--font-title);
            font-size: 0.9rem;
            font-weight: 600;
        }

        .action-desc {
            font-size: 0.7rem;
            opacity: 0.8;
            margin-top: 5px;
        }

        .family-section {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 20px 0;
        }

        .family-member {
            width: 60px;
            height: 80px;
            background: var(--wood-light);
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 3px solid var(--wood-dark);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .family-member:hover {
            transform: translateY(-5px);
        }

        .family-member.used {
            opacity: 0.4;
        }

        .family-icon {
            font-size: 1.8rem;
        }

        .family-label {
            font-size: 0.7rem;
            color: var(--bg-dark);
            margin-top: 3px;
        }

        .score-breakdown {
            background: var(--bg-light);
            border-radius: 15px;
            padding: 20px;
            margin: 20px 0;
            border: 2px solid var(--wood-dark);
        }

        .score-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .score-row:last-child {
            border-bottom: none;
            font-weight: 700;
            font-size: 1.1rem;
        }

        .cta-section {
            text-align: center;
            margin: 50px 0;
        }

        .cta-btn {
            display: inline-block;
            padding: 15px 50px;
            font-size: 1.2rem;
            font-weight: 700;
            border: none;
            border-radius: 25px;
            background: linear-gradient(135deg, var(--wood-dark), #5a3010);
            color: var(--wood-light);
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            border: 2px solid var(--wood-light);
        }

        .cta-btn:hover {
            transform: scale(1.05);
        }

        .footer {
            text-align: center;
            padding: 30px;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        @media (max-width: 600px) {
            .farm-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1 class="main-title">🌾 农场主风格</h1>
            <p class="subtitle">田园生活 · 资源管理 · 家庭发展</p>
        </header>

        <div class="resource-discs">
            <div class="resource-disc wood">🪵</div>
            <div class="resource-disc clay">🧱</div>
            <div class="resource-disc stone">🪨</div>
            <div class="resource-disc grain">🌾</div>
            <div class="resource-disc vegetable">🥕</div>
            <div class="resource-disc sheep">🐑</div>
            <div class="resource-disc boar">🐗</div>
            <div class="resource-disc cattle">🐄</div>
        </div>

        <section class="section">
            <div class="section-header">
                <span>🏠</span>
                <h2 class="section-title">农场面板</h2>
            </div>
            <div class="farm-board">
                <div class="farm-grid">
                    <div class="farm-cell room"><div class="cell-icon">🛏️</div></div>
                    <div class="farm-cell room"><div class="cell-icon">🛏️</div></div>
                    <div class="farm-cell"><div class="cell-icon"></div></div>
                    <div class="farm-cell field"><div class="cell-icon">🌾</div></div>
                    <div class="farm-cell field"><div class="cell-icon">🥕</div></div>
                    <div class="farm-cell room"><div class="cell-icon">🛏️</div></div>
                    <div class="farm-cell"><div class="cell-icon"></div></div>
                    <div class="farm-cell pasture"><div class="cell-icon">🐑</div><div class="cell-count">×2</div></div>
                    <div class="farm-cell field"><div class="cell-icon">🌾</div></div>
                    <div class="farm-cell"><div class="cell-icon"></div></div>
                    <div class="farm-cell"><div class="cell-icon"></div></div>
                    <div class="farm-cell pasture"><div class="cell-icon">🐗</div></div>
                    <div class="farm-cell"><div class="cell-icon"></div></div>
                    <div class="farm-cell"><div class="cell-icon"></div></div>
                    <div class="farm-cell"><div class="cell-icon"></div></div>
                </div>
            </div>
        </section>

        <section class="section">
            <div class="section-header">
                <span>👨‍👩‍👧‍👦</span>
                <h2 class="section-title">家庭成员</h2>
            </div>
            <div class="family-section">
                <div class="family-member used">
                    <div class="family-icon">👨</div>
                    <div class="family-label">父亲</div>
                </div>
                <div class="family-member">
                    <div class="family-icon">👩</div>
                    <div class="family-label">母亲</div>
                </div>
                <div class="family-member">
                    <div class="family-icon">👦</div>
                    <div class="family-label">儿子</div>
                </div>
                <div class="family-member">
                    <div class="family-icon">👧</div>
                    <div class="family-label">女儿</div>
                </div>
            </div>
        </section>

        <section class="section">
            <div class="section-header">
                <span>📋</span>
                <h2 class="section-title">行动卡牌</h2>
            </div>
            <div class="action-cards">
                <div class="action-card used">
                    <div class="action-icon">🪵</div>
                    <div class="action-name">伐木</div>
                    <div class="action-desc">获得3木材</div>
                </div>
                <div class="action-card">
                    <div class="action-icon">🌾</div>
                    <div class="action-name">播种</div>
                    <div class="action-desc">种植谷物</div>
                </div>
                <div class="action-card">
                    <div class="action-icon">🐑</div>
                    <div class="action-name">畜牧</div>
                    <div class="action-desc">获得1只羊</div>
                </div>
                <div class="action-card">
                    <div class="action-icon">🏠</div>
                    <div class="action-name">扩建</div>
                    <div class="action-desc">建造房间</div>
                </div>
                <div class="action-card">
                    <div class="action-icon">👶</div>
                    <div class="action-name">生育</div>
                    <div class="action-desc">增加家庭成员</div>
                </div>
            </div>
        </section>

        <section class="section">
            <div class="section-header">
                <span>📊</span>
                <h2 class="section-title">得分明细</h2>
            </div>
            <div class="score-breakdown">
                <div class="score-row">
                    <span>农田</span>
                    <span>+8</span>
                </div>
                <div class="score-row">
                    <span>牧场</span>
                    <span>+4</span>
                </div>
                <div class="score-row">
                    <span>动物</span>
                    <span>+6</span>
                </div>
                <div class="score-row">
                    <span>房间</span>
                    <span>+3</span>
                </div>
                <div class="score-row">
                    <span>家庭成员</span>
                    <span>+4</span>
                </div>
                <div class="score-row">
                    <span>总分</span>
                    <span style="color: var(--wood-light);">25</span>
                </div>
            </div>
        </section>

        <section class="cta-section">
            <a href="index.html" class="cta-btn">🌾 返回风格选择</a>
        </section>

        <footer class="footer">
            <p>农场主风格 Demo - 乐高故事书</p>
        </footer>
    </div>
</body>
</html>
