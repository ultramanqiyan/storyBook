<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星际拓荒风格 - 乐高故事书</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --mars-red: #c1440e;
            --mars-orange: #e97451;
            --space-black: #0a0a0a;
            --steel-blue: #4682b4;
            --titanium: #878681;
            --ocean-blue: #1e90ff;
            --bg-dark: #0d0d0d;
            --bg-medium: #1a1a1a;
            --text-primary: #e8e8e8;
            --text-secondary: #888;
            --font-title: 'Cinzel', serif;
            --font-body: 'Noto Sans SC', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-body);
            background: linear-gradient(180deg, #1a0a0a 0%, var(--bg-dark) 100%);
            min-height: 100vh;
            color: var(--text-primary);
        }

        .stars {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }

        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            animation: twinkle 3s ease-in-out infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            padding: 40px 20px;
        }

        .mars-globe {
            width: 100px;
            height: 100px;
            margin: 0 auto 20px;
            background: radial-gradient(circle at 30% 30%, var(--mars-orange), var(--mars-red), #8b0000);
            border-radius: 50%;
            box-shadow: 0 0 50px rgba(193, 68, 14, 0.5);
            animation: rotate 20s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .main-title {
            font-family: var(--font-title);
            font-size: 3rem;
            font-weight: 700;
            color: var(--mars-red);
            text-shadow: 0 0 20px rgba(193, 68, 14, 0.5);
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 1.1rem;
            color: var(--text-secondary);
        }

        .terraforming-bar {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin: 30px 0;
            flex-wrap: wrap;
        }

        .terra-item {
            text-align: center;
        }

        .terra-icon {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            margin: 0 auto 10px;
            border: 3px solid;
        }

        .terra-icon.temp { background: linear-gradient(135deg, #ff6b6b, #ff8e53); border-color: #ff6b6b; }
        .terra-icon.oxygen { background: linear-gradient(135deg, #60a5fa, #3b82f6); border-color: #60a5fa; }
        .terra-icon.ocean { background: linear-gradient(135deg, #22d3ee, #0891b2); border-color: #22d3ee; }

        .terra-value {
            font-family: var(--font-title);
            font-size: 1.5rem;
            font-weight: 700;
        }

        .terra-label {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .section {
            margin: 40px 0;
        }

        .section-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--mars-red);
        }

        .section-title {
            font-family: var(--font-title);
            font-size: 1.5rem;
            color: var(--mars-orange);
        }

        .project-cards {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
        }

        .project-card {
            background: linear-gradient(180deg, var(--bg-medium), var(--bg-dark));
            border-radius: 15px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.4s ease;
            border: 3px solid var(--titanium);
            position: relative;
        }

        .project-card:hover {
            transform: translateY(-10px);
            border-color: var(--mars-red);
            box-shadow: 0 15px 30px rgba(0,0,0,0.5), 0 0 20px rgba(193, 68, 14, 0.3);
        }

        .project-card.green { border-color: var(--ocean-blue); }
        .project-card.blue { border-color: var(--steel-blue); }
        .project-card.red { border-color: var(--mars-red); }

        .project-tags {
            position: absolute;
            top: 10px;
            right: 10px;
            display: flex;
            gap: 5px;
        }

        .tag-icon {
            width: 25px;
            height: 25px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            background: var(--bg-dark);
            border: 1px solid var(--titanium);
        }

        .project-image {
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            background: linear-gradient(180deg, rgba(193, 68, 14, 0.1), transparent);
        }

        .project-content {
            padding: 15px;
        }

        .project-name {
            font-family: var(--font-title);
            font-size: 0.95rem;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .project-effect {
            font-size: 0.75rem;
            color: var(--text-secondary);
            line-height: 1.4;
        }

        .project-cost {
            display: flex;
            gap: 8px;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .cost-cube {
            width: 20px;
            height: 20px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.6rem;
            font-weight: 700;
        }

        .cost-cube.steel { background: var(--steel-blue); }
        .cost-cube.titanium { background: var(--titanium); }
        .cost-cube.plant { background: #22c55e; }
        .cost-cube.energy { background: #fbbf24; }
        .cost-cube.heat { background: #ef4444; }

        .resource-row {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 20px 0;
            flex-wrap: wrap;
        }

        .resource-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 15px;
            background: rgba(0,0,0,0.5);
            border-radius: 20px;
            border: 1px solid var(--titanium);
        }

        .resource-cube {
            width: 20px;
            height: 20px;
            border-radius: 4px;
        }

        .resource-cube.steel { background: var(--steel-blue); }
        .resource-cube.titanium { background: var(--titanium); }
        .resource-cube.plant { background: #22c55e; }
        .resource-cube.energy { background: #fbbf24; }
        .resource-cube.heat { background: #ef4444; }

        .resource-count {
            font-family: var(--font-title);
            font-weight: 700;
        }

        .cta-section {
            text-align: center;
            margin: 50px 0;
        }

        .cta-btn {
            display: inline-block;
            padding: 15px 50px;
            font-size: 1.2rem;
            font-weight: 700;
            border: none;
            border-radius: 25px;
            background: linear-gradient(135deg, var(--mars-red), var(--mars-orange));
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .cta-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(193, 68, 14, 0.5);
        }

        .footer {
            text-align: center;
            padding: 30px;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="stars" id="stars"></div>

    <div class="container">
        <header class="header">
            <div class="mars-globe"></div>
            <h1 class="main-title">🔴 星际拓荒风格</h1>
            <p class="subtitle">火星殖民 · 地球化改造 · 科技发展</p>
        </header>

        <div class="terraforming-bar">
            <div class="terra-item">
                <div class="terra-icon temp">🌡️</div>
                <div class="terra-value">-8°C</div>
                <div class="terra-label">温度</div>
            </div>
            <div class="terra-item">
                <div class="terra-icon oxygen">💨</div>
                <div class="terra-value">4%</div>
                <div class="terra-label">氧气</div>
            </div>
            <div class="terra-item">
                <div class="terra-icon ocean">🌊</div>
                <div class="terra-value">2</div>
                <div class="terra-label">海洋</div>
            </div>
        </div>

        <div class="resource-row">
            <div class="resource-item">
                <div class="resource-cube steel"></div>
                <div class="resource-count">3</div>
            </div>
            <div class="resource-item">
                <div class="resource-cube titanium"></div>
                <div class="resource-count">2</div>
            </div>
            <div class="resource-item">
                <div class="resource-cube plant"></div>
                <div class="resource-count">5</div>
            </div>
            <div class="resource-item">
                <div class="resource-cube energy"></div>
                <div class="resource-count">4</div>
            </div>
            <div class="resource-item">
                <div class="resource-cube heat"></div>
                <div class="resource-count">6</div>
            </div>
        </div>

        <section class="section">
            <div class="section-header">
                <span>🚀</span>
                <h2 class="section-title">项目卡牌</h2>
            </div>
            <div class="project-cards">
                <div class="project-card green">
                    <div class="project-tags">
                        <div class="tag-icon">🌱</div>
                    </div>
                    <div class="project-image">🌲</div>
                    <div class="project-content">
                        <div class="project-name">森林种植</div>
                        <div class="project-effect">增加氧气1%，获得2植物资源</div>
                        <div class="project-cost">
                            <div class="cost-cube plant">2</div>
                        </div>
                    </div>
                </div>

                <div class="project-card blue">
                    <div class="project-tags">
                        <div class="tag-icon">🏢</div>
                    </div>
                    <div class="project-image">🏭</div>
                    <div class="project-content">
                        <div class="project-name">钢铁工厂</div>
                        <div class="project-effect">每回合获得1钢铁资源</div>
                        <div class="project-cost">
                            <div class="cost-cube steel">3</div>
                        </div>
                    </div>
                </div>

                <div class="project-card red">
                    <div class="project-tags">
                        <div class="tag-icon">☄️</div>
                    </div>
                    <div class="project-image">🌋</div>
                    <div class="project-content">
                        <div class="project-name">火山爆发</div>
                        <div class="project-effect">增加温度2°C，获得2热能</div>
                        <div class="project-cost">
                            <div class="cost-cube energy">2</div>
                        </div>
                    </div>
                </div>

                <div class="project-card green">
                    <div class="project-tags">
                        <div class="tag-icon">💧</div>
                    </div>
                    <div class="project-image">🌊</div>
                    <div class="project-content">
                        <div class="project-name">海洋形成</div>
                        <div class="project-effect">放置一个海洋板块</div>
                        <div class="project-cost">
                            <div class="cost-cube plant">3</div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <section class="cta-section">
            <a href="index.html" class="cta-btn">🔴 返回风格选择</a>
        </section>

        <footer class="footer">
            <p>星际拓荒风格 Demo - 乐高故事书</p>
        </footer>
    </div>

    <script>
        var stars = document.getElementById('stars');
        for (var i = 0; i < 100; i++) {
            var star = document.createElement('div');
            star.className = 'star';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.animationDelay = Math.random() * 3 + 's';
            stars.appendChild(star);
        }
    </script>
</body>
</html>
