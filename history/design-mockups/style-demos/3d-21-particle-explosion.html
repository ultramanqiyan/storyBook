<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D粒子爆炸 - 乐高故事书</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --particle-1: #ff006e;
            --particle-2: #8338ec;
            --particle-3: #3a86ff;
            --particle-4: #06ffa5;
            --particle-5: #ffbe0b;
            --bg-dark: #0a0a0f;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: radial-gradient(ellipse at center, #1a1a2e 0%, var(--bg-dark) 100%);
            min-height: 100vh;
            color: #f8fafc;
            overflow: hidden;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .main-title {
            font-family: 'Cinzel', serif;
            font-size: 2.8rem;
            background: linear-gradient(135deg, var(--particle-1), var(--particle-3), var(--particle-4));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #94a3b8;
            font-size: 1.1rem;
        }

        .explosion-scene {
            position: relative;
            height: 600px;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1000px;
        }

        .particle-container {
            position: relative;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
        }

        .particle {
            position: absolute;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
        }

        .explode-btn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: radial-gradient(circle, #fff 0%, #ff006e 50%, #8338ec 100%);
            border: none;
            font-size: 3rem;
            cursor: pointer;
            box-shadow: 0 0 60px rgba(255, 0, 110, 0.6);
            transition: all 0.3s ease;
            z-index: 100;
        }

        .explode-btn:hover {
            transform: translate(-50%, -50%) scale(1.1);
            box-shadow: 0 0 100px rgba(255, 0, 110, 0.8);
        }

        .explode-btn:active {
            transform: translate(-50%, -50%) scale(0.95);
        }

        .stats {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 10px;
            font-family: 'Cinzel', serif;
        }

        .stat-item {
            margin: 5px 0;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 40px;
            flex-wrap: wrap;
        }

        .control-btn {
            padding: 12px 24px;
            background: rgba(255,255,255,0.1);
            border: 2px solid var(--particle-3);
            border-radius: 25px;
            color: var(--particle-3);
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Cinzel', serif;
        }

        .control-btn:hover, .control-btn.active {
            background: var(--particle-3);
            color: var(--bg-dark);
            transform: translateY(-2px);
        }

        .nav-bar {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 60px;
        }

        .nav-btn {
            padding: 15px 40px;
            background: linear-gradient(145deg, rgba(255,255,255,0.1), rgba(255,255,255,0.05));
            border: 2px solid var(--particle-3);
            border-radius: 30px;
            color: var(--particle-3);
            font-family: 'Cinzel', serif;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }

        .nav-btn:hover {
            background: var(--particle-3);
            color: var(--bg-dark);
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(58, 134, 255, 0.3);
        }

        @media (max-width: 768px) {
            .main-title { font-size: 2rem; }
            .explosion-scene { height: 400px; }
            .explode-btn { width: 100px; height: 100px; font-size: 2rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1 class="main-title">3D粒子爆炸</h1>
            <p class="subtitle">粒子系统 - 爆炸扩散物理效果</p>
        </header>

        <div class="explosion-scene">
            <div class="particle-container" id="particleContainer"></div>
            <button class="explode-btn" onclick="explode()">💥</button>
            <div class="stats">
                <div class="stat-item">粒子数: <span id="particleCount">0</span></div>
                <div class="stat-item">爆炸次数: <span id="explosionCount">0</span></div>
            </div>
        </div>

        <div class="controls">
            <button class="control-btn active" onclick="setMode('normal')">普通</button>
            <button class="control-btn" onclick="setMode('rainbow')">彩虹</button>
            <button class="control-btn" onclick="setMode('fire')">火焰</button>
            <button class="control-btn" onclick="clearParticles()">清除</button>
        </div>

        <nav class="nav-bar">
            <a href="3d-20-fractal-tree.html" class="nav-btn">上一个效果</a>
            <a href="index.html" class="nav-btn">返回首页</a>
            <a href="3d-22-mirror.html" class="nav-btn">下一个效果</a>
        </nav>
    </div>

    <script>
        let explosionCount = 0;
        let currentMode = 'normal';
        const colors = {
            normal: ['#ff006e', '#8338ec', '#3a86ff', '#06ffa5', '#ffbe0b'],
            rainbow: ['#ff0000', '#ff7f00', '#ffff00', '#00ff00', '#0000ff', '#4b0082', '#9400d3'],
            fire: ['#ff0000', '#ff4500', '#ff6347', '#ff8c00', '#ffa500']
        };

        function explode() {
            explosionCount++;
            document.getElementById('explosionCount').textContent = explosionCount;
            
            const container = document.getElementById('particleContainer');
            const particleCount = 50;
            
            for (let i = 0; i < particleCount; i++) {
                createParticle(container);
            }
            
            updateParticleCount();
        }

        function createParticle(container) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            
            const colorSet = colors[currentMode];
            const color = colorSet[Math.floor(Math.random() * colorSet.length)];
            particle.style.background = color;
            particle.style.boxShadow = `0 0 10px ${color}`;
            
            const angle = Math.random() * Math.PI * 2;
            const velocity = 100 + Math.random() * 300;
            const tx = Math.cos(angle) * velocity;
            const ty = Math.sin(angle) * velocity;
            const tz = (Math.random() - 0.5) * 400;
            
            particle.style.animation = `particle-fly-${Date.now()}-${Math.random()} 2s ease-out forwards`;
            
            const keyframes = `
                @keyframes particle-fly-${Date.now()}-${Math.random()} {
                    0% { transform: translate(-50%, -50%) translate3d(0, 0, 0) scale(1); opacity: 1; }
                    100% { transform: translate(-50%, -50%) translate3d(${tx}px, ${ty}px, ${tz}px) scale(0); opacity: 0; }
                }
            `;
            
            const style = document.createElement('style');
            style.textContent = keyframes;
            document.head.appendChild(style);
            
            container.appendChild(particle);
            
            setTimeout(() => {
                particle.remove();
                style.remove();
                updateParticleCount();
            }, 2000);
        }

        function updateParticleCount() {
            const count = document.querySelectorAll('.particle').length;
            document.getElementById('particleCount').textContent = count;
        }

        function setMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.control-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
        }

        function clearParticles() {
            document.getElementById('particleContainer').innerHTML = '';
            updateParticleCount();
        }

        // 自动爆炸
        setInterval(() => {
            if (Math.random() > 0.7) explode();
        }, 3000);
    </script>
</body>
</html>
