<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>卡坦岛风格 - 乐高故事书</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --wood: #8b4513;
            --brick: #cd5c5c;
            --wool: #f5f5dc;
            --wheat: #daa520;
            --ore: #708090;
            --bg-dark: #2e4a3f;
            --bg-medium: #3d5c4a;
            --bg-light: #4a6b55;
            --text-primary: #f8fafc;
            --text-secondary: #c8d5c0;
            --font-title: 'Cinzel', serif;
            --font-body: 'Noto Sans SC', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-body);
            background: linear-gradient(180deg, var(--bg-medium) 0%, var(--bg-dark) 100%);
            min-height: 100vh;
            color: var(--text-primary);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            padding: 40px 20px;
        }

        .main-title {
            font-family: var(--font-title);
            font-size: 3rem;
            font-weight: 700;
            color: var(--wheat);
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 1.1rem;
            color: var(--text-secondary);
        }

        .resource-bar {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 30px 0;
            flex-wrap: wrap;
        }

        .resource-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: rgba(0,0,0,0.2);
            border-radius: 25px;
            border: 2px solid;
        }

        .resource-item.wood { border-color: var(--wood); }
        .resource-item.brick { border-color: var(--brick); }
        .resource-item.wool { border-color: var(--wool); }
        .resource-item.wheat { border-color: var(--wheat); }
        .resource-item.ore { border-color: var(--ore); }

        .resource-icon {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
        }

        .resource-item.wood .resource-icon { background: var(--wood); }
        .resource-item.brick .resource-icon { background: var(--brick); }
        .resource-item.wool .resource-icon { background: var(--wool); }
        .resource-item.wheat .resource-icon { background: var(--wheat); }
        .resource-item.ore .resource-icon { background: var(--ore); }

        .resource-count {
            font-family: var(--font-title);
            font-size: 1.2rem;
            font-weight: 700;
        }

        .hex-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 5px;
            margin: 40px 0;
            padding: 20px;
        }

        .hex {
            width: 100px;
            height: 115px;
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }

        .hex:hover {
            transform: scale(1.1);
            z-index: 10;
        }

        .hex.forest { background: linear-gradient(180deg, #228b22, #006400); }
        .hex.hills { background: linear-gradient(180deg, #cd5c5c, #8b3a3a); }
        .hex.pasture { background: linear-gradient(180deg, #90ee90, #228b22); }
        .hex.fields { background: linear-gradient(180deg, #ffd700, #daa520); }
        .hex.mountains { background: linear-gradient(180deg, #a0a0a0, #708090); }
        .hex.desert { background: linear-gradient(180deg, #f4a460, #cd853f); }

        .hex-number {
            width: 30px;
            height: 30px;
            background: rgba(255,255,255,0.9);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-title);
            font-size: 0.9rem;
            font-weight: 700;
            color: #333;
            margin-bottom: 5px;
        }

        .hex-icon {
            font-size: 1.8rem;
        }

        .section {
            margin: 40px 0;
        }

        .section-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        .section-title {
            font-family: var(--font-title);
            font-size: 1.5rem;
            color: var(--wheat);
        }

        .building-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 20px;
        }

        .building-card {
            background: var(--bg-light);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 3px solid transparent;
        }

        .building-card:hover {
            transform: translateY(-10px);
            border-color: var(--wheat);
        }

        .building-card.village { border-color: var(--wood); }
        .building-card.city { border-color: var(--ore); }
        .building-card.road { border-color: var(--brick); }

        .building-icon {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .building-name {
            font-family: var(--font-title);
            font-size: 1rem;
            color: var(--text-primary);
        }

        .building-cost {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-top: 5px;
        }

        .dice-area {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 30px 0;
        }

        .dice {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #fff, #ddd);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-title);
            font-size: 1.8rem;
            font-weight: 700;
            color: #333;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .dice:hover {
            transform: rotate(10deg) scale(1.1);
        }

        .dice.rolling {
            animation: dice-roll 0.5s ease-in-out;
        }

        @keyframes dice-roll {
            0% { transform: rotate(0deg); }
            25% { transform: rotate(90deg); }
            50% { transform: rotate(180deg); }
            75% { transform: rotate(270deg); }
            100% { transform: rotate(360deg); }
        }

        .port-section {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            margin: 30px 0;
        }

        .port-card {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #4169e1, #1e3a8a);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 3px solid rgba(255,255,255,0.3);
        }

        .port-card:hover {
            transform: scale(1.15);
            border-color: var(--wheat);
        }

        .cta-section {
            text-align: center;
            margin: 50px 0;
        }

        .cta-btn {
            display: inline-block;
            padding: 15px 50px;
            font-size: 1.2rem;
            font-weight: 700;
            border: none;
            border-radius: 25px;
            background: linear-gradient(135deg, var(--wheat), var(--wood));
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .cta-btn:hover {
            transform: scale(1.05);
        }

        .footer {
            text-align: center;
            padding: 30px;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1 class="main-title">🏝️ 卡坦岛风格</h1>
            <p class="subtitle">六边形地块 · 资源交易 · 建设发展</p>
        </header>

        <div class="resource-bar">
            <div class="resource-item wood">
                <div class="resource-icon">🪵</div>
                <div class="resource-count">3</div>
            </div>
            <div class="resource-item brick">
                <div class="resource-icon">🧱</div>
                <div class="resource-count">2</div>
            </div>
            <div class="resource-item wool">
                <div class="resource-icon">🐑</div>
                <div class="resource-count">4</div>
            </div>
            <div class="resource-item wheat">
                <div class="resource-icon">🌾</div>
                <div class="resource-count">2</div>
            </div>
            <div class="resource-item ore">
                <div class="resource-icon">⛏️</div>
                <div class="resource-count">1</div>
            </div>
        </div>

        <div class="dice-area">
            <div class="dice" id="dice1">3</div>
            <div class="dice" id="dice2">5</div>
        </div>

        <section class="section">
            <div class="section-header">
                <span>🗺️</span>
                <h2 class="section-title">岛屿地图</h2>
            </div>
            <div class="hex-grid">
                <div class="hex forest"><div class="hex-number">6</div><div class="hex-icon">🌲</div></div>
                <div class="hex hills"><div class="hex-number">8</div><div class="hex-icon">⛰️</div></div>
                <div class="hex pasture"><div class="hex-number">9</div><div class="hex-icon">🌿</div></div>
                <div class="hex fields"><div class="hex-number">5</div><div class="hex-icon">🌾</div></div>
                <div class="hex desert"><div class="hex-number"></div><div class="hex-icon">🏜️</div></div>
                <div class="hex mountains"><div class="hex-number">10</div><div class="hex-icon">🏔️</div></div>
                <div class="hex forest"><div class="hex-number">4</div><div class="hex-icon">🌲</div></div>
                <div class="hex hills"><div class="hex-number">3</div><div class="hex-icon">⛰️</div></div>
                <div class="hex pasture"><div class="hex-number">11</div><div class="hex-icon">🌿</div></div>
                <div class="hex fields"><div class="hex-number">2</div><div class="hex-icon">🌾</div></div>
                <div class="hex mountains"><div class="hex-number">12</div><div class="hex-icon">🏔️</div></div>
            </div>
        </section>

        <section class="section">
            <div class="section-header">
                <span>🏗️</span>
                <h2 class="section-title">建筑选项</h2>
            </div>
            <div class="building-grid">
                <div class="building-card village">
                    <div class="building-icon">🏘️</div>
                    <div class="building-name">村庄</div>
                    <div class="building-cost">🪵🧱🐑🌾</div>
                </div>
                <div class="building-card city">
                    <div class="building-icon">🏙️</div>
                    <div class="building-name">城市</div>
                    <div class="building-cost">🌾🌾⛏️⛏️⛏️</div>
                </div>
                <div class="building-card road">
                    <div class="building-icon">🛤️</div>
                    <div class="building-name">道路</div>
                    <div class="building-cost">🪵🧱</div>
                </div>
                <div class="building-card">
                    <div class="building-icon">🎴</div>
                    <div class="building-name">发展卡</div>
                    <div class="building-cost">🐑🌾⛏️</div>
                </div>
            </div>
        </section>

        <section class="section">
            <div class="section-header">
                <span>⚓</span>
                <h2 class="section-title">港口交易</h2>
            </div>
            <div class="port-section">
                <div class="port-card">🪵</div>
                <div class="port-card">🧱</div>
                <div class="port-card">🐑</div>
                <div class="port-card">🌾</div>
                <div class="port-card">⛏️</div>
                <div class="port-card">❓</div>
            </div>
        </section>

        <section class="cta-section">
            <a href="index.html" class="cta-btn">🏝️ 返回风格选择</a>
        </section>

        <footer class="footer">
            <p>卡坦岛风格 Demo - 乐高故事书</p>
        </footer>
    </div>

    <script>
        document.querySelectorAll('.dice').forEach(function(dice) {
            dice.addEventListener('click', function() {
                this.classList.add('rolling');
                var self = this;
                setTimeout(function() {
                    self.textContent = Math.floor(Math.random() * 6) + 1;
                    self.classList.remove('rolling');
                }, 500);
            });
        });
    </script>
</body>
</html>
