<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>七大奇迹风格 - 乐高故事书</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold-ancient: #d4af37;
            --bronze: #cd7f32;
            --marble: #f5f5f5;
            --papyrus: #f4e4bc;
            --stone: #a0a0a0;
            --bg-dark: #1a1510;
            --bg-medium: #2d2820;
            --text-primary: #f8f0e0;
            --text-secondary: #c0b0a0;
            --font-title: 'Cinzel', serif;
            --font-body: 'Noto Sans SC', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-body);
            background: linear-gradient(180deg, var(--bg-medium) 0%, var(--bg-dark) 100%);
            min-height: 100vh;
            color: var(--text-primary);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            padding: 40px 20px;
        }

        .main-title {
            font-family: var(--font-title);
            font-size: 3rem;
            font-weight: 700;
            color: var(--gold-ancient);
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 1.1rem;
            color: var(--text-secondary);
        }

        .era-indicator {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 30px 0;
        }

        .era {
            padding: 10px 30px;
            background: linear-gradient(180deg, var(--papyrus), #e4d4a8);
            border-radius: 10px;
            font-family: var(--font-title);
            font-weight: 600;
            color: var(--bg-dark);
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid var(--bronze);
        }

        .era:hover, .era.active {
            background: linear-gradient(180deg, var(--gold-ancient), var(--bronze));
            color: white;
        }

        .section {
            margin: 40px 0;
        }

        .section-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--gold-ancient);
        }

        .section-title {
            font-family: var(--font-title);
            font-size: 1.5rem;
            color: var(--gold-ancient);
        }

        .wonder-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
        }

        .wonder-card {
            background: linear-gradient(180deg, var(--papyrus), #e4d4a8);
            border-radius: 15px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.4s ease;
            border: 3px solid var(--bronze);
            position: relative;
        }

        .wonder-card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 15px 30px rgba(0,0,0,0.4);
            border-color: var(--gold-ancient);
        }

        .wonder-image {
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            background: linear-gradient(180deg, rgba(212, 175, 55, 0.2), transparent);
        }

        .wonder-content {
            padding: 15px;
            color: var(--bg-dark);
        }

        .wonder-name {
            font-family: var(--font-title);
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .wonder-type {
            font-size: 0.75rem;
            color: #666;
            margin-bottom: 8px;
        }

        .wonder-cost {
            display: flex;
            gap: 5px;
        }

        .resource {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.6rem;
        }

        .resource.wood { background: #8b4513; color: white; }
        .resource.stone { background: var(--stone); color: white; }
        .resource.gold { background: var(--gold-ancient); color: var(--bg-dark); }
        .resource.clay { background: #cd5c5c; color: white; }
        .resource.glass { background: #87ceeb; color: var(--bg-dark); }
        .resource.papyrus { background: var(--papyrus); color: var(--bg-dark); }

        .resource-bar {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 20px 0;
            flex-wrap: wrap;
        }

        .resource-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 15px;
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
            border: 1px solid var(--bronze);
        }

        .resource-item .resource {
            width: 25px;
            height: 25px;
        }

        .resource-count {
            font-family: var(--font-title);
            font-weight: 700;
        }

        .victory-track {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 30px 0;
            flex-wrap: wrap;
        }

        .victory-point {
            width: 40px;
            height: 40px;
            background: var(--bg-medium);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-title);
            font-size: 0.9rem;
            color: var(--text-secondary);
            border: 2px solid var(--bronze);
        }

        .victory-point.milestone {
            background: linear-gradient(135deg, var(--gold-ancient), var(--bronze));
            color: white;
            font-weight: 700;
        }

        .board-preview {
            background: linear-gradient(180deg, var(--papyrus), #d4c4a8);
            border-radius: 20px;
            padding: 30px;
            border: 5px solid var(--gold-ancient);
            margin: 30px 0;
        }

        .board-title {
            font-family: var(--font-title);
            font-size: 1.5rem;
            color: var(--bg-dark);
            text-align: center;
            margin-bottom: 20px;
        }

        .board-stages {
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 15px;
        }

        .stage {
            width: 80px;
            height: 80px;
            background: var(--bg-medium);
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 2px solid var(--bronze);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .stage:hover {
            border-color: var(--gold-ancient);
            transform: scale(1.1);
        }

        .stage.built {
            background: linear-gradient(135deg, var(--gold-ancient), var(--bronze));
        }

        .stage-icon {
            font-size: 1.5rem;
        }

        .stage-points {
            font-family: var(--font-title);
            font-size: 0.8rem;
            color: var(--text-primary);
            margin-top: 5px;
        }

        .cta-section {
            text-align: center;
            margin: 50px 0;
        }

        .cta-btn {
            display: inline-block;
            padding: 15px 50px;
            font-size: 1.2rem;
            font-weight: 700;
            border: none;
            border-radius: 25px;
            background: linear-gradient(135deg, var(--gold-ancient), var(--bronze));
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .cta-btn:hover {
            transform: scale(1.05);
        }

        .footer {
            text-align: center;
            padding: 30px;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1 class="main-title">🏛️ 七大奇迹风格</h1>
            <p class="subtitle">古代文明 · 奇迹建筑 · 时代进程</p>
        </header>

        <div class="era-indicator">
            <div class="era active">时代 I</div>
            <div class="era">时代 II</div>
            <div class="era">时代 III</div>
        </div>

        <div class="resource-bar">
            <div class="resource-item">
                <div class="resource wood">🪵</div>
                <div class="resource-count">2</div>
            </div>
            <div class="resource-item">
                <div class="resource stone">🪨</div>
                <div class="resource-count">3</div>
            </div>
            <div class="resource-item">
                <div class="resource gold">💰</div>
                <div class="resource-count">5</div>
            </div>
            <div class="resource-item">
                <div class="resource clay">🧱</div>
                <div class="resource-count">1</div>
            </div>
            <div class="resource-item">
                <div class="resource glass">💎</div>
                <div class="resource-count">2</div>
            </div>
        </div>

        <section class="section">
            <div class="section-header">
                <span>🏗️</span>
                <h2 class="section-title">建筑卡牌</h2>
            </div>
            <div class="wonder-grid">
                <div class="wonder-card">
                    <div class="wonder-image">🏛️</div>
                    <div class="wonder-content">
                        <div class="wonder-name">神殿</div>
                        <div class="wonder-type">蓝色建筑</div>
                        <div class="wonder-cost">
                            <div class="resource wood">1</div>
                            <div class="resource stone">1</div>
                        </div>
                    </div>
                </div>

                <div class="wonder-card">
                    <div class="wonder-image">⚔️</div>
                    <div class="wonder-content">
                        <div class="wonder-name">兵营</div>
                        <div class="wonder-type">红色建筑</div>
                        <div class="wonder-cost">
                            <div class="resource clay">1</div>
                        </div>
                    </div>
                </div>

                <div class="wonder-card">
                    <div class="wonder-image">🏪</div>
                    <div class="wonder-content">
                        <div class="wonder-name">市场</div>
                        <div class="wonder-type">黄色建筑</div>
                        <div class="wonder-cost">
                            <div class="resource glass">1</div>
                        </div>
                    </div>
                </div>

                <div class="wonder-card">
                    <div class="wonder-image">🔬</div>
                    <div class="wonder-content">
                        <div class="wonder-name">学院</div>
                        <div class="wonder-type">绿色建筑</div>
                        <div class="wonder-cost">
                            <div class="resource wood">1</div>
                            <div class="resource papyrus">1</div>
                        </div>
                    </div>
                </div>

                <div class="wonder-card">
                    <div class="wonder-image">🎭</div>
                    <div class="wonder-content">
                        <div class="wonder-name">剧场</div>
                        <div class="wonder-type">蓝色建筑</div>
                        <div class="wonder-cost">
                            <div class="resource stone">2</div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <section class="section">
            <div class="section-header">
                <span>🏆</span>
                <h2 class="section-title">奇迹面板</h2>
            </div>
            <div class="board-preview">
                <div class="board-title">吉萨金字塔</div>
                <div class="board-stages">
                    <div class="stage built">
                        <div class="stage-icon">🔺</div>
                        <div class="stage-points">3 VP</div>
                    </div>
                    <div class="stage built">
                        <div class="stage-icon">🔺</div>
                        <div class="stage-points">5 VP</div>
                    </div>
                    <div class="stage">
                        <div class="stage-icon">🔺</div>
                        <div class="stage-points">7 VP</div>
                    </div>
                </div>
            </div>
        </section>

        <section class="section">
            <div class="section-header">
                <span>📊</span>
                <h2 class="section-title">胜利点数</h2>
            </div>
            <div class="victory-track">
                <div class="victory-point">1</div>
                <div class="victory-point">2</div>
                <div class="victory-point">3</div>
                <div class="victory-point milestone">5</div>
                <div class="victory-point">6</div>
                <div class="victory-point">7</div>
                <div class="victory-point">8</div>
                <div class="victory-point milestone">10</div>
                <div class="victory-point">11</div>
                <div class="victory-point">12</div>
                <div class="victory-point" style="background: var(--gold-ancient); color: var(--bg-dark);">15</div>
            </div>
        </section>

        <section class="cta-section">
            <a href="index.html" class="cta-btn">🏛️ 返回风格选择</a>
        </section>

        <footer class="footer">
            <p>七大奇迹风格 Demo - 乐高故事书</p>
        </footer>
    </div>

    <script>
        document.querySelectorAll('.era').forEach(function(era) {
            era.addEventListener('click', function() {
                document.querySelectorAll('.era').forEach(function(e) { e.classList.remove('active'); });
                this.classList.add('active');
            });
        });
    </script>
</body>
</html>
