<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D龙卷风 - 乐高故事书</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --tornado-1: #4a4a4a;
            --tornado-2: #6a6a6a;
            --tornado-3: #8a8a8a;
            --storm: #2c3e50;
            --lightning: #f1c40f;
            --bg-storm: #0f1419;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: linear-gradient(180deg, #1a252f 0%, var(--bg-storm) 100%);
            min-height: 100vh;
            color: #f8fafc;
            overflow-x: hidden;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .main-title {
            font-family: 'Cinzel', serif;
            font-size: 2.8rem;
            background: linear-gradient(135deg, var(--tornado-3), var(--storm), var(--lightning));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #94a3b8;
            font-size: 1.1rem;
        }

        .tornado-scene {
            position: relative;
            height: 600px;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1000px;
            overflow: hidden;
        }

        .tornado-container {
            position: relative;
            width: 400px;
            height: 500px;
            transform-style: preserve-3d;
        }

        .tornado-ring {
            position: absolute;
            left: 50%;
            border-radius: 50%;
            border: 3px solid rgba(255,255,255,0.1);
            transform: translateX(-50%);
            animation: tornado-spin 3s linear infinite;
        }

        .tornado-ring:nth-child(1) { bottom: 0; width: 300px; height: 60px; animation-duration: 2s; border-color: rgba(100,100,100,0.5); }
        .tornado-ring:nth-child(2) { bottom: 50px; width: 250px; height: 50px; animation-duration: 2.2s; border-color: rgba(120,120,120,0.4); }
        .tornado-ring:nth-child(3) { bottom: 100px; width: 200px; height: 45px; animation-duration: 2.4s; border-color: rgba(140,140,140,0.35); }
        .tornado-ring:nth-child(4) { bottom: 150px; width: 160px; height: 40px; animation-duration: 2.6s; border-color: rgba(160,160,160,0.3); }
        .tornado-ring:nth-child(5) { bottom: 200px; width: 130px; height: 35px; animation-duration: 2.8s; border-color: rgba(180,180,180,0.25); }
        .tornado-ring:nth-child(6) { bottom: 250px; width: 100px; height: 30px; animation-duration: 3s; border-color: rgba(200,200,200,0.2); }
        .tornado-ring:nth-child(7) { bottom: 300px; width: 70px; height: 25px; animation-duration: 3.2s; border-color: rgba(220,220,220,0.15); }
        .tornado-ring:nth-child(8) { bottom: 350px; width: 45px; height: 20px; animation-duration: 3.4s; border-color: rgba(240,240,240,0.1); }

        @keyframes tornado-spin {
            0% { transform: translateX(-50%) rotate(0deg) rotateX(60deg); }
            100% { transform: translateX(-50%) rotate(360deg) rotateX(60deg); }
        }

        .debris {
            position: absolute;
            font-size: 1.5rem;
            animation: debris-fly 4s linear infinite;
        }

        @keyframes debris-fly {
            0% { 
                transform: translate(0, 0) rotate(0deg) scale(0.5); 
                opacity: 0;
            }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { 
                transform: translate(200px, -400px) rotate(720deg) scale(0.2); 
                opacity: 0;
            }
        }

        .lightning {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255,255,255,0);
            pointer-events: none;
            animation: lightning-flash 5s ease-in-out infinite;
        }

        @keyframes lightning-flash {
            0%, 90%, 100% { background: rgba(255,255,255,0); }
            91%, 93%, 95% { background: rgba(255,255,255,0.3); }
            92%, 94% { background: rgba(255,255,255,0); }
        }

        .cloud {
            position: absolute;
            background: radial-gradient(ellipse at center, rgba(100,100,100,0.8) 0%, transparent 70%);
            border-radius: 50%;
            filter: blur(20px);
        }

        .cloud:nth-child(9) { width: 300px; height: 100px; top: 10%; left: 20%; animation: cloud-float 8s ease-in-out infinite; }
        .cloud:nth-child(10) { width: 250px; height: 80px; top: 15%; right: 20%; animation: cloud-float 10s ease-in-out infinite reverse; }

        @keyframes cloud-float {
            0%, 100% { transform: translateX(0); }
            50% { transform: translateX(50px); }
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 40px;
            flex-wrap: wrap;
        }

        .control-btn {
            padding: 12px 24px;
            background: rgba(255,255,255,0.1);
            border: 2px solid var(--tornado-3);
            border-radius: 25px;
            color: var(--tornado-3);
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Cinzel', serif;
        }

        .control-btn:hover, .control-btn.active {
            background: var(--tornado-3);
            color: var(--bg-storm);
            transform: translateY(-2px);
        }

        .nav-bar {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 60px;
        }

        .nav-btn {
            padding: 15px 40px;
            background: linear-gradient(145deg, rgba(255,255,255,0.1), rgba(255,255,255,0.05));
            border: 2px solid var(--storm);
            border-radius: 30px;
            color: var(--storm);
            font-family: 'Cinzel', serif;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }

        .nav-btn:hover {
            background: var(--storm);
            color: #fff;
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(44, 62, 80, 0.3);
        }

        @media (max-width: 768px) {
            .main-title { font-size: 2rem; }
            .tornado-scene { height: 400px; }
            .tornado-container { transform: scale(0.7); }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1 class="main-title">3D龙卷风</h1>
            <p class="subtitle">螺旋上升气流 - 旋转风暴效果</p>
        </header>

        <div class="tornado-scene">
            <div class="lightning"></div>
            <div class="tornado-container">
                <div class="tornado-ring"></div>
                <div class="tornado-ring"></div>
                <div class="tornado-ring"></div>
                <div class="tornado-ring"></div>
                <div class="tornado-ring"></div>
                <div class="tornado-ring"></div>
                <div class="tornado-ring"></div>
                <div class="tornado-ring"></div>
                <div class="cloud"></div>
                <div class="cloud"></div>
            </div>
        </div>

        <div class="controls">
            <button class="control-btn active" onclick="setSpeed('slow')">慢速</button>
            <button class="control-btn" onclick="setSpeed('normal')">正常</button>
            <button class="control-btn" onclick="setSpeed('fast')">快速</button>
            <button class="control-btn" onclick="toggleStorm()">暂停/播放</button>
        </div>

        <nav class="nav-bar">
            <a href="3d-22-mirror.html" class="nav-btn">上一个效果</a>
            <a href="index.html" class="nav-btn">返回首页</a>
            <a href="3d-24-domino.html" class="nav-btn">下一个效果</a>
        </nav>
    </div>

    <script>
        const rings = document.querySelectorAll('.tornado-ring');
        let isStorming = true;

        function setSpeed(speed) {
            document.querySelectorAll('.control-btn').forEach(btn => {
                if (btn.textContent.includes('速')) btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            const baseDurations = { slow: 5, normal: 3, fast: 1.5 };
            const base = baseDurations[speed];
            
            rings.forEach((ring, index) => {
                ring.style.animationDuration = (base + index * 0.2) + 's';
            });
        }

        function toggleStorm() {
            isStorming = !isStorming;
            rings.forEach(ring => {
                ring.style.animationPlayState = isStorming ? 'running' : 'paused';
            });
        }
    </script>
</body>
</html>
