<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>创建故事 - 乐高故事书桌游风格</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #ffd700;
            --gold-dark: #b8860b;
            --silver: #c0c0c0;
            --crimson: #dc2626;
            --purple: #a855f7;
            --green: #22c55e;
            --blue: #3b82f6;
            --orange: #f59e0b;
            --bg-dark: #0d0d14;
            --bg-medium: #1a1a2e;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --font-title: 'Cinzel', serif;
            --font-body: 'Noto Sans SC', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-body);
            background: linear-gradient(180deg, #1a1a2e 0%, #0d0d14 100%);
            min-height: 100vh;
            color: var(--text-primary);
            overflow-x: hidden;
        }

        .particles {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: var(--gold);
            border-radius: 50%;
            opacity: 0.3;
            animation: float 20s linear infinite;
        }

        @keyframes float {
            0% { transform: translateY(100vh); opacity: 0; }
            10% { opacity: 0.3; }
            90% { opacity: 0.3; }
            100% { transform: translateY(-100vh); opacity: 0; }
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-bottom: 1px solid rgba(255,215,0,0.2);
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .header-title {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-icon {
            font-size: 2rem;
        }

        .header-text {
            font-family: var(--font-title);
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--gold), #ff9800);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-tabs {
            display: flex;
            gap: 10px;
        }

        .nav-tab {
            padding: 10px 18px;
            border-radius: 10px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: var(--text-secondary);
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .nav-tab:hover {
            background: rgba(255,215,0,0.1);
            border-color: rgba(255,215,0,0.3);
            color: var(--text-primary);
        }

        .progress-bar {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 40px;
            padding: 20px;
            background: rgba(0,0,0,0.3);
            border-radius: 15px;
        }

        .progress-step {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .step-circle {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1rem;
            background: rgba(255,255,255,0.1);
            color: var(--text-secondary);
            border: 2px solid rgba(255,255,255,0.2);
            transition: all 0.3s ease;
        }

        .step-circle.active {
            background: linear-gradient(135deg, var(--gold), #ff9800);
            color: #000;
            border-color: var(--gold);
            box-shadow: 0 0 20px rgba(255,215,0,0.5);
        }

        .step-circle.completed {
            background: var(--green);
            color: white;
            border-color: var(--green);
        }

        .step-label {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .step-label.active {
            color: var(--gold);
            font-weight: 600;
        }

        .step-connector {
            width: 60px;
            height: 2px;
            background: rgba(255,255,255,0.2);
            margin: 0 5px;
        }

        .step-connector.completed {
            background: var(--green);
        }

        .section {
            margin-bottom: 40px;
        }

        .section-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        .section-icon {
            font-size: 1.5rem;
        }

        .section-title {
            font-family: var(--font-title);
            font-size: 1.3rem;
            font-weight: 600;
            color: var(--gold);
        }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 15px;
        }

        .select-card {
            background: linear-gradient(180deg, #2d2d44, #1a1a2e);
            border-radius: 15px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid transparent;
            text-align: center;
        }

        .select-card:hover {
            border-color: rgba(255,215,0,0.5);
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        .select-card.selected {
            border-color: var(--gold);
            background: linear-gradient(180deg, #3d3d54, #2a2a3e);
            box-shadow: 0 0 20px rgba(255,215,0,0.3);
        }

        .select-card-icon {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .select-card-title {
            font-size: 0.95rem;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .select-card-desc {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .hs-card {
            width: 100%;
            max-width: 140px;
            margin: 0 auto;
            aspect-ratio: 3/4;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
            background: linear-gradient(180deg, #3d3d3d, #1a1a1a);
            border: 3px solid;
            position: relative;
        }

        .hs-card.protagonist { border-color: var(--gold); }
        .hs-card.antagonist { border-color: var(--crimson); }
        .hs-card.supporting { border-color: var(--silver); }

        .hs-card.selected {
            transform: scale(1.05);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5), 0 0 20px rgba(255,215,0,0.5);
        }

        .hs-card.selected::after {
            content: '✓';
            position: absolute;
            top: 5px;
            right: 5px;
            width: 20px;
            height: 20px;
            background: var(--green);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: white;
        }

        .hs-portrait {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(180deg, #4a4a4a, #2a2a2a);
        }

        .hs-avatar {
            font-size: 2.5rem;
        }

        .hs-name-banner {
            padding: 6px 8px;
            background: linear-gradient(180deg, #5a4a3a, #3a2a1a);
            text-align: center;
        }

        .hs-name {
            font-family: var(--font-title);
            font-size: 0.75rem;
            font-weight: 600;
            color: #fff8e1;
        }

        .selected-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            padding: 15px;
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
            min-height: 60px;
        }

        .selected-tag {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 15px;
            background: linear-gradient(180deg, #3d3d54, #2a2a3e);
            border-radius: 20px;
            border: 1px solid var(--gold);
        }

        .selected-tag span {
            font-size: 0.9rem;
        }

        .selected-tag button {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 1rem;
            padding: 0;
            line-height: 1;
        }

        .selected-tag button:hover {
            color: var(--crimson);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            margin-bottom: 10px;
            font-weight: 600;
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        .form-input {
            width: 100%;
            padding: 15px 18px;
            background: rgba(0,0,0,0.4);
            border: 2px solid rgba(255,215,0,0.3);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 1rem;
            font-family: var(--font-body);
            transition: all 0.3s ease;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--gold);
            box-shadow: 0 0 15px rgba(255,215,0,0.3);
        }

        .form-hint {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-top: 8px;
        }

        .form-error {
            color: var(--crimson);
        }

        .actions {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 40px;
            padding-top: 30px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .action-btn {
            padding: 15px 40px;
            font-size: 1.1rem;
            font-weight: 600;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: var(--font-body);
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .action-btn.primary {
            background: linear-gradient(135deg, var(--gold), #ff9800);
            color: #000;
            box-shadow: 0 0 25px rgba(255,215,0,0.5);
        }

        .action-btn.primary:hover {
            transform: scale(1.05);
            box-shadow: 0 0 35px rgba(255,215,0,0.7);
        }

        .action-btn.secondary {
            background: rgba(255,255,255,0.1);
            color: var(--text-secondary);
            border: 1px solid rgba(255,255,255,0.2);
        }

        .action-btn.secondary:hover {
            background: rgba(255,255,255,0.15);
            color: var(--text-primary);
        }

        .footer {
            text-align: center;
            padding: 30px;
            color: var(--text-secondary);
            font-size: 0.9rem;
            border-top: 1px solid rgba(255,255,255,0.1);
            margin-top: 40px;
        }

        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-10px);
            background: rgba(0,0,0,0.95);
            padding: 12px 25px;
            border-radius: 10px;
            border: 1px solid var(--gold);
            font-size: 0.9rem;
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 1002;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .toast.success { border-color: var(--green); color: var(--green); }
        .toast.error { border-color: var(--crimson); color: #f87171; }

        @media (max-width: 600px) {
            .progress-bar {
                flex-wrap: wrap;
            }
            
            .step-connector {
                display: none;
            }
            
            .card-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>

    <div class="container">
        <header class="header">
            <div class="header-title">
                <span class="header-icon">✨</span>
                <h1 class="header-text">创建故事</h1>
            </div>
            <nav class="nav-tabs">
                <a href="index-demo.html" class="nav-tab">🏠 首页</a>
                <a href="bookshelf-demo.html" class="nav-tab">📚 我的书架</a>
                <a href="characters-demo.html" class="nav-tab">🎭 人仔角色</a>
            </nav>
        </header>

        <div class="progress-bar">
            <div class="progress-step">
                <div class="step-circle active" id="step1">1</div>
                <span class="step-label active">选择书籍</span>
            </div>
            <div class="step-connector"></div>
            <div class="progress-step">
                <div class="step-circle" id="step2">2</div>
                <span class="step-label">选择类型</span>
            </div>
            <div class="step-connector"></div>
            <div class="progress-step">
                <div class="step-circle" id="step3">3</div>
                <span class="step-label">选择角色</span>
            </div>
            <div class="step-connector"></div>
            <div class="progress-step">
                <div class="step-circle" id="step4">4</div>
                <span class="step-label">命名故事</span>
            </div>
        </div>

        <section class="section" id="step1Section">
            <div class="section-header">
                <span class="section-icon">📚</span>
                <h2 class="section-title">选择书籍</h2>
            </div>
            <div class="card-grid">
                <div class="select-card selected" onclick="selectBook(this, '魔法王国')">
                    <div class="select-card-icon">📖</div>
                    <div class="select-card-title">魔法王国</div>
                    <div class="select-card-desc">奇幻魔法世界</div>
                </div>
                <div class="select-card" onclick="selectBook(this, '太空探险')">
                    <div class="select-card-icon">🚀</div>
                    <div class="select-card-title">太空探险</div>
                    <div class="select-card-desc">星际冒险旅程</div>
                </div>
                <div class="select-card" onclick="selectBook(this, '海底世界')">
                    <div class="select-card-icon">🌊</div>
                    <div class="select-card-title">海底世界</div>
                    <div class="select-card-desc">深海神秘探险</div>
                </div>
                <div class="select-card" onclick="selectBook(this, '森林精灵')">
                    <div class="select-card-icon">🌲</div>
                    <div class="select-card-title">森林精灵</div>
                    <div class="select-card-desc">自然精灵传说</div>
                </div>
            </div>
        </section>

        <section class="section" id="step2Section" style="display: none;">
            <div class="section-header">
                <span class="section-icon">🎭</span>
                <h2 class="section-title">选择故事类型</h2>
            </div>
            <div class="card-grid">
                <div class="select-card selected" onclick="selectType(this, '冒险')">
                    <div class="select-card-icon">⚔️</div>
                    <div class="select-card-title">冒险</div>
                    <div class="select-card-desc">刺激的冒险旅程</div>
                </div>
                <div class="select-card" onclick="selectType(this, '解谜')">
                    <div class="select-card-icon">🔍</div>
                    <div class="select-card-title">解谜</div>
                    <div class="select-card-desc">智慧与推理</div>
                </div>
                <div class="select-card" onclick="selectType(this, '友情')">
                    <div class="select-card-icon">💝</div>
                    <div class="select-card-title">友情</div>
                    <div class="select-card-desc">温暖友情故事</div>
                </div>
                <div class="select-card" onclick="selectType(this, '成长')">
                    <div class="select-card-icon">🌱</div>
                    <div class="select-card-title">成长</div>
                    <div class="select-card-desc">成长与蜕变</div>
                </div>
            </div>
        </section>

        <section class="section" id="step3Section" style="display: none;">
            <div class="section-header">
                <span class="section-icon">🎭</span>
                <h2 class="section-title">选择角色</h2>
            </div>
            <div class="card-grid">
                <div class="hs-card protagonist selected" onclick="toggleCharacter(this, '艾拉拉')">
                    <div class="hs-portrait"><span class="hs-avatar">🧝‍♀️</span></div>
                    <div class="hs-name-banner"><span class="hs-name">艾拉拉</span></div>
                </div>
                <div class="hs-card protagonist selected" onclick="toggleCharacter(this, '雷恩')">
                    <div class="hs-portrait"><span class="hs-avatar">⚔️</span></div>
                    <div class="hs-name-banner"><span class="hs-name">雷恩</span></div>
                </div>
                <div class="hs-card supporting" onclick="toggleCharacter(this, '老智者奥伦')">
                    <div class="hs-portrait"><span class="hs-avatar">🧙‍♂️</span></div>
                    <div class="hs-name-banner"><span class="hs-name">老智者奥伦</span></div>
                </div>
                <div class="hs-card antagonist" onclick="toggleCharacter(this, '黑暗领主')">
                    <div class="hs-portrait"><span class="hs-avatar">👿</span></div>
                    <div class="hs-name-banner"><span class="hs-name">黑暗领主</span></div>
                </div>
            </div>
            
            <div style="margin-top: 25px;">
                <label class="form-label">已选角色</label>
                <div class="selected-list" id="selectedList">
                    <div class="selected-tag">
                        <span>🧝‍♀️ 艾拉拉</span>
                        <button onclick="removeCharacter('艾拉拉')">×</button>
                    </div>
                    <div class="selected-tag">
                        <span>⚔️ 雷恩</span>
                        <button onclick="removeCharacter('雷恩')">×</button>
                    </div>
                </div>
            </div>
        </section>

        <section class="section" id="step4Section" style="display: none;">
            <div class="section-header">
                <span class="section-icon">✏️</span>
                <h2 class="section-title">命名你的故事</h2>
            </div>
            <div class="form-group">
                <label class="form-label">📖 故事名称</label>
                <input type="text" class="form-input" id="storyName" placeholder="给你的故事起个名字" maxlength="50">
                <p class="form-hint">最多50个字符</p>
            </div>
            <div class="form-group">
                <label class="form-label">📝 故事简介（可选）</label>
                <textarea class="form-input" style="min-height: 100px;" placeholder="简单描述一下这个故事"></textarea>
            </div>
        </section>

        <div class="actions">
            <button class="action-btn secondary" id="prevBtn" style="display: none;" onclick="prevStep()">← 上一步</button>
            <button class="action-btn primary" id="nextBtn" onclick="nextStep()">下一步 →</button>
        </div>

        <footer class="footer">
            <p>乐高故事书 &copy; 2024 - 让想象力飞翔</p>
        </footer>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        for (var i = 0; i < 15; i++) {
            var p = document.createElement('div');
            p.className = 'particle';
            p.style.left = Math.random() * 100 + '%';
            p.style.animationDelay = Math.random() * 20 + 's';
            document.getElementById('particles').appendChild(p);
        }

        var currentStep = 1;
        var totalSteps = 4;
        var selectedCharacters = ['艾拉拉', '雷恩'];

        function selectBook(el, name) {
            document.querySelectorAll('#step1Section .select-card').forEach(function(c) {
                c.classList.remove('selected');
            });
            el.classList.add('selected');
        }

        function selectType(el, type) {
            document.querySelectorAll('#step2Section .select-card').forEach(function(c) {
                c.classList.remove('selected');
            });
            el.classList.add('selected');
        }

        function toggleCharacter(el, name) {
            el.classList.toggle('selected');
            var index = selectedCharacters.indexOf(name);
            if (index > -1) {
                selectedCharacters.splice(index, 1);
            } else {
                selectedCharacters.push(name);
            }
            updateSelectedList();
        }

        function removeCharacter(name) {
            selectedCharacters = selectedCharacters.filter(function(c) { return c !== name; });
            document.querySelectorAll('#step3Section .hs-card').forEach(function(card) {
                var cardName = card.querySelector('.hs-name').textContent;
                if (cardName === name) {
                    card.classList.remove('selected');
                }
            });
            updateSelectedList();
        }

        function updateSelectedList() {
            var list = document.getElementById('selectedList');
            if (selectedCharacters.length === 0) {
                list.innerHTML = '<span style="color: var(--text-secondary);">请选择至少一个角色</span>';
            } else {
                var emojis = { '艾拉拉': '🧝‍♀️', '雷恩': '⚔️', '老智者奥伦': '🧙‍♂️', '黑暗领主': '👿' };
                list.innerHTML = selectedCharacters.map(function(name) {
                    return '<div class="selected-tag"><span>' + (emojis[name] || '🎭') + ' ' + name + '</span><button onclick="removeCharacter(\'' + name + '\')">×</button></div>';
                }).join('');
            }
        }

        function nextStep() {
            if (currentStep < totalSteps) {
                currentStep++;
                updateStepUI();
            } else {
                var name = document.getElementById('storyName').value.trim();
                if (!name) {
                    showToast('请输入故事名称！', 'error');
                    return;
                }
                showToast('故事创建成功！🎉', 'success');
                setTimeout(function() {
                    window.location.href = 'bookshelf-demo.html';
                }, 1500);
            }
        }

        function prevStep() {
            if (currentStep > 1) {
                currentStep--;
                updateStepUI();
            }
        }

        function updateStepUI() {
            for (var i = 1; i <= totalSteps; i++) {
                var circle = document.getElementById('step' + i);
                var section = document.getElementById('step' + i + 'Section');
                
                circle.classList.remove('active', 'completed');
                
                if (i < currentStep) {
                    circle.classList.add('completed');
                    circle.innerHTML = '✓';
                    section.style.display = 'none';
                } else if (i === currentStep) {
                    circle.classList.add('active');
                    circle.innerHTML = i;
                    section.style.display = 'block';
                } else {
                    circle.innerHTML = i;
                    section.style.display = 'none';
                }
            }
            
            document.getElementById('prevBtn').style.display = currentStep > 1 ? 'inline-flex' : 'none';
            document.getElementById('nextBtn').innerHTML = currentStep === totalSteps ? '✨ 创建故事' : '下一步 →';
        }

        function showToast(msg, type) {
            var toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.className = 'toast show ' + (type || '');
            setTimeout(function() {
                toast.classList.remove('show');
            }, 2000);
        }
    </script>
</body>
</html>
