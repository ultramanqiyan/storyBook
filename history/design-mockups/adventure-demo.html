<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>冒险模式 - 乐高故事书桌游风格</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #ffd700;
            --gold-dark: #b8860b;
            --silver: #c0c0c0;
            --crimson: #dc2626;
            --purple: #a855f7;
            --green: #22c55e;
            --blue: #3b82f6;
            --orange: #f59e0b;
            --bg-dark: #0d0d14;
            --bg-medium: #1a1a2e;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --font-title: 'Cinzel', serif;
            --font-body: 'Noto Sans SC', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-body);
            background: linear-gradient(180deg, #1a1a2e 0%, #0d0d14 100%);
            min-height: 100vh;
            color: var(--text-primary);
            overflow-x: hidden;
        }

        .particles {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: var(--gold);
            border-radius: 50%;
            opacity: 0.3;
            animation: float 20s linear infinite;
        }

        @keyframes float {
            0% { transform: translateY(100vh); opacity: 0; }
            10% { opacity: 0.3; }
            90% { opacity: 0.3; }
            100% { transform: translateY(-100vh); opacity: 0; }
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid rgba(255,215,0,0.2);
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .header-title {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header-icon {
            font-size: 2rem;
        }

        .header-text {
            font-family: var(--font-title);
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--gold), #ff9800);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-tabs {
            display: flex;
            gap: 10px;
        }

        .nav-tab {
            padding: 10px 18px;
            border-radius: 10px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: var(--text-secondary);
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .nav-tab:hover {
            background: rgba(255,215,0,0.1);
            border-color: rgba(255,215,0,0.3);
            color: var(--text-primary);
        }

        .time-panel {
            background: linear-gradient(180deg, #2d2d44, #1a1a2e);
            border-radius: 15px;
            border: 2px solid rgba(255,215,0,0.3);
            padding: 25px;
            text-align: center;
            margin-bottom: 25px;
        }

        .time-label {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 10px;
        }

        .time-display {
            font-family: var(--font-title);
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--gold);
            margin-bottom: 15px;
        }

        .progress-bar {
            height: 8px;
            background: rgba(0,0,0,0.3);
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--gold), var(--orange));
            border-radius: 4px;
            width: 35%;
            animation: progress-pulse 2s ease-in-out infinite;
        }

        @keyframes progress-pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .time-limit {
            color: var(--text-secondary);
            font-size: 0.8rem;
            margin-top: 10px;
        }

        .story-card {
            background: linear-gradient(180deg, #2d2d44, #1a1a2e);
            border-radius: 15px;
            border: 2px solid rgba(255,215,0,0.2);
            padding: 25px;
            margin-bottom: 25px;
        }

        .story-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .story-title {
            font-family: var(--font-title);
            font-size: 1.3rem;
            font-weight: 600;
            color: var(--gold);
        }

        .story-nav {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-btn {
            width: 35px;
            height: 35px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.05);
            color: var(--text-primary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            transition: all 0.2s ease;
        }

        .nav-btn:hover:not(:disabled) {
            background: rgba(255,215,0,0.2);
            border-color: var(--gold);
        }

        .nav-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .nav-info {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .story-content {
            font-size: 1.1rem;
            line-height: 2;
            color: var(--text-primary);
        }

        .story-content p {
            margin-bottom: 20px;
            text-indent: 2em;
        }

        .char-name { color: #f87171; font-weight: 600; }
        .action-word { color: #a78bfa; font-weight: 600; }
        .emotion-word { color: #4ade80; font-weight: 600; }
        .location-word { color: #fbbf24; font-weight: 600; }
        .weather-word { color: #60a5fa; font-weight: 600; }

        .puzzle-container {
            background: linear-gradient(180deg, #2d2d44, #1a1a2e);
            border-radius: 15px;
            border: 2px solid var(--purple);
            padding: 25px;
            display: none;
        }

        .puzzle-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .puzzle-question {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .attempts-display {
            display: flex;
            gap: 8px;
        }

        .attempt-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            transition: all 0.3s ease;
        }

        .attempt-dot.active {
            background: var(--gold);
            box-shadow: 0 0 10px rgba(255,215,0,0.5);
        }

        .puzzle-options {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .puzzle-option {
            background: linear-gradient(180deg, #3d3d3d, #2a2a2a);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid transparent;
            font-size: 1rem;
        }

        .puzzle-option:hover {
            border-color: var(--purple);
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .puzzle-option.selected {
            border-color: var(--gold);
            background: linear-gradient(180deg, #4a4a4a, #3a3a3a);
        }

        .puzzle-option.correct {
            border-color: var(--green);
            background: linear-gradient(180deg, #1a4a2e, #166534);
        }

        .puzzle-option.wrong {
            border-color: var(--crimson);
            background: linear-gradient(180deg, #4a2a2e, #3f3f46);
            animation: shake 0.5s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-5px); }
            40%, 80% { transform: translateX(5px); }
        }

        .puzzle-result {
            text-align: center;
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
            display: none;
        }

        .result-correct {
            background: rgba(34,197,94,0.2);
            color: var(--green);
            font-size: 1.2rem;
            font-weight: 600;
        }

        .result-wrong {
            background: rgba(220,38,38,0.2);
            color: #f87171;
            font-size: 1rem;
        }

        .book-select-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
        }

        .book-select-card {
            background: linear-gradient(180deg, #2d2d44, #1a1a2e);
            border-radius: 12px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }

        .book-select-card:hover {
            border-color: var(--gold);
            transform: translateY(-5px);
        }

        .book-select-card.selected {
            border-color: var(--green);
            background: linear-gradient(180deg, #1a3a2e, #1a1a2e);
        }

        .book-select-icon {
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .book-select-title {
            font-size: 0.95rem;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .book-select-info {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-10px);
            background: rgba(0,0,0,0.95);
            padding: 12px 25px;
            border-radius: 10px;
            border: 1px solid var(--gold);
            font-size: 0.9rem;
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 1002;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .toast.success { border-color: var(--green); }
        .toast.error { border-color: var(--crimson); }

        .footer {
            text-align: center;
            padding: 20px;
            color: var(--text-secondary);
            font-size: 0.9rem;
            border-top: 1px solid rgba(255,255,255,0.1);
            margin-top: 30px;
        }

        @media (max-width: 600px) {
            .puzzle-options {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>

    <div class="container">
        <header class="header">
            <div class="header-title">
                <span class="header-icon">🗺️</span>
                <h1 class="header-text">冒险模式</h1>
            </div>
            <nav class="nav-tabs">
                <a href="index-demo.html" class="nav-tab">🏠 首页</a>
                <a href="bookshelf-demo.html" class="nav-tab">📚 我的书架</a>
            </nav>
        </header>

        <div class="time-panel">
            <p class="time-label">⏰ 今日阅读时间</p>
            <div class="time-display" id="timeDisplay">42分钟</div>
            <div class="progress-bar">
                <div class="progress-fill"></div>
            </div>
            <p class="time-limit">每日限额：120分钟</p>
        </div>

        <div class="story-card" id="storyCard">
            <div class="story-header">
                <h2 class="story-title" id="chapterTitle">选择一个故事开始冒险</h2>
                <div class="story-nav">
                    <button class="nav-btn" id="prevBtn" disabled>←</button>
                    <span class="nav-info" id="chapterNav">1 / 5</span>
                    <button class="nav-btn" id="nextBtn">→</button>
                </div>
            </div>
            <div class="story-content" id="storyContent">
                <div id="bookSelectArea">
                    <p style="text-align: center; color: var(--text-secondary); padding: 20px 0;">
                        🗺️ 选择一个故事开始你的冒险！
                    </p>
                    <div class="book-select-grid" id="bookList"></div>
                </div>
            </div>
        </div>

        <div class="puzzle-container" id="puzzleContainer">
            <div class="puzzle-header">
                <div class="puzzle-question" id="puzzleQuestion">艾拉拉在森林中遇到了什么？</div>
                <div class="attempts-display" id="attemptsDisplay">
                    <span class="attempt-dot active"></span>
                    <span class="attempt-dot active"></span>
                    <span class="attempt-dot active"></span>
                </div>
            </div>
            <div class="puzzle-options" id="puzzleOptions">
                <div class="puzzle-option" onclick="selectOption(0, 'A')">A. 一只金色的小鹿</div>
                <div class="puzzle-option" onclick="selectOption(1, 'B')">B. 一位老智者</div>
                <div class="puzzle-option" onclick="selectOption(2, 'C')">C. 一条神秘的河流</div>
                <div class="puzzle-option" onclick="selectOption(3, 'D')">D. 一座古老的城堡</div>
            </div>
            <div class="puzzle-result" id="puzzleResult"></div>
        </div>

        <footer class="footer">
            <p>乐高故事书 &copy; 2024 - 让想象力飞翔</p>
        </footer>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        for (var i = 0; i < 15; i++) {
            var p = document.createElement('div');
            p.className = 'particle';
            p.style.left = Math.random() * 100 + '%';
            p.style.animationDelay = Math.random() * 20 + 's';
            document.getElementById('particles').appendChild(p);
        }

        var books = [
            { id: 1, title: '魔法王国的冒险', chapters: 5 },
            { id: 2, title: '太空探险记', chapters: 3 },
            { id: 3, title: '海底世界奇遇', chapters: 7 },
            { id: 4, title: '森林精灵传说', chapters: 4 }
        ];

        var currentChapter = 0;
        var totalChapters = 5;
        var currentAttempts = 0;
        var maxAttempts = 3;
        var correctAnswer = 'B';
        var puzzleSolved = false;

        function loadBookList() {
            var container = document.getElementById('bookList');
            container.innerHTML = books.map(function(book) {
                return '<div class="book-select-card" onclick="selectBook(' + book.id + ')">' +
                    '<div class="book-select-icon">📖</div>' +
                    '<div class="book-select-title">' + book.title + '</div>' +
                    '<div class="book-select-info">📚 ' + book.chapters + '章</div>' +
                '</div>';
            }).join('');
        }

        function selectBook(bookId) {
            showToast('正在加载故事...', 'success');
            setTimeout(function() {
                showStory();
            }, 800);
        }

        function showStory() {
            document.getElementById('bookSelectArea').style.display = 'none';
            document.getElementById('chapterTitle').textContent = '第一章：启程的黎明';
            
            var content = '<p>在<span class="location-word">魔法王国</span>的边缘，有一座被<span class="location-word">古老森林</span>环绕的小村庄。<span class="char-name">艾拉拉</span>站在村口，望着远处若隐若现的<span class="location-word">城堡</span>塔尖，心中充满了<span class="emotion-word">期待</span>和<span class="emotion-word">紧张</span>。</p>' +
            '<p>"准备好了吗，年轻的冒险者？"<span class="char-name">老智者奥伦</span>的声音从身后传来，他的眼中闪烁着<span class="emotion-word">慈祥</span>的光芒。</p>' +
            '<p><span class="char-name">艾拉拉</span><span class="action-word">转过身</span>，<span class="action-word">握紧</span>了手中的魔法杖，坚定地点了点头。"我准备好了，奥伦大师。"</p>';
            
            document.getElementById('storyContent').innerHTML = content;
            document.getElementById('puzzleContainer').style.display = 'block';
        }

        function selectOption(index, answer) {
            if (puzzleSolved) return;
            
            var options = document.querySelectorAll('.puzzle-option');
            options.forEach(function(opt) {
                opt.classList.remove('selected');
            });
            options[index].classList.add('selected');
            
            currentAttempts++;
            updateAttempts();
            
            if (answer === correctAnswer) {
                puzzleSolved = true;
                options[index].classList.add('correct');
                showResult(true);
                showToast('🎉 回答正确！', 'success');
            } else {
                options[index].classList.add('wrong');
                
                if (currentAttempts >= maxAttempts) {
                    showResult(false);
                } else {
                    showToast('❌ 答案错误，还有 ' + (maxAttempts - currentAttempts) + ' 次机会！', 'error');
                    setTimeout(function() {
                        options[index].classList.remove('wrong', 'selected');
                    }, 500);
                }
            }
        }

        function updateAttempts() {
            var dots = document.querySelectorAll('.attempt-dot');
            dots.forEach(function(dot, index) {
                if (index < (maxAttempts - currentAttempts)) {
                    dot.classList.add('active');
                } else {
                    dot.classList.remove('active');
                }
            });
        }

        function showResult(isCorrect) {
            var resultBox = document.getElementById('puzzleResult');
            if (isCorrect) {
                resultBox.innerHTML = '<div class="result-correct">🎉 恭喜你答对了！</div>';
            } else {
                resultBox.innerHTML = '<div class="result-wrong">😢 正确答案是：<strong>B</strong></div>';
            }
            resultBox.style.display = 'block';
            
            var options = document.querySelectorAll('.puzzle-option');
            options.forEach(function(opt) {
                opt.style.pointerEvents = 'none';
            });
        }

        function showToast(msg, type) {
            var toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.className = 'toast show ' + (type || '');
            setTimeout(function() {
                toast.classList.remove('show');
            }, 2000);
        }

        loadBookList();
    </script>
</body>
</html>
