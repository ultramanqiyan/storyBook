<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>家长控制 - 乐高故事书</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --gold: #ffd700;
      --gold-dark: #b8860b;
      --gold-light: #ffed4a;
      --silver: #c0c0c0;
      --crimson: #dc2626;
      --purple: #a855f7;
      --green: #22c55e;
      --blue: #3b82f6;
      --orange: #f59e0b;
      --bg-dark: #0d0d14;
      --bg-medium: #1a1a2e;
      --bg-light: #252542;
      --text-primary: #f8fafc;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
      --font-title: 'Cinzel', serif;
      --font-body: 'Noto Sans SC', sans-serif;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: var(--font-body);
      background: var(--bg-dark);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
    }

    .bg-pattern {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: 
        radial-gradient(ellipse at 20% 20%, rgba(255, 215, 0, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 80%, rgba(168, 85, 247, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 50%, rgba(59, 130, 246, 0.05) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    #particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
    }

    .particle {
      position: absolute;
      width: 4px;
      height: 4px;
      background: var(--gold);
      border-radius: 50%;
      opacity: 0.6;
      animation: float 20s infinite ease-in-out;
      box-shadow: 0 0 6px var(--gold);
    }

    @keyframes float {
      0%, 100% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
      10% { opacity: 0.6; }
      90% { opacity: 0.6; }
      100% { transform: translateY(-100px) rotate(720deg); opacity: 0; }
    }

    .container {
      position: relative;
      z-index: 10;
      max-width: 600px;
      margin: 0 auto;
      padding: 30px 20px;
    }

    header {
      text-align: center;
      margin-bottom: 40px;
    }

    .page-title {
      font-family: var(--font-title);
      font-size: 2.5rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--gold), var(--gold-light), var(--gold));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: 0 0 30px rgba(255, 215, 0, 0.3);
      margin-bottom: 20px;
      letter-spacing: 2px;
    }

    .nav {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .nav a {
      color: var(--text-secondary);
      text-decoration: none;
      padding: 10px 20px;
      border: 1px solid rgba(255, 215, 0, 0.3);
      border-radius: 8px;
      transition: all 0.3s ease;
      font-size: 0.9rem;
    }

    .nav a:hover {
      color: var(--gold);
      border-color: var(--gold);
      background: rgba(255, 215, 0, 0.1);
    }

    .control-card {
      background: linear-gradient(145deg, var(--bg-medium), var(--bg-light));
      border: 2px solid rgba(255, 215, 0, 0.2);
      border-radius: 20px;
      padding: 30px;
      margin-bottom: 25px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
    }

    .control-card h2 {
      font-family: var(--font-title);
      font-size: 1.4rem;
      color: var(--gold);
      margin-bottom: 25px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .time-display {
      text-align: center;
      margin-bottom: 25px;
      padding: 25px;
      background: var(--bg-dark);
      border-radius: 15px;
      border: 1px solid rgba(255, 215, 0, 0.2);
    }

    .time-label {
      color: var(--text-secondary);
      font-size: 1rem;
      margin-bottom: 10px;
    }

    .time-value {
      font-family: var(--font-title);
      font-size: 2.5rem;
      color: var(--gold);
      text-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 10px;
      color: var(--text-secondary);
      font-size: 0.95rem;
    }

    .input-field {
      width: 100%;
      padding: 15px 18px;
      background: var(--bg-dark);
      border: 2px solid rgba(255, 215, 0, 0.3);
      border-radius: 12px;
      color: var(--text-primary);
      font-size: 1rem;
      transition: all 0.3s ease;
    }

    .input-field:focus {
      outline: none;
      border-color: var(--gold);
      box-shadow: 0 0 15px rgba(255, 215, 0, 0.2);
    }

    .btn-primary {
      width: 100%;
      background: linear-gradient(135deg, var(--gold), var(--gold-dark));
      color: var(--bg-dark);
      border: none;
      padding: 16px;
      border-radius: 12px;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      font-family: var(--font-body);
    }

    .btn-primary:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 25px rgba(255, 215, 0, 0.3);
    }

    .btn-logout {
      width: 100%;
      background: var(--crimson);
      color: white;
      border: none;
      padding: 16px;
      border-radius: 12px;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      font-family: var(--font-body);
    }

    .btn-logout:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 25px rgba(220, 38, 38, 0.3);
    }

    .history-empty {
      text-align: center;
      padding: 40px;
      color: var(--text-muted);
    }

    .history-icon {
      font-size: 3rem;
      margin-bottom: 15px;
    }

    .user-info {
      margin-bottom: 20px;
      font-size: 1.1rem;
      color: var(--text-secondary);
    }

    .user-name {
      color: var(--gold);
      font-weight: 600;
    }

    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      padding: 15px 30px;
      border-radius: 10px;
      font-size: 0.95rem;
      z-index: 1000;
      animation: slideUp 0.3s ease;
    }

    .toast.success {
      background: linear-gradient(135deg, var(--green), #16a34a);
      color: white;
    }

    .toast.error {
      background: linear-gradient(135deg, var(--crimson), #b91c1c);
      color: white;
    }

    .toast.info {
      background: linear-gradient(135deg, var(--blue), #2563eb);
      color: white;
    }

    @keyframes slideUp {
      from { transform: translateX(-50%) translateY(20px); opacity: 0; }
      to { transform: translateX(-50%) translateY(0); opacity: 1; }
    }

    footer {
      text-align: center;
      margin-top: 40px;
      padding: 20px;
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    @media (max-width: 480px) {
      .page-title {
        font-size: 2rem;
      }

      .control-card {
        padding: 20px;
      }

      .time-value {
        font-size: 2rem;
      }
    }
  </style>
</head>
<body>
  <div class="bg-pattern"></div>
  <div id="particles"></div>

  <div class="container">
    <header>
      <h1 class="page-title">👨‍👩‍👧 家长控制</h1>
      <nav class="nav">
        <a href="index.html">🏠 首页</a>
        <a href="bookshelf.html">📚 我的书架</a>
      </nav>
    </header>

    <main>
      <div class="control-card">
        <h2>⏰ 使用时间设置</h2>
        <div class="time-display">
          <p class="time-label">今日已使用</p>
          <div class="time-value" id="usedTime">0分钟</div>
        </div>

        <form id="timeForm">
          <div class="form-group">
            <label for="dailyLimit">⏱️ 每日时间限额（分钟）</label>
            <input type="number" id="dailyLimit" name="dailyLimit" class="input-field" min="30" max="480" value="120">
          </div>
          <button type="submit" class="btn-primary">💾 保存设置</button>
        </form>
      </div>

      <div class="control-card">
        <h2>📊 阅读记录</h2>
        <div id="readingHistory" class="history-empty">
          <div class="history-icon">📖</div>
          <p>暂无阅读记录</p>
        </div>
      </div>

      <div class="control-card">
        <h2>⚙️ 账号管理</h2>
        <p class="user-info">当前用户：<span class="user-name" id="currentUser">-</span></p>
        <button class="btn-logout" id="logoutBtn">🚪 退出登录</button>
      </div>
    </main>

    <footer>
      <p>乐高故事书 &copy; 2024 - 让想象力飞翔</p>
    </footer>
  </div>

  <script src="js/utils.js"></script>
  <script>
    for (var i = 0; i < 15; i++) {
      var p = document.createElement('div');
      p.className = 'particle';
      p.style.left = Math.random() * 100 + '%';
      p.style.animationDelay = Math.random() * 20 + 's';
      document.getElementById('particles').appendChild(p);
    }

    var userId = getUserId();

    if (userId) {
      loadUserInfo();
    }

    async function loadUserInfo() {
      try {
        var data = await fetchAPI('/users?userId=' + userId);
        document.getElementById('usedTime').textContent = formatTime(data.user.time_used_today || 0);
        document.getElementById('dailyLimit').value = data.user.daily_time_limit || 120;
        document.getElementById('currentUser').textContent = data.user.username;
      } catch (error) {
        showToast('加载失败：' + error.message, 'error');
      }
    }

    function formatTime(minutes) {
      if (minutes < 60) {
        return minutes + '分钟';
      }
      var hours = Math.floor(minutes / 60);
      var mins = minutes % 60;
      return hours + '小时' + (mins > 0 ? mins + '分钟' : '');
    }

    document.getElementById('timeForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      
      if (!userId) {
        showToast('请先登录', 'error');
        return;
      }
      
      var limit = parseInt(document.getElementById('dailyLimit').value);
      
      if (limit < 30 || limit > 480) {
        showToast('时间限额应在30-480分钟之间', 'error');
        return;
      }
      
      try {
        await fetchAPI('/users', {
          method: 'PUT',
          body: {
            userId: userId,
            dailyTimeLimit: limit
          }
        });
        showToast('设置已保存！✅', 'success');
      } catch (error) {
        showToast('保存失败：' + error.message, 'error');
      }
    });

    document.getElementById('logoutBtn').addEventListener('click', function() {
      if (!userId) {
        showToast('您还未登录', 'error');
        return;
      }
      if (confirm('确定要退出登录吗？')) {
        clearUserId();
        showToast('已退出登录', 'info');
        setTimeout(function() {
          window.location.href = 'login.html';
        }, 1000);
      }
    });

    function showToast(message, type) {
      var existing = document.querySelector('.toast');
      if (existing) existing.remove();
      
      var toast = document.createElement('div');
      toast.className = 'toast ' + type;
      toast.textContent = message;
      document.body.appendChild(toast);
      
      setTimeout(function() {
        toast.remove();
      }, 3000);
    }
  </script>
</body>
</html>
