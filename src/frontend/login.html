<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="login.pageTitle">Sign In - StoryBook</title>
  <meta name="description" content="Sign in to your StoryBook account and continue your storytelling journey">
  <meta name="keywords" content="StoryBook, sign in, login, account, storytelling">
  <meta property="og:title" content="Sign In - StoryBook">
  <meta property="og:description" content="Sign in to your StoryBook account">
  <meta property="og:locale" content="en_US">
  <meta property="og:locale:alternate" content="zh_CN">
  <link rel="alternate" hreflang="en" href="https://storybook-adventures.com/login?lang=en">
  <link rel="alternate" hreflang="zh" href="https://storybook-adventures.com/login?lang=zh">
  <link rel="alternate" hreflang="x-default" href="https://storybook-adventures.com/login">
  <link rel="canonical" href="https://storybook-adventures.com/login">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/themes.css">
  <link rel="stylesheet" href="css/responsive.css">
  <style>
    .login-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--spacing-lg);
      position: relative;
      z-index: 1;
    }
    
    .book-container {
      position: relative;
      width: 100%;
      max-width: 800px;
      animation: fadeIn 1s ease-out;
    }
    
    .book-open {
      display: flex;
      background: var(--color-parchment);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg), 0 0 50px rgba(139, 90, 43, 0.3);
      overflow: hidden;
      position: relative;
    }
    
    .book-open::before {
      content: '';
      position: absolute;
      top: 0;
      bottom: 0;
      left: 50%;
      width: 20px;
      transform: translateX(-50%);
      background: linear-gradient(90deg, 
        rgba(139, 90, 43, 0.3) 0%, 
        rgba(139, 90, 43, 0.1) 50%, 
        rgba(139, 90, 43, 0.3) 100%);
      z-index: 10;
    }
    
    .book-page {
      flex: 1;
      padding: var(--spacing-xl);
      position: relative;
    }
    
    .book-page.left {
      background: linear-gradient(90deg, #f4e4bc 0%, #e8d4a8 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border-right: 1px solid rgba(139, 90, 43, 0.2);
    }
    
    .book-page.right {
      background: linear-gradient(90deg, #e8d4a8 0%, #f4e4bc 100%);
    }
    
    .book-page::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: radial-gradient(ellipse at center, transparent 50%, rgba(139, 90, 43, 0.15) 100%);
      pointer-events: none;
    }
    
    .decoration {
      text-align: center;
      color: #5a3a1a;
    }
    
    .decoration-icon {
      font-size: 80px;
      margin-bottom: var(--spacing-lg);
      opacity: 0.8;
    }
    
    .decoration-text {
      font-family: var(--font-title);
      font-size: 24px;
      color: #8B4513;
      margin-bottom: var(--spacing-md);
    }
    
    .decoration-quote {
      font-family: var(--font-body);
      font-style: italic;
      color: #6a4a2a;
      font-size: 14px;
      max-width: 200px;
      line-height: 1.6;
    }
    
    .login-form {
      position: relative;
      z-index: 1;
    }
    
    .login-title {
      font-family: var(--font-title);
      font-size: 28px;
      color: #5a3a1a;
      text-align: center;
      margin-bottom: var(--spacing-xl);
    }
    
    .login-title span {
      color: var(--color-gold-dark);
    }
    
    .form-group {
      margin-bottom: var(--spacing-lg);
    }
    
    .form-label {
      display: block;
      font-family: var(--font-title);
      font-size: 14px;
      color: #5a3a1a;
      margin-bottom: var(--spacing-sm);
    }
    
    .form-input {
      width: 100%;
      padding: var(--spacing-md);
      background: rgba(255, 255, 255, 0.5);
      border: 2px solid rgba(139, 90, 43, 0.3);
      border-radius: var(--radius-md);
      color: #3a2a1a;
      font-family: var(--font-body);
      font-size: 16px;
      transition: all 0.3s ease;
    }
    
    .form-input:focus {
      outline: none;
      border-color: var(--color-gold);
      box-shadow: 0 0 10px rgba(255, 215, 0, 0.3);
      background: rgba(255, 255, 255, 0.8);
    }
    
    .form-input::placeholder {
      color: #8a7a6a;
    }
    
    .input-icon {
      position: relative;
    }
    
    .input-icon .form-input {
      padding-left: 40px;
    }
    
    .input-icon::before {
      content: attr(data-icon);
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 18px;
      opacity: 0.6;
    }
    
    .wax-seal-container {
      display: flex;
      justify-content: center;
      margin-top: var(--spacing-xl);
    }
    
    .wax-seal-btn {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--spacing-sm);
      background: none;
      border: none;
      cursor: pointer;
      padding: var(--spacing-md);
    }
    
    .wax-seal {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #C41E3A 0%, #8B0000 50%, #5C0000 100%);
      box-shadow: 
        0 4px 8px rgba(0, 0, 0, 0.4),
        inset 0 2px 4px rgba(255, 255, 255, 0.2),
        0 0 0 3px var(--color-gold);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.3s ease;
    }
    
    .wax-seal:hover {
      transform: scale(1.05);
    }
    
    .wax-seal:active {
      animation: waxSealPress 0.3s ease;
    }
    
    .wax-seal-icon {
      font-size: 32px;
      color: var(--color-gold);
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.5);
    }
    
    .wax-seal-text {
      font-family: var(--font-title);
      font-size: 14px;
      color: #5a3a1a;
      text-transform: uppercase;
      letter-spacing: 2px;
    }
    
    .login-footer {
      text-align: center;
      margin-top: var(--spacing-lg);
    }
    
    .login-footer p {
      color: #6a4a2a;
      font-size: 14px;
    }
    
    .login-footer a {
      color: var(--color-gold-dark);
      text-decoration: underline;
    }
    
    .corner-decoration {
      position: absolute;
      width: 60px;
      height: 60px;
      opacity: 0.3;
    }
    
    .corner-decoration.top-left {
      top: 10px;
      left: 10px;
      border-top: 3px solid #8B4513;
      border-left: 3px solid #8B4513;
    }
    
    .corner-decoration.top-right {
      top: 10px;
      right: 10px;
      border-top: 3px solid #8B4513;
      border-right: 3px solid #8B4513;
    }
    
    .corner-decoration.bottom-left {
      bottom: 10px;
      left: 10px;
      border-bottom: 3px solid #8B4513;
      border-left: 3px solid #8B4513;
    }
    
    .corner-decoration.bottom-right {
      bottom: 10px;
      right: 10px;
      border-bottom: 3px solid #8B4513;
      border-right: 3px solid #8B4513;
    }
    
    .wax-seal-decoration {
      position: absolute;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #C41E3A 0%, #8B0000 100%);
      opacity: 0.5;
    }
    
    .wax-seal-decoration.top {
      top: 20px;
      right: 20px;
    }
    
    .wax-seal-decoration.bottom {
      bottom: 20px;
      left: 20px;
    }
    
    .language-switcher-login {
      position: absolute;
      top: 10px;
      right: 10px;
      display: flex;
      gap: 8px;
      z-index: 20;
    }
    
    .language-switcher-login .lang-btn {
      padding: 6px 12px;
      background: rgba(139, 90, 43, 0.2);
      border: 1px solid rgba(139, 90, 43, 0.3);
      border-radius: 16px;
      color: #5a3a1a;
      cursor: pointer;
      transition: all 0.3s ease;
      font-size: 12px;
    }
    
    .language-switcher-login .lang-btn:hover {
      background: rgba(139, 90, 43, 0.3);
    }
    
    .language-switcher-login .lang-btn.active {
      background: #8B4513;
      color: #f4e4bc;
    }
    
    @media (max-width: 768px) {
      .book-open {
        flex-direction: column;
      }
      
      .book-open::before {
        display: none;
      }
      
      .book-page.left {
        display: none;
      }
      
      .book-page.right {
        background: var(--color-parchment);
      }
    }
  </style>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9288060233934481" crossorigin="anonymous"></script>
</head>
<body class="theme-adventure">
  <div class="particles-container" id="particles"></div>
  
  <div class="login-page">
    <div class="book-container">
      <div class="language-switcher-login">
        <button class="lang-btn active" onclick="switchLanguage('en')">EN</button>
        <button class="lang-btn" onclick="switchLanguage('zh')">中文</button>
      </div>
      <div class="book-open">
        <div class="corner-decoration top-left"></div>
        <div class="corner-decoration top-right"></div>
        <div class="corner-decoration bottom-left"></div>
        <div class="corner-decoration bottom-right"></div>
        
        <div class="book-page left">
          <div class="wax-seal-decoration top"></div>
          <div class="wax-seal-decoration bottom"></div>
          <div class="decoration">
            <div class="decoration-icon">📖</div>
            <h2 class="decoration-text" data-i18n="login.welcome">Welcome, Traveler</h2>
            <p class="decoration-quote" data-i18n="login.quote">"Every great story begins with a single step into the unknown."</p>
          </div>
        </div>
        
        <div class="book-page right">
          <div class="login-form">
            <h2 class="login-title"><span data-i18n="login.beginJourney">Begin Thy Journey</span></h2>
            
            <div class="form-group">
              <label class="form-label" data-i18n="login.email">Thy Email</label>
              <div class="input-icon" data-icon="📧">
                <input type="email" id="email" class="form-input" data-i18n-placeholder="login.emailPlaceholder" placeholder="Enter thy email address">
              </div>
            </div>
            
            <div class="form-group">
              <label class="form-label" data-i18n="login.password">Thy Secret</label>
              <div class="input-icon" data-icon="🔐">
                <input type="password" id="password" class="form-input" data-i18n-placeholder="login.passwordPlaceholder" placeholder="Enter thy password">
              </div>
            </div>
            
            <div class="wax-seal-container">
              <button class="wax-seal-btn" onclick="handleLogin()">
                <div class="wax-seal">
                  <span class="wax-seal-icon">🔑</span>
                </div>
                <span class="wax-seal-text" data-i18n="login.signIn">Sign In</span>
              </button>
            </div>
            
            <div class="login-footer">
              <p><span data-i18n="login.newHere">New to our realm?</span> <a href="#" id="showRegister" data-i18n="login.createAccount">Create thy account</a></p>
            </div>
          </div>
          
          <div class="register-form" id="registerForm" style="display: none;">
            <h2 class="register-title"><span data-i18n="login.createAccount">Create Thy Account</span></h2>
            
            <div class="form-group">
              <label class="form-label" data-i18n="login.username">Username</label>
              <div class="input-icon" data-icon="👤">
                <input type="text" id="registerUsername" class="form-input" data-i18n-placeholder="login.usernamePlaceholder" placeholder="Choose thy name">
              </div>
            </div>
            
            <div class="form-group">
              <label class="form-label" data-i18n="login.email">Email</label>
              <div class="input-icon" data-icon="📧">
                <input type="email" id="registerEmail" class="form-input" data-i18n-placeholder="login.emailPlaceholder" placeholder="Enter thy email">
              </div>
            </div>
            
            <div class="form-group">
              <label class="form-label" data-i18n="login.password">Password</label>
              <div class="input-icon" data-icon="🔐">
                <input type="password" id="registerPassword" class="form-input" data-i18n-placeholder="login.passwordPlaceholder" placeholder="Choose thy secret">
              </div>
            </div>
            
            <div class="form-group">
              <label class="form-label" data-i18n="login.confirmPassword">Confirm Password</label>
              <div class="input-icon" data-icon="🔐">
                <input type="password" id="registerConfirmPassword" class="form-input" data-i18n-placeholder="login.confirmPasswordPlaceholder" placeholder="Confirm thy secret">
              </div>
            </div>
            
            <div class="wax-seal-container">
              <button class="wax-seal-btn" type="submit">
                <div class="wax-seal">
                  <span class="wax-seal-icon">🔑</span>
                </div>
                <span class="wax-seal-text" data-i18n="login.register">Register</span>
              </button>
            </div>
            
            <div class="login-footer">
              <p><span data-i18n="login.alreadyHaveAccount">Already have an account?</span> <a href="#" id="showLogin" data-i18n="login.signIn">Sign In</a></p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  
  <script src="js/api.js"></script>
  <script src="js/main.js"></script>
  <script src="js/theme.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      createParticles(document.getElementById('particles'), 40);
      
      if (isLoggedIn()) {
        window.location.href = 'bookshelf.html';
      }
      
      updateLoginLanguageSwitcher();
    });
    
    function updateLoginLanguageSwitcher() {
      const langBtns = document.querySelectorAll('.language-switcher-login .lang-btn');
      langBtns.forEach(btn => {
        btn.classList.remove('active');
        if ((currentLanguage === 'en' && btn.textContent === 'EN') || 
            (currentLanguage === 'zh' && btn.textContent === '中文')) {
          btn.classList.add('active');
        }
      });
    }
    
    async function handleLogin() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      
      if (!email || !password) {
        showNotification(t('login.pleaseEnterCredentials'), 'error');
        return;
      }
      
      const btn = document.querySelector('.wax-seal');
      btn.style.animation = 'waxSealPress 0.3s ease';
      
      try {
        const result = await API.login(email, password);
        
        if (result.success) {
          setUserId(result.data.user_id);
          setUserEmail(result.data.email);
          
          showNotification(result.data.is_new_user ? t('login.welcomeNew') : t('login.welcomeBack'), 'success');
          
          setTimeout(() => {
            window.location.href = 'bookshelf.html';
          }, 500);
        } else {
          showNotification(result.error || t('login.loginFailed'), 'error');
        }
      } catch (error) {
        showNotification(error.message || t('login.loginFailed'), 'error');
      }
    }
    
    document.getElementById('showRegister').addEventListener('click', function(e) {
      e.preventDefault();
      document.querySelector('.login-form').style.display = 'none';
      document.getElementById('registerForm').style.display = 'block';
    });
    
    document.getElementById('showLogin').addEventListener('click', function(e) {
      e.preventDefault();
      document.getElementById('registerForm').style.display = 'none';
      document.querySelector('.login-form').style.display = 'block';
    });
    
    document.querySelector('#registerForm .wax-seal-btn').addEventListener('click', async function(e) {
      e.preventDefault();
      
      const username = document.getElementById('registerUsername').value;
      const email = document.getElementById('registerEmail').value;
      const password = document.getElementById('registerPassword').value;
      const confirmPassword = document.getElementById('registerConfirmPassword').value;
      
      if (!username || !email || !password) {
        showNotification(t('login.pleaseFillAllFields'), 'error');
        return;
      }
      
      if (password !== confirmPassword) {
        showNotification(t('login.passwordMismatch'), 'error');
        return;
      }
      
      try {
        const result = await API.register(email, password, username);
        
        if (result.success) {
          setUserId(result.data.user_id);
          setUserEmail(email);
          
          showNotification(t('login.accountCreated'), 'success');
          
          setTimeout(() => {
            window.location.href = 'bookshelf.html';
          }, 500);
        } else {
          showNotification(result.error || t('login.registerFailed'), 'error');
        }
      } catch (error) {
        showNotification(error.message || t('login.registerFailed'), 'error');
      }
    });
  </script>
  
  <footer class="footer">
    <p data-i18n="footer.tagline">StoryBook - Where Your Stories Come to Life</p>
    <div class="footer-links">
      <a href="about" data-i18n="footer.about">About</a>
      <a href="privacy" data-i18n="footer.privacy">Privacy</a>
      <a href="terms" data-i18n="footer.terms">Terms</a>
      <a href="contact" data-i18n="footer.contact">Contact</a>
    </div>
  </footer>
</body>
</html>
