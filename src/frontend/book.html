<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>书籍详情 - 卡牌互动小说</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <a href="/bookshelf" class="logo">📚 卡牌互动小说</a>
        </header>

        <main class="main-content">
            <div class="book-detail" id="bookDetail">
                <div class="loading">加载中...</div>
            </div>

            <div class="tabs">
                <button class="tab-btn active" data-tab="chapters">章节</button>
                <button class="tab-btn" data-tab="characters">角色</button>
                <button class="tab-btn" data-tab="cards">卡牌</button>
            </div>

            <div class="tab-content" id="chaptersTab">
                <div class="section-header">
                    <h3>章节列表</h3>
                    <button onclick="showCreateChapterModal()" class="btn btn-primary btn-sm" id="addChapterBtn">+ 添加章节</button>
                </div>
                <div id="chaptersList" class="chapters-list"></div>
            </div>

            <div class="tab-content hidden" id="charactersTab">
                <div class="section-header">
                    <h3>角色卡牌</h3>
                    <button onclick="showCreateCharacterModal()" class="btn btn-primary btn-sm" id="addCharBtn">+ 添加角色</button>
                </div>
                <div id="charactersList" class="character-grid"></div>
            </div>

            <div class="tab-content hidden" id="cardsTab">
                <div class="section-header">
                    <h3>情节卡牌</h3>
                    <button onclick="showCreateCardModal()" class="btn btn-primary btn-sm" id="addCardBtn">+ 添加卡牌</button>
                </div>
                <div id="cardsList" class="card-grid"></div>
            </div>
        </main>
    </div>

    <div id="createChapterModal" class="modal">
        <div class="modal-content">
            <h3>添加新章节</h3>
            <form id="createChapterForm">
                <div class="form-group">
                    <label for="chapterTitle">章节标题</label>
                    <input type="text" id="chapterTitle" required placeholder="输入章节标题">
                </div>
                <div class="form-group">
                    <label for="chapterContent">章节内容</label>
                    <textarea id="chapterContent" rows="6" placeholder="输入章节内容（可选）"></textarea>
                </div>
                <div class="modal-actions">
                    <button type="button" onclick="hideCreateChapterModal()" class="btn">取消</button>
                    <button type="submit" class="btn btn-primary">创建</button>
                </div>
            </form>
        </div>
    </div>

    <div id="createCharacterModal" class="modal">
        <div class="modal-content">
            <h3>添加新角色</h3>
            <form id="createCharacterForm">
                <div class="form-group">
                    <label for="charName">角色名称</label>
                    <input type="text" id="charName" required placeholder="输入角色名称">
                </div>
                <div class="form-group">
                    <label for="charAvatar">头像</label>
                    <input type="text" id="charAvatar" placeholder="表情符号" value="👤">
                </div>
                <div class="form-group">
                    <label for="charRoleType">角色类型</label>
                    <input type="text" id="charRoleType" placeholder="如：战士、法师、商人">
                </div>
                <div class="form-group">
                    <label for="charPersonality">性格</label>
                    <input type="text" id="charPersonality" placeholder="如：勇敢、聪明">
                </div>
                <div class="form-group">
                    <label for="charSpeechStyle">说话方式</label>
                    <input type="text" id="charSpeechStyle" placeholder="如：幽默、严肃">
                </div>
                <div class="form-group">
                    <label>
                        <input type="checkbox" id="charIsProtagonist"> 是否为主角
                    </label>
                </div>
                <div class="modal-actions">
                    <button type="button" onclick="hideCreateCharacterModal()" class="btn">取消</button>
                    <button type="submit" class="btn btn-primary">创建</button>
                </div>
            </form>
        </div>
    </div>

    <div id="createCardModal" class="modal">
        <div class="modal-content">
            <h3>添加新卡牌</h3>
            <form id="createCardForm">
                <div class="form-group">
                    <label for="cardSubType">卡牌类型</label>
                    <select id="cardSubType" required>
                        <option value="weather">天气</option>
                        <option value="terrain">地形</option>
                        <option value="adventure">冒险</option>
                        <option value="equipment">装备</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="cardName">卡牌名称</label>
                    <input type="text" id="cardName" required placeholder="输入卡牌名称">
                </div>
                <div class="form-group">
                    <label for="cardIcon">图标</label>
                    <input type="text" id="cardIcon" placeholder="表情符号" value="⭐">
                </div>
                <div class="form-group">
                    <label for="cardDescription">描述</label>
                    <textarea id="cardDescription" rows="3" placeholder="输入卡牌描述"></textarea>
                </div>
                <div class="modal-actions">
                    <button type="button" onclick="hideCreateCardModal()" class="btn">取消</button>
                    <button type="submit" class="btn btn-primary">创建</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const bookId = params.get('id');
        const userId = localStorage.getItem('userId');
        let currentBook = null;

        async function loadBookDetail() {
            try {
                const response = await fetch(`/api/books/${bookId}`);
                const result = await response.json();
                
                if (result.success) {
                    currentBook = result.data;
                    renderBookDetail();
                    loadChapters();
                    loadCharacters();
                    loadCards();
                    
                    if (currentBook.is_preset) {
                        document.getElementById('addChapterBtn').style.display = 'none';
                        document.getElementById('addCharBtn').style.display = 'none';
                        document.getElementById('addCardBtn').style.display = 'none';
                    }
                }
            } catch (error) {
                console.error('加载失败:', error);
            }
        }

        function renderBookDetail() {
            document.getElementById('bookDetail').innerHTML = `
                <div class="book-header">
                    <div class="book-cover-large">${getBookIcon(currentBook.type)}</div>
                    <div class="book-meta">
                        <h1>${currentBook.title}</h1>
                        <span class="book-type">${getTypeName(currentBook.type)}</span>
                        ${currentBook.is_preset ? '<span class="preset-badge">预设</span>' : ''}
                    </div>
                </div>
            `;
        }

        async function loadChapters() {
            const response = await fetch(`/api/chapters?book_id=${bookId}`);
            const result = await response.json();
            const container = document.getElementById('chaptersList');
            
            if (result.success && result.data.length > 0) {
                container.innerHTML = result.data.map(ch => `
                    <div class="chapter-item" onclick="location.href='/chapter?id=${ch.chapter_id}'">
                        <span class="chapter-order">第${ch.order_num}章</span>
                        <span class="chapter-title">${ch.title}</span>
                        <span class="chapter-arrow">→</span>
                    </div>
                `).join('');
            } else {
                container.innerHTML = '<p class="empty">暂无章节</p>';
            }
        }

        async function loadCharacters() {
            const response = await fetch(`/api/characters?book_id=${bookId}`);
            const result = await response.json();
            const container = document.getElementById('charactersList');
            
            if (result.success && result.data.length > 0) {
                container.innerHTML = result.data.map(char => `
                    <div class="character-card">
                        <div class="char-avatar">${char.avatar}</div>
                        <div class="char-info">
                            <h4>${char.name}</h4>
                            <span class="char-role">${char.role_type || ''}</span>
                            ${char.is_protagonist ? '<span class="protagonist-badge">主角</span>' : ''}
                        </div>
                    </div>
                `).join('');
            } else {
                container.innerHTML = '<p class="empty">暂无角色</p>';
            }
        }

        async function loadCards() {
            const response = await fetch(`/api/plot-cards?book_id=${bookId}`);
            const result = await response.json();
            const container = document.getElementById('cardsList');
            
            if (result.success && result.data.length > 0) {
                container.innerHTML = result.data.map(card => `
                    <div class="plot-card">
                        <span class="card-icon">${card.icon}</span>
                        <div class="card-info">
                            <h4>${card.name}</h4>
                            <span class="card-type">${card.sub_type}</span>
                        </div>
                    </div>
                `).join('');
            } else {
                container.innerHTML = '<p class="empty">暂无卡牌</p>';
            }
        }

        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
                btn.classList.add('active');
                document.getElementById(btn.dataset.tab + 'Tab').classList.remove('hidden');
            });
        });

        function showCreateChapterModal() {
            document.getElementById('createChapterModal').style.display = 'flex';
        }

        function hideCreateChapterModal() {
            document.getElementById('createChapterModal').style.display = 'none';
            document.getElementById('createChapterForm').reset();
        }

        function showCreateCharacterModal() {
            document.getElementById('createCharacterModal').style.display = 'flex';
        }

        function hideCreateCharacterModal() {
            document.getElementById('createCharacterModal').style.display = 'none';
            document.getElementById('createCharacterForm').reset();
        }

        function showCreateCardModal() {
            document.getElementById('createCardModal').style.display = 'flex';
        }

        function hideCreateCardModal() {
            document.getElementById('createCardModal').style.display = 'none';
            document.getElementById('createCardForm').reset();
        }

        document.getElementById('createChapterForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const title = document.getElementById('chapterTitle').value;
            const content = document.getElementById('chapterContent').value;

            try {
                const response = await fetch('/api/chapters', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        book_id: bookId, 
                        title, 
                        content
                    })
                });

                const result = await response.json();
                if (result.success) {
                    hideCreateChapterModal();
                    loadChapters();
                } else {
                    alert(result.error || '创建失败');
                }
            } catch (error) {
                alert('网络错误');
            }
        });

        document.getElementById('createCharacterForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('charName').value;
            const avatar = document.getElementById('charAvatar').value || '👤';
            const role_type = document.getElementById('charRoleType').value;
            const personality = document.getElementById('charPersonality').value;
            const speech_style = document.getElementById('charSpeechStyle').value;
            const is_protagonist = document.getElementById('charIsProtagonist').checked;

            try {
                const response = await fetch('/api/characters', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        book_id: bookId, 
                        name, 
                        avatar,
                        role_type,
                        personality,
                        speech_style,
                        is_protagonist
                    })
                });

                const result = await response.json();
                if (result.success) {
                    hideCreateCharacterModal();
                    loadCharacters();
                } else {
                    alert(result.error || '创建失败');
                }
            } catch (error) {
                alert('网络错误');
            }
        });

        document.getElementById('createCardForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const sub_type = document.getElementById('cardSubType').value;
            const name = document.getElementById('cardName').value;
            const icon = document.getElementById('cardIcon').value || '⭐';
            const description = document.getElementById('cardDescription').value;

            try {
                const response = await fetch('/api/plot-cards', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        book_id: bookId, 
                        type: 'plot',
                        sub_type, 
                        name, 
                        icon,
                        description
                    })
                });

                const result = await response.json();
                if (result.success) {
                    hideCreateCardModal();
                    loadCards();
                } else {
                    alert(result.error || '创建失败');
                }
            } catch (error) {
                alert('网络错误');
            }
        });

        function getBookIcon(type) {
            const icons = { 'adventure': '🗺️', 'fantasy': '🧙', 'romance': '💕', 'business': '💼' };
            return icons[type] || '📖';
        }

        function getTypeName(type) {
            const names = { 'adventure': '冒险', 'fantasy': '魔幻', 'romance': '言情', 'business': '职场' };
            return names[type] || type;
        }

        loadBookDetail();
    </script>
</body>
</html>
