<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Lost Kingdom - StoryBook</title>
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/themes.css">
  <link rel="stylesheet" href="css/responsive.css">
  <style>
    .book-opening-page {
      min-height: 100vh;
      padding-top: 80px;
      display: flex;
      justify-content: center;
      align-items: center;
      perspective: 2000px;
    }
    
    .book-container {
      position: relative;
      width: 90%;
      max-width: 1200px;
      height: 80vh;
      min-height: 600px;
      display: flex;
      justify-content: center;
    }
    
    .book-spine {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      width: 40px;
      height: 100%;
      background: linear-gradient(90deg, 
        #2a1a0a 0%, 
        #4a3a2a 20%, 
        #3a2a1a 50%, 
        #4a3a2a 80%, 
        #2a1a0a 100%);
      border-radius: 5px;
      z-index: 10;
      box-shadow: 
        0 0 20px rgba(0, 0, 0, 0.5),
        inset 0 0 10px rgba(0, 0, 0, 0.3);
    }
    
    .book-spine::before {
      content: '';
      position: absolute;
      top: 10%;
      left: 50%;
      transform: translateX(-50%);
      width: 4px;
      height: 80%;
      background: linear-gradient(180deg, 
        #8B4513 0%, 
        #A0522D 50%, 
        #8B4513 100%);
      border-radius: 2px;
    }
    
    .book-spine-title {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) rotate(-90deg);
      white-space: nowrap;
      font-family: 'MedievalSharp', cursive;
      font-size: 14px;
      color: #D4AF37;
      text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5);
      letter-spacing: 2px;
    }
    
    .book-page {
      position: absolute;
      width: calc(50% - 30px);
      height: 100%;
      background: #f4e4bc;
      border-radius: 5px;
      overflow: hidden;
      box-shadow: 0 0 30px rgba(0, 0, 0, 0.3);
    }
    
    .book-page.left {
      left: 0;
      border-right: none;
      border-top-right-radius: 0;
      border-bottom-right-radius: 0;
    }
    
    .book-page.right {
      right: 0;
      border-left: none;
      border-top-left-radius: 0;
      border-bottom-left-radius: 0;
    }
    
    .parchment-texture {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: 
        radial-gradient(ellipse at top left, rgba(139, 90, 43, 0.15) 0%, transparent 50%),
        radial-gradient(ellipse at bottom right, rgba(139, 90, 43, 0.15) 0%, transparent 50%),
        radial-gradient(ellipse at center, transparent 0%, rgba(139, 90, 43, 0.05) 100%);
      pointer-events: none;
    }
    
    .page-edge {
      position: absolute;
      pointer-events: none;
    }
    
    .page-edge.top {
      top: 0;
      left: 0;
      right: 0;
      height: 20px;
      background: linear-gradient(180deg, 
        rgba(80, 40, 20, 0.3) 0%, 
        transparent 100%);
    }
    
    .page-edge.bottom {
      bottom: 0;
      left: 0;
      right: 0;
      height: 20px;
      background: linear-gradient(0deg, 
        rgba(80, 40, 20, 0.3) 0%, 
        transparent 100%);
    }
    
    .page-edge.left {
      top: 0;
      left: 0;
      bottom: 0;
      width: 20px;
      background: linear-gradient(90deg, 
        rgba(80, 40, 20, 0.3) 0%, 
        transparent 100%);
    }
    
    .page-edge.right {
      top: 0;
      right: 0;
      bottom: 0;
      width: 20px;
      background: linear-gradient(270deg, 
        rgba(80, 40, 20, 0.3) 0%, 
        transparent 100%);
    }
    
    .page-content {
      position: relative;
      height: 100%;
      padding: 30px;
      overflow-y: auto;
      color: #2a1810;
      z-index: 1;
    }
    
    .view-tabs {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 20px;
      padding-bottom: 15px;
      border-bottom: 2px solid rgba(139, 90, 43, 0.3);
    }
    
    .view-tab {
      padding: 8px 20px;
      background: rgba(139, 90, 43, 0.1);
      border: 2px solid rgba(139, 90, 43, 0.3);
      border-radius: 8px;
      font-family: 'MedievalSharp', cursive;
      font-size: 14px;
      color: #4a3a2a;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    
    .view-tab:hover {
      background: rgba(139, 90, 43, 0.2);
      border-color: #8B4513;
    }
    
    .view-tab.active {
      background: rgba(139, 90, 43, 0.3);
      border-color: #8B4513;
      color: #2a1810;
    }
    
    .chapter-list-view {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 15px;
    }
    
    .chapter-card {
      padding: 15px;
      background: rgba(139, 90, 43, 0.1);
      border: 1px solid rgba(139, 90, 43, 0.2);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    
    .chapter-card:hover {
      background: rgba(139, 90, 43, 0.2);
      transform: translateY(-2px);
    }
    
    .chapter-card .chapter-number {
      font-family: 'MedievalSharp', cursive;
      font-size: 12px;
      color: #8B4513;
      margin-bottom: 5px;
    }
    
    .chapter-card .chapter-title {
      font-family: 'Cinzel', serif;
      font-size: 14px;
      color: #2a1810;
    }
    
    .chapter-card .chapter-status {
      font-size: 11px;
      color: #6a4a2a;
      margin-top: 5px;
    }
    
    .character-grid-view {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 20px;
      justify-items: center;
      padding: 15px 0;
    }
    
    .plot-grid-view {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 20px;
      justify-items: center;
      padding: 15px 0;
    }
    
    .book-info-header {
      display: flex;
      align-items: center;
      gap: 20px;
      padding: 20px;
      background: rgba(139, 90, 43, 0.1);
      border-radius: 10px;
      margin-bottom: 20px;
    }
    
    .book-cover-small {
      width: 80px;
      height: 110px;
      background: linear-gradient(135deg, #2a4a2a 0%, #1a2a1a 100%);
      border-radius: 5px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
    }
    
    .book-cover-small span {
      font-size: 36px;
    }
    
    .book-meta-info h2 {
      font-family: 'MedievalSharp', cursive;
      font-size: 20px;
      color: #2a1810;
      margin-bottom: 5px;
    }
    
    .book-meta-info .type-badge {
      display: inline-block;
      padding: 3px 10px;
      background: #8B4513;
      color: #f4e4bc;
      border-radius: 4px;
      font-size: 10px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    
    .book-meta-info .stats {
      display: flex;
      gap: 15px;
      font-size: 12px;
      color: #4a3a2a;
    }
    
    .action-buttons {
      display: flex;
      gap: 10px;
      margin-top: 15px;
    }
    
    .action-btn {
      padding: 10px 20px;
      background: linear-gradient(180deg, #8B4513 0%, #654321 100%);
      border: 2px solid #D4AF37;
      border-radius: 8px;
      font-family: 'MedievalSharp', cursive;
      font-size: 13px;
      color: #f4e4bc;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
    }
    
    .action-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 15px rgba(139, 69, 19, 0.4);
    }
    
    .action-btn.secondary {
      background: transparent;
      color: #8B4513;
    }
    
    @media (max-width: 900px) {
      .book-container {
        width: 95%;
        height: auto;
        min-height: auto;
        flex-direction: column;
      }
      
      .book-spine {
        display: none;
      }
      
      .book-page {
        position: relative;
        width: 100%;
        height: auto;
        min-height: 400px;
        margin-bottom: 20px;
      }
      
      .book-page.left,
      .book-page.right {
        border-radius: 8px;
      }
      
      .chapter-toc-item {
        flex-wrap: wrap;
      }
      
      .chapter-toc-item .chapter-dots {
        display: none;
      }
      
      .chapter-toc-item .chapter-title {
        max-width: 100%;
      }
      
      .hs-card-mini {
        width: 120px;
        height: 160px;
      }
      
      .character-grid-view,
      .plot-grid-view {
        grid-template-columns: repeat(2, 1fr);
        gap: 15px;
      }
    }
  </style>
</head>
<body class="theme-adventure">
  <div class="particles-container" id="particles"></div>
  
  <nav class="navbar">
    <a href="index.html" class="navbar-brand">StoryBook</a>
    <div class="navbar-nav">
      <a href="bookshelf.html" class="navbar-link">My Library</a>
      <a href="#" class="navbar-link" onclick="logout(); return false;">Sign Out</a>
    </div>
  </nav>
  
  <div class="book-opening-page">
    <div class="book-container">
      <div class="book-spine">
        <span class="book-spine-title">The Lost Kingdom</span>
      </div>
      
      <div class="book-page left">
        <div class="parchment-texture"></div>
        <div class="page-edge top"></div>
        <div class="page-edge left"></div>
        <div class="page-edge bottom"></div>
        <div class="page-content">
          <div class="book-info-header">
            <div class="book-cover-small">
              <span>🗺️</span>
            </div>
            <div class="book-meta-info">
              <span class="type-badge">Adventure</span>
              <h2>The Lost Kingdom</h2>
              <div class="stats">
                <span>📜 20 Chapters</span>
                <span>👥 5 Characters</span>
                <span>📖 15% Progress</span>
              </div>
              <div class="action-buttons">
                <a href="chapter.html" class="action-btn">Continue Reading</a>
                <a href="director.html" class="action-btn secondary">Direct New Chapter</a>
              </div>
            </div>
          </div>
          
          <div class="view-tabs">
            <button class="view-tab active" data-view="chapters" onclick="switchView('chapters')">📜 Chapters</button>
            <button class="view-tab" data-view="characters" onclick="switchView('characters')">👥 Characters</button>
            <button class="view-tab" data-view="plots" onclick="switchView('plots')">🎭 Plots</button>
          </div>
          
          <div id="leftPageContent"></div>
        </div>
      </div>
      
      <div class="book-page right">
        <div class="parchment-texture"></div>
        <div class="page-edge top"></div>
        <div class="page-edge right"></div>
        <div class="page-edge bottom"></div>
        <div class="page-content">
          <div id="rightPageContent"></div>
        </div>
      </div>
    </div>
  </div>
  
  <div id="cardModal" class="modal-overlay" onclick="closeCardModal(event)">
    <div class="modal-card-content">
      <button class="modal-close-btn" onclick="closeCardModal()">&times;</button>
      <div class="modal-card-display"></div>
    </div>
  </div>
  
  <script src="js/api.js"></script>
  <script src="js/main.js"></script>
  <script src="js/theme.js"></script>
  <script>
    let currentBook = null;
    let currentView = 'chapters';
    let isAnimating = false;

    document.addEventListener('DOMContentLoaded', async function() {
      createParticles(document.getElementById('particles'), 30);
      
      const userId = checkAuth();
      if (!userId) return;
      
      const bookId = getUrlParam('id');
      if (!bookId) {
        window.location.href = 'bookshelf.html';
        return;
      }
      
      await loadBook(bookId);
    });
    
    async function loadBook(bookId) {
      try {
        const result = await API.getBook(bookId);
        
        if (result.success) {
          currentBook = result.data;
          renderBookHeader(currentBook);
          renderBookPages();
        } else {
          showNotification('Book not found', 'error');
          setTimeout(() => window.location.href = 'bookshelf.html', 1500);
        }
      } catch (error) {
        showNotification('Failed to load book: ' + error.message, 'error');
      }
    }
    
    function renderBookHeader(book) {
      const typeIcons = {
        adventure: '🗺️',
        fantasy: '🧙',
        romance: '💕',
        business: '💼'
      };
      
      document.querySelector('.book-cover-small span').textContent = typeIcons[book.type] || '📖';
      document.querySelector('.book-spine-title').textContent = book.title;
      document.querySelector('.book-meta-info h2').textContent = book.title;
      document.querySelector('.type-badge').textContent = book.type;
      
      const chapters = book.chapters || [];
      const characters = book.characters || [];
      const progress = book.progress || 0;
      
      document.querySelector('.stats').innerHTML = `
        <span>📜 ${chapters.length} Chapters</span>
        <span>👥 ${characters.length} Characters</span>
        <span>📖 ${progress}% Progress</span>
      `;
      
      const actionButtons = document.querySelector('.action-buttons');
      const currentChapter = chapters.find(c => c.status === 'current') || chapters[0];
      if (currentChapter) {
        actionButtons.innerHTML = `
          <a href="chapter.html?id=${currentChapter.chapter_id}" class="action-btn">Continue Reading</a>
          <a href="director.html?book_id=${book.book_id}" class="action-btn secondary">Direct New Chapter</a>
        `;
      } else {
        actionButtons.innerHTML = `
          <a href="director.html?book_id=${book.book_id}" class="action-btn">Direct New Chapter</a>
        `;
      }
    }

    function switchView(view) {
      if (isAnimating || view === currentView) return;
      isAnimating = true;
      
      const leftContent = document.getElementById('leftPageContent');
      const rightContent = document.getElementById('rightPageContent');
      
      leftContent.style.animation = 'pageFlipOut 0.3s ease-in forwards';
      rightContent.style.animation = 'pageFlipOut 0.3s ease-in forwards';
      
      setTimeout(() => {
        currentView = view;
        
        document.querySelectorAll('.view-tab').forEach(tab => {
          tab.classList.toggle('active', tab.dataset.view === view);
        });
        
        renderBookPages();
        
        leftContent.style.animation = 'pageFlipIn 0.5s ease-out forwards';
        rightContent.style.animation = 'pageFlipIn 0.5s ease-out forwards';
        
        setTimeout(() => {
          isAnimating = false;
          leftContent.style.animation = '';
          rightContent.style.animation = '';
        }, 500);
        
      }, 300);
    }

    function renderBookPages() {
      const leftContent = document.getElementById('leftPageContent');
      const rightContent = document.getElementById('rightPageContent');
      
      if (!currentBook) return;
      
      if (currentView === 'chapters') {
        const chapters = currentBook.chapters || [];
        const half = Math.ceil(chapters.length / 2);
        const leftChapters = chapters.slice(0, half);
        const rightChapters = chapters.slice(half);
        
        leftContent.innerHTML = `<div class="chapter-toc">${leftChapters.map((ch, i) => renderChapterCard(ch, i)).join('')}</div>`;
        rightContent.innerHTML = `<div class="chapter-toc">${rightChapters.map((ch, i) => renderChapterCard(ch, i + half)).join('')}</div>`;
      } else if (currentView === 'characters') {
        const characters = currentBook.characters || [];
        const half = Math.ceil(characters.length / 2);
        const leftChars = characters.slice(0, half);
        const rightChars = characters.slice(half);
        
        leftContent.innerHTML = `<div class="character-grid-view">${leftChars.map((ch, i) => renderCharacterCard(ch, i)).join('')}</div>`;
        rightContent.innerHTML = `<div class="character-grid-view">${rightChars.map((ch, i) => renderCharacterCard(ch, i)).join('')}</div>`;
      } else if (currentView === 'plots') {
        renderPlotCards();
      }
    }
    
    async function renderPlotCards() {
      const leftContent = document.getElementById('leftPageContent');
      const rightContent = document.getElementById('rightPageContent');
      
      try {
        const result = await API.getPlotCards(currentBook.book_id);
        const plots = result.success ? (result.data || []) : [];
        
        const half = Math.ceil(plots.length / 2);
        const leftPlots = plots.slice(0, half);
        const rightPlots = plots.slice(half);
        
        leftContent.innerHTML = `<div class="plot-grid-view">${leftPlots.map((p, i) => renderPlotCard(p, i)).join('')}</div>`;
        rightContent.innerHTML = `<div class="plot-grid-view">${rightPlots.map((p, i) => renderPlotCard(p, i)).join('')}</div>`;
      } catch (error) {
        leftContent.innerHTML = '<p>Failed to load plot cards</p>';
        rightContent.innerHTML = '';
      }
    }

    function renderChapterCard(chapter, index) {
      const chapterId = chapter.chapter_id;
      const orderNum = chapter.order_num || (index + 1);
      const romanNumerals = ['I', 'II', 'III', 'IV', 'V', 'VI', 'VII', 'VIII', 'IX', 'X'];
      
      const isSolved = chapter.is_solved === 1;
      const statusIcon = isSolved ? '✓' : '🖋️';
      const statusText = isSolved ? '已完成' : '待完成';
      
      return `
        <div class="chapter-toc-item" 
             onclick="goToChapter('${chapterId}')"
             style="animation: fadeIn 0.5s ease-out ${orderNum * 0.1}s backwards;">
          <span class="chapter-number">Chapter ${romanNumerals[orderNum - 1] || orderNum}</span>
          <span class="chapter-dots"></span>
          <span class="chapter-title">${chapter.title}</span>
          <span class="chapter-status-icon" title="${statusText}">${statusIcon}</span>
        </div>
      `;
    }

    function renderCharacterCard(char, index) {
      return `
        <div class="hs-card-mini ${(char.role_type || 'character').toLowerCase()}" 
             onclick="showCharacterDetail('${char.char_id}')"
             style="animation: fadeIn 0.5s ease-out ${index * 0.1}s backwards;">
          <div style="font-size: 48px;">${char.avatar || '👤'}</div>
          <div style="color: #FFD700; font-family: 'Cinzel', serif; font-size: 14px; margin-top: 10px;">${char.name}</div>
          <div style="color: #a0a0a0; font-size: 11px; margin-top: 5px;">${char.role_type || 'Character'}</div>
        </div>
      `;
    }

    function renderPlotCard(plot, index) {
      return `
        <div class="hs-card-mini plot-card" 
             onclick="showPlotDetail('${plot.card_id}')"
             style="animation: fadeIn 0.5s ease-out ${index * 0.1}s backwards;">
          <div style="font-size: 36px;">${plot.icon || '🎭'}</div>
          <div style="color: #f4e4bc; font-family: 'Cinzel', serif; font-size: 13px; margin-top: 10px; text-align: center;">${plot.name}</div>
          <div style="color: #ccc; font-size: 11px; margin-top: 5px; text-align: center; padding: 0 10px;">${plot.description || ''}</div>
        </div>
      `;
    }

    function goToChapter(id) {
      window.location.href = `chapter.html?id=${id}`;
    }

    function showCharacterDetail(id) {
      const char = currentBook.characters?.find(c => c.char_id === id);
      if (!char) return;
      
      const modal = document.getElementById('cardModal');
      const content = modal.querySelector('.modal-card-display');
      
      content.innerHTML = `
        <div class="hs-card-mini ${(char.role_type || 'character').toLowerCase()}" style="transform: none; margin: 0 auto;">
          <div style="font-size: 64px;">${char.avatar || '👤'}</div>
          <div style="color: #FFD700; font-family: 'Cinzel', serif; font-size: 18px; margin-top: 15px;">${char.name}</div>
          <div style="color: #a0a0a0; font-size: 14px; margin-top: 8px;">${char.role_type || 'Character'}</div>
          ${char.personality ? `<div style="color: #ccc; font-size: 12px; margin-top: 10px; padding: 0 20px;">${char.personality}</div>` : ''}
        </div>
      `;
      
      modal.classList.add('active');
    }

    function showPlotDetail(id) {
      const modal = document.getElementById('cardModal');
      const content = modal.querySelector('.modal-card-display');
      
      content.innerHTML = `
        <div class="hs-card-mini plot-card" style="transform: none; margin: 0 auto;">
          <div style="font-size: 48px;">🎭</div>
          <div style="color: #f4e4bc; font-family: 'Cinzel', serif; font-size: 18px; margin-top: 15px;">Plot Card</div>
        </div>
      `;
      
      modal.classList.add('active');
    }

    function closeCardModal(event) {
      if (!event || event.target.classList.contains('modal-overlay')) {
        document.getElementById('cardModal').classList.remove('active');
      }
    }
  </script>
</body>
</html>
