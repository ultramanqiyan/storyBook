<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>卡牌互动小说</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>📚 卡牌互动小说</h1>
            <p class="subtitle">创造属于你的故事</p>
        </header>

        <main class="main-content">
            <section class="hero">
                <div class="hero-content">
                    <h2>用卡牌编织故事</h2>
                    <p>选择角色、场景和情节，让每一次阅读都是独特的冒险</p>
                    <div class="cta-buttons">
                        <a href="/login" class="btn btn-primary">开始创作</a>
                        <a href="/bookshelf" class="btn btn-secondary">浏览书架</a>
                    </div>
                </div>
            </section>

            <section class="features">
                <div class="feature-card">
                    <span class="feature-icon">🎭</span>
                    <h3>角色卡牌</h3>
                    <p>创建独特的角色，定义他们的性格和说话风格</p>
                </div>
                <div class="feature-card">
                    <span class="feature-icon">🗺️</span>
                    <h3>情节卡牌</h3>
                    <p>选择天气、地形、冒险类型，构建精彩剧情</p>
                </div>
                <div class="feature-card">
                    <span class="feature-icon">🧩</span>
                    <h3>互动谜题</h3>
                    <p>在故事中穿插谜题，增加阅读趣味</p>
                </div>
            </section>

            <section class="preset-books">
                <h2>预设故事</h2>
                <div class="book-grid" id="presetBooks">
                    <div class="loading">加载中...</div>
                </div>
            </section>
        </main>

        <footer class="footer">
            <p>&copy; 2026 卡牌互动小说 | Powered by Cloudflare</p>
        </footer>
    </div>

    <script src="/js/api.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            try {
                const response = await fetch('/api/books/preset');
                const result = await response.json();
                
                if (result.success && result.data.length > 0) {
                    const container = document.getElementById('presetBooks');
                    container.innerHTML = result.data.map(book => `
                        <div class="book-card" onclick="location.href='/book?id=${book.book_id}'">
                            <div class="book-cover">${getBookIcon(book.type)}</div>
                            <div class="book-info">
                                <h3>${book.title}</h3>
                                <span class="book-type">${getTypeName(book.type)}</span>
                            </div>
                        </div>
                    `).join('');
                } else {
                    document.getElementById('presetBooks').innerHTML = '<p>暂无预设故事</p>';
                }
            } catch (error) {
                document.getElementById('presetBooks').innerHTML = '<p>加载失败</p>';
            }
        });

        function getBookIcon(type) {
            const icons = {
                'adventure': '🗺️',
                'fantasy': '🧙',
                'romance': '💕',
                'business': '💼'
            };
            return icons[type] || '📖';
        }

        function getTypeName(type) {
            const names = {
                'adventure': '冒险',
                'fantasy': '魔幻',
                'romance': '言情',
                'business': '职场'
            };
            return names[type] || type;
        }
    </script>
</body>
</html>
