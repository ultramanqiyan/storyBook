<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StoryBook HelloWorld</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .container {
            text-align: center;
            padding: 40px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }
        h1 {
            font-size: 3rem;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
        }
        .version-info {
            margin-top: 30px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
        }
        .version-label {
            font-size: 1rem;
            opacity: 0.8;
            margin-bottom: 10px;
        }
        .version-number {
            font-size: 2rem;
            font-weight: bold;
            color: #FFD700;
        }
        .version-desc {
            margin-top: 10px;
            font-size: 0.9rem;
            opacity: 0.7;
        }
        .loading {
            color: rgba(255, 255, 255, 0.7);
            font-style: italic;
        }
        .error {
            color: #ff6b6b;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>StoryBook</h1>
        <p>HelloWorld</p>
        
        <div class="version-info">
            <div class="version-label">当前版本</div>
            <div id="version" class="loading">加载中...</div>
            <div id="description" class="version-desc"></div>
        </div>
    </div>

    <script>
        async function loadVersion() {
            try {
                const response = await fetch('/api/version');
                const result = await response.json();
                
                if (result.success && result.data) {
                    document.getElementById('version').textContent = result.data.version;
                    document.getElementById('version').className = 'version-number';
                    document.getElementById('description').textContent = result.data.description || '';
                } else {
                    document.getElementById('version').textContent = '获取版本失败';
                    document.getElementById('version').className = 'error';
                }
            } catch (error) {
                console.error('Error loading version:', error);
                document.getElementById('version').textContent = '连接失败';
                document.getElementById('version').className = 'error';
            }
        }

        document.addEventListener('DOMContentLoaded', loadVersion);
    </script>
</body>
</html>
